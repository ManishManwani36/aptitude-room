n site. Advocates contend that standardised, factory production could reduce the cost overruns and schedule delays that have long afflicted large conventional reactors, and that an SMR's smaller output makes it suitable for grids or industrial sites that cannot absorb a gigawatt-scale unit. Several designs incorporate passive safety systems that rely on natural circulation to remove residual heat without external power or operator intervention. Critics note that, because few SMRs have been built and operated commercially, claims about their delivered cost per unit of electricity remain largely projections rather than demonstrated results, and that smaller reactors forgo some of the economies of scale enjoyed by larger plants. SMRs still produce radioactive waste, though proponents argue that certain designs generate less per unit of energy and that the waste can be managed with existing approaches. Regulatory frameworks in many jurisdictions were written for large light-water reactors, and adapting licensing procedures to novel SMR designs has in several cases proved slower than developers anticipated. No consensus yet exists on whether SMRs will achieve the cost reductions their advocates project.","passageId":"p6","type":"tfc","statement":"In some jurisdictions, adapting existing licensing procedures to novel SMR designs has taken longer than developers expected.","options":["True","False","Cannot Say"],"answerIndex":0,"reasoning":"The passage states that regulatory frameworks were written for large light-water reactors and that 'adapting licensing procedures to novel SMR designs has in several cases proved slower than developers anticipated.' 'In several cases' supports 'in some jurisdictions,' and 'slower than anticipated' supports 'taken longer than developers expected,' so the statement follows necessarily and is True. It is not False (it restates the text) and not Cannot Say (the information is explicitly provided).","topic":"energy"}]; /* @INJECT:verbal */
const DEDUCTIVE_DATA = [{"type":"syllogism","topic":"Categorical syllogism with mixed quantifiers; illicit converse and existential traps","stem":"Which one of the following conclusions MUST be true given both premises?","context":"In a professional-services firm, the following two statements are known to be true:\nPremise 1: All certified auditors are licensed practitioners.\nPremise 2: Some licensed practitioners are not bonded.","options":["Some certified auditors are not bonded.","All licensed practitioners are certified auditors.","Some bonded staff are licensed practitioners.","No valid conclusion linking certified auditors to bonding can be drawn from these premises.","No bonded staff are certified auditors."],"answerIndex":3,"reasoning":"Premise 1 gives Auditors ⊆ Licensed. Premise 2 guarantees at least one licensed practitioner who is not bonded, but says nothing about WHICH licensed practitioners those are. The middle term (Licensed) is undistributed in Premise 1 — Auditors are only a subset of Licensed, not the whole of it — so nothing transfers from the 'not bonded' licensed people to the auditors.\n\nRefuting (A) 'Some certified auditors are not bonded': the unbonded licensed people could all be non-auditors. Counter-model: auditor a1 is licensed and bonded; a separate licensed person l1 is not an auditor and not bonded (satisfies P2). Here every auditor is bonded, so (A) is false — hence not entailed. This is the classic trap of illicitly distributing the middle term.\n\nRefuting (B) 'All licensed practitioners are certified auditors': this is the illicit converse of Premise 1. In the model above, l1 is licensed but not an auditor, so (B) is false.\n\nRefuting (C) 'Some bonded staff are licensed practitioners': the premises never assert any bonded person exists. Counter-model: auditor a1 is licensed but NOT bonded; l1 is licensed and not bonded; nobody is bonded. P1 (Auditors ⊆ Licensed) and P2 (l1 is licensed and unbonded) both hold, yet there are no bonded staff, so (C) is false — not entailed.\n\nRefuting (E) 'No bonded staff are certified auditors': the first model has a bonded auditor (a1), so (E) is false.\n\nSince every candidate linking auditors to bonding can be made false while the premises stay true, the only certain statement is (D): no valid conclusion about auditors and bonding follows. Exactly one option survives."},{"type":"conditional","topic":"If-then chain plus contrapositive (modus tollens through two links)","stem":"Which conclusion is logically guaranteed?","context":"A procurement workflow obeys these rules:\nRule 1: If a vendor is onboarded, then the contract has been countersigned.\nRule 2: If the contract has been countersigned, then a budget code has been issued.\nFact: For vendor Helix, no budget code has been issued.","options":["Helix has been onboarded.","Helix's contract has been countersigned.","If a budget code is issued for Helix, then Helix has been onboarded.","Helix has not been onboarded.","Helix's contract has not been countersigned, but Helix may still have been onboarded."],"answerIndex":3,"reasoning":"Let V = onboarded, C = countersigned, B = budget code issued. Rule 1: V → C. Rule 2: C → B. Fact: ¬B.\n\nApply modus tollens to Rule 2: from C → B and ¬B infer ¬C — the contract was NOT countersigned. Apply modus tollens to Rule 1: from V → C and ¬C infer ¬V — the vendor was NOT onboarded. Therefore (D) is forced. An exhaustive truth-table check confirms every world satisfying V→C, C→B and ¬B has both V false and C false.\n\nRefuting (A): it asserts onboarding, the opposite of what the chain forces.\nRefuting (B): ¬B forces ¬C by contrapositive, so the contract was NOT countersigned.\nRefuting (C): this reverses the chain (B → V), an illicit converse; the rules only run V → C → B, never backward, so the converse is not entailed.\nRefuting (E): it correctly derives ¬C but then claims onboarding is still open. In fact ¬C chains forward via Rule 1's contrapositive to ¬V, so onboarding is definitively ruled out, not left undetermined. Exactly one option (D) is forced."},{"type":"conditional","topic":"Necessary vs sufficient conditions (separating the two directions)","stem":"Operations confirms that the demand forecast WAS submitted for Project Atlas, but does not say whether the project was approved. What, if anything, can be concluded with certainty?","context":"Two governance rules apply to every project:\nRule A: A budget review is necessary for project approval.\nRule B: Submitting the demand forecast is sufficient for a budget review to take place.","options":["Project Atlas has been approved.","A budget review has taken place for Project Atlas.","Project Atlas has not been approved.","A budget review has taken place, and therefore Project Atlas has been approved.","Nothing can be concluded; the forecast tells us nothing about the review."],"answerIndex":1,"reasoning":"Translate each rule precisely. Rule A 'a budget review is necessary for approval' means Approval → Review (the review is a necessary condition; no review ⇒ no approval). Rule B 'submitting the forecast is sufficient for a review' means Forecast → Review.\n\nGiven: Forecast is true. By Rule B (Forecast → Review, modus ponens), a budget review HAS taken place. So (B) is guaranteed.\n\nWhat about approval? Rule A only gives Approval → Review, i.e. the review is necessary, not sufficient, for approval. Knowing the review happened does NOT let us infer approval — that would be affirming the consequent of Rule A. A truth-table over {Approval, Review, Forecast} constrained by Approval→Review and Forecast→Review, with Forecast = true, contains both a world where Approval is true (Review true) and a world where Approval is false (Review true) — so approval is undetermined.\n\nRefuting (A): asserts approval, not forced (affirming the consequent of Rule A).\nRefuting (C): asserts non-approval, equally undetermined — approval can be either value.\nRefuting (D): correctly derives the review but then leaps to approval, treating the necessary condition as if it were sufficient — the central trap.\nRefuting (E): false because the forecast IS sufficient for the review (Rule B), a firm conclusion. Only (B) is both forced and not overreaching."},{"type":"dataSufficiency","topic":"Sufficiency of single statements against a directional conditional","stem":"Question: Was the proposal approved? Using the rule above, evaluate the two statements and select the correct sufficiency verdict.","context":"A committee approves a proposal ONLY IF both the Chair and the Treasurer vote in favour. You must decide whether the proposal was approved.\nStatement (1): The Treasurer voted in favour.\nStatement (2): The Chair voted against.","options":["Statement (1) ALONE is sufficient, but statement (2) alone is not.","Statement (2) ALONE is sufficient, but statement (1) alone is not.","Each statement ALONE is sufficient.","BOTH statements TOGETHER are sufficient, but neither alone is.","Both statements together are still NOT sufficient."],"answerIndex":1,"reasoning":"'Approves only if both Chair and Treasurer vote in favour' yields Approve → (Chair ∧ Treasurer). Equivalently, by contrapositive, ¬(Chair ∧ Treasurer) → ¬Approve.\n\nStatement (2): Chair voted against ⇒ ¬Chair ⇒ ¬(Chair ∧ Treasurer) ⇒ by contrapositive ¬Approve. So (2) ALONE settles the question: the proposal was NOT approved. Sufficient (it yields a definite answer — 'no' — to 'was it approved?').\n\nStatement (1): Treasurer in favour, Chair unknown. Enumerating valid worlds under Approve → (Chair ∧ Treasurer) with Treasurer = yes gives both an approved world (Chair yes, Approve yes) and unapproved worlds (Chair no, Approve no). Approval is undetermined. NOT sufficient.\n\nTherefore statement (2) alone is sufficient while (1) alone is not — answer (B).\n\nRefuting (A): reverses which statement works; (1) leaves the Chair open and so cannot decide approval.\nRefuting (C): (1) is not sufficient, so 'each alone' fails.\nRefuting (D): (2) already suffices alone, so 'neither alone' is false.\nRefuting (E): (2) makes the pair (and (2) by itself) sufficient, so 'still not sufficient' is false. Note the rule is only a one-directional conditional, so 'both vote yes' would NOT by itself prove approval — but neither statement asserts that, so it does not affect the verdict."},{"type":"arrangement","topic":"Linear arrangement under adjacency, anchor and ordering constraints","stem":"Reading left to right, which manager occupies office 3 (the middle office)?","context":"Five managers — Adler, Brandt, Cho, Diaz and Eriksen — occupy a single row of five offices numbered 1 to 5 from left to right, one manager per office. The following all hold:\n• Diaz is in office 4.\n• Adler is in office 1.\n• Brandt sits immediately to the right of Eriksen.\n• Eriksen sits somewhere to the left of Cho.","options":["Adler","Brandt","Cho","Diaz","Eriksen"],"answerIndex":1,"reasoning":"Place the absolutes first: Adler = office 1, Diaz = office 4. The remaining managers Brandt, Cho, Eriksen fill offices 2, 3, 5.\n\n'Brandt immediately to the right of Eriksen' means Brandt = Eriksen + 1, i.e. they occupy consecutive offices. Within the open offices {2, 3, 5}, the only consecutive pair available is (2, 3) — office 5 cannot pair, since the office to its left (4) is taken by Diaz and there is no office 6. So Eriksen = 2 and Brandt = 3. That leaves Cho = office 5.\n\nCheck 'Eriksen left of Cho': Eriksen = 2 < Cho = 5. Satisfied.\n\nFull layout: 1 Adler, 2 Eriksen, 3 Brandt, 4 Diaz, 5 Cho. An exhaustive permutation search confirms this is the UNIQUE arrangement satisfying all four constraints. Office 3 is therefore Brandt — answer (B).\n\nThe distractors correspond to misreadings: swapping the Brandt/Eriksen order (E), forgetting Cho must be right of Eriksen and sliding Cho to the middle (C), or ignoring the fixed anchors (A, D)."},{"type":"logicalPuzzle","topic":"Conditional selection constraints; finding the forced exclusion","stem":"Exactly three of the six candidates will form the team. Which candidate can NEVER be on a valid team?","context":"A project team of exactly three people must be chosen from six candidates: P, Q, R, S, T and U. All of the following selection rules must hold:\n• If P is selected, then Q is not selected.\n• R is selected only if S is selected.\n• At least one of T and U is selected.\n• Q and S cannot both be selected.\n• If U is selected, then P is selected.","options":["P","Q","R","S","U"],"answerIndex":1,"reasoning":"Test whether Q can be on any valid team. Suppose Q is selected. Rule 'Q and S cannot both be selected' forces ¬S. Rule 'R only if S' (R → S) with ¬S forces ¬R. Rule 'if P then ¬Q' has contrapositive Q → ¬P, which forces ¬P. Rule 'if U then P' (U → P) with ¬P forces ¬U. So with Q in, we have excluded S, R, P and U — the only remaining candidates are Q and T, just two people. A team needs three, so a valid team containing Q cannot be completed. Hence Q can NEVER be selected.\n\nExhaustive enumeration of all C(6,3) = 20 triples confirms exactly four valid teams exist — {P,S,T}, {P,S,U}, {P,T,U}, {R,S,T} — and Q appears in none of them, while P, S and T each appear in three and U in two.\n\nRefuting (A) P, (C) R, (D) S, (E) U: each is present in at least one valid team listed above, so none of them is impossible. Only Q is forced out of every team."},{"type":"sequence","topic":"Relative ranking from ordering and fixed-gap clues","stem":"In the final performance ranking (1 = highest), who is ranked 3rd?","context":"Five sales managers — Tan, Udeh, Vega, Walsh and Xiu — are placed in a strict performance ranking from 1st (highest) to 5th (lowest), no ties. The following are known:\n• Tan is ranked higher than Udeh.\n• Vega is ranked exactly two places below Walsh (e.g. if Walsh is 1st, Vega is 3rd).\n• Xiu is ranked 1st.\n• Udeh is ranked 5th.","options":["Tan","Udeh","Vega","Walsh","Xiu"],"answerIndex":0,"reasoning":"Fix the anchors: Xiu = rank 1, Udeh = rank 5. The remaining ranks 2, 3, 4 go to Tan, Vega and Walsh in some order.\n\nApply 'Vega is exactly two places below Walsh' (rank(Vega) = rank(Walsh) + 2). Within the open ranks {2, 3, 4}, the only pair with a gap of two is Walsh = 2 and Vega = 4. (Walsh = 3 would need Vega = 5, taken by Udeh; Walsh = 4 would need Vega = 6, which does not exist.) That leaves Tan = rank 3.\n\nCheck 'Tan higher than Udeh': Tan = 3 is higher (smaller number) than Udeh = 5. Satisfied.\n\nFinal ranking: 1 Xiu, 2 Walsh, 3 Tan, 4 Vega, 5 Udeh. An exhaustive permutation search confirms this is the UNIQUE ordering meeting all four clues. The manager in 3rd place is Tan — answer (A).\n\nDistractors arise from misplacing the Walsh–Vega gap (putting Vega or Walsh in the middle) or from ignoring the fixed 1st/5th anchors."},{"type":"conditional","topic":"Biconditional (necessary AND sufficient) with modus tollens","stem":"It is confirmed that the service was NOT deployed. What follows with certainty?","context":"An engineering policy states: 'A passing security scan is both necessary and sufficient for a service to be deployed.'","options":["The security scan passed.","The security scan did not pass.","The scan may or may not have passed; deployment status does not determine it.","The service will be deployed once the scan is rerun.","The scan passed but deployment was blocked for another reason."],"answerIndex":1,"reasoning":"'Necessary and sufficient' makes this a biconditional: Deploy ↔ ScanPass. The two are logically equivalent — each holds exactly when the other does.\n\nGiven ¬Deploy. By the biconditional, Deploy and ScanPass share the same truth value, so ¬Deploy entails ¬ScanPass — the scan did NOT pass. A two-row check of the biconditional (the only consistent rows are Deploy=ScanPass=true and Deploy=ScanPass=false) shows the world with Deploy false also has ScanPass false. Hence (B) is forced.\n\nRefuting (A): a passing scan is sufficient for deployment (ScanPass → Deploy), so ScanPass would have produced Deploy — contradicting the given ¬Deploy. The scan could not have passed.\nRefuting (C): with a mere one-directional conditional this 'undetermined' answer would be tempting, but the stem specifies necessary AND sufficient, i.e. a biconditional, which fully determines the scan result from the deployment status. This is the key trap — treating a biconditional as a one-way implication.\nRefuting (D): introduces a future rerun the premise never licenses.\nRefuting (E): claims the scan passed yet deployment was blocked, which violates sufficiency (passing guarantees deployment). Impossible under the biconditional. Exactly one option (B) follows."},{"type":"logicalPuzzle","topic":"Schedule/availability intersection under a duration constraint","stem":"For a one-hour review that all four managers must attend in full, which single start time works?","context":"Four managers must all attend a one-hour review that occupies a single one-hour slot starting on the hour. The candidate start times are 09:00, 10:00, 11:00, 12:00, 13:00, 14:00 and 15:00. Each manager is available only at the start times listed:\n• Aisha: 10:00, 11:00, 12:00, 15:00\n• Ben: 09:00, 11:00, 12:00, 13:00, 14:00\n• Chen: 11:00, 12:00, 14:00, 15:00\n• Diego: 09:00, 11:00, 13:00, 14:00, 15:00","options":["10:00","11:00","12:00","14:00","No single start time works for all four."],"answerIndex":1,"reasoning":"A valid slot must lie in every manager's availability set simultaneously (the review is a single one-hour block, so all four must share the same start hour). Intersect the four sets step by step:\n\nAisha ∩ Ben = {11:00, 12:00}. Intersect with Chen {11:00, 12:00, 14:00, 15:00} = {11:00, 12:00}. Intersect with Diego {09:00, 11:00, 13:00, 14:00, 15:00} = {11:00} (Diego has no 12:00).\n\nThe unique common start time is 11:00 — answer (B).\n\nRefuting (A) 10:00: Ben, Chen and Diego are all unavailable at 10:00.\nRefuting (C) 12:00: Diego is not available at 12:00, so it drops out at the final intersection.\nRefuting (D) 14:00: Aisha is not available at 14:00.\nRefuting (E): a common slot does exist (11:00), so 'no slot works' is false. Because exactly one shared hour exists and the review fits in a single block, the duration constraint is met precisely at 11:00."},{"type":"conditional","topic":"Argument evaluation: underlying assumption vs entailed conclusion (business wrapping)","stem":"The argument's conclusion follows ONLY IF which unstated assumption holds?","context":"A divisional head argues: 'Since we introduced the new CRM last quarter, recorded sales rose by 12%. Therefore the CRM caused the increase, so we should roll it out to every region.'","options":["No other material change (pricing, headcount, market demand, seasonality) occurred last quarter that could account for the sales rise.","Sales rose by exactly 12% and not more.","The CRM is cheaper to operate than the previous system.","Every region currently uses a different CRM.","Recorded sales are a more reliable metric than booked revenue."],"answerIndex":0,"reasoning":"The argument moves from a correlation (CRM introduced, then sales rose) to a causal claim (the CRM caused the rise) and then to a recommendation (roll it out everywhere). For the causal step to hold, the rise must not be attributable to some other coincident factor — otherwise it is correlation mistaken for causation. The load-bearing hidden premise is that no other material change could explain the increase.\n\nApply the negation test: assume the negation of (A) — 'some other change (a price cut, more salespeople, a demand surge, seasonality) DID occur and could account for the rise.' Then the CRM is no longer established as the cause and the conclusion collapses. Because negating (A) breaks the argument, (A) is exactly the assumption the argument depends on.\n\nRefuting (B): the precise magnitude (exactly 12%) is irrelevant to whether the CRM, rather than something else, caused the change. Negating it (say the rise was 13%) leaves the causal inference intact.\nRefuting (C): cost of operation is a separate business consideration; the argument is about causation of the sales rise, not affordability. Negating it does not touch the causal claim.\nRefuting (D): the argument never relies on regions using different systems; negating it leaves the causal inference untouched.\nRefuting (E): the choice of sales metric is not what the causal leap depends on; negating it does not break the conclusion. Only (A) is the assumption whose falsity destroys the inference — the classic correlation-as-causation gap."},{"type":"syllogism","topic":"Categorical logic - quantifiers, illicit conversion","stem":"Which conclusion MUST be true on the basis of the two statements alone?","context":"At Meridian Consulting, the following two statements are known to be true:\n(1) All partners are equity holders.\n(2) Some equity holders are based in the Singapore office.\nNo other information is given. Treat only these statements as true, and do not assume any group is non-empty unless a statement says so.","options":["Some partners are based in the Singapore office.","Some equity holders are partners.","All equity holders based in Singapore are partners.","No conclusion about partners' locations is entailed by the statements.","All Singapore-based staff are equity holders."],"answerIndex":3,"reasoning":"Statement (1) gives Partners is a subset of Equity holders. Statement (2) makes the set 'equity holders based in Singapore' non-empty, but says nothing about whether any of those particular equity holders are also partners; the Singapore equity holders could be entirely the non-partner equity holders. Therefore nothing about where partners are based is forced, and option (3) [index 3, 'No conclusion about partners' locations is entailed'] is the correct, defensible answer. Refuting distractors: 'Some partners are based in Singapore' commits the fallacy of assuming the overlap in (2) lands inside the Partner subset - not entailed, since the partner subset and the Singapore-based subset of equity holders need not intersect. 'Some equity holders are partners' requires at least one partner to EXIST; under modern logic 'All partners are equity holders' carries no existential import and is vacuously true even with zero partners (and the context explicitly bars assuming any group is non-empty), so this is not necessitated. 'All Singapore equity holders are partners' is an illicit conversion of (1) plus an unsupported leap. 'All Singapore-based staff are equity holders' illicitly converts (2) (a some-statement does not convert to an all-statement, and the direction is reversed). Hence only the 'no conclusion' option must hold.","reasoningPlanRef":""},{"type":"syllogism","topic":"Only-statements and must/some quantifiers","stem":"Given the two premises, which statement is guaranteed to be true?","context":"Two facts are established about a regional sales division:\n(1) Only managers may approve discounts above 15%.\n(2) Priya approved a discount of 20%.\nAssume both facts are true and complete.","options":["Every manager has approved a discount above 15%.","Priya is a manager.","Some managers are not able to approve discounts.","If Priya is a manager, then she may approve discounts above 30%.","All people who approve any discount are managers."],"answerIndex":1,"reasoning":"'Only managers may approve discounts above 15%' translates to: if a person approves a discount above 15%, that person is a manager (the set of approvers-above-15% is a subset of Managers). Priya approved 20%, which is above 15%, so she falls in the antecedent class and must be a manager. Option (2) [index 1, 'Priya is a manager'] is therefore forced and is the answer. Refuting distractors: 'Every manager has approved a discount above 15%' is the illicit converse of an only-statement - the rule makes manager-status NECESSARY for such approval, it does not assert every manager exercised it. 'Some managers are not able to approve discounts' is consistent with the premises but not entailed; nothing restricts managers' abilities downward. 'If Priya is a manager, then she may approve discounts above 30%' is NOT guaranteed: an only-statement grants no blanket upward permission, so being a manager does not entail permission for a 30% discount, and no fact about 30% is given - so this conditional can fail and is not a certainty. 'All people who approve any discount are managers' overreaches the rule, which constrains only discounts ABOVE 15%, not every discount. Thus (2) is the single defensible certainty.","reasoningPlanRef":""},{"type":"arrangement","topic":"Linear seating with adjacency and ordering constraints","stem":"Which director MUST occupy seat 1?","context":"Five directors - Acharya, Bell, Chen, Diaz and Evans - sit in a single row of five seats numbered 1 to 5 from left to right. Each director takes exactly one seat. The following constraints all apply:\n(1) Acharya sits somewhere to the left of Bell.\n(2) Chen sits in seat 3.\n(3) Diaz and Evans sit in adjacent seats.\n(4) Bell does not sit in seat 5.","options":["Acharya","Bell","Chen","Diaz","Cannot be determined from the constraints"],"answerIndex":0,"reasoning":"Place the absolutes first. Chen is fixed in seat 3 (rule 2), so seats 1,2,4,5 hold Acharya, Bell, Diaz, Evans. Rule 3 requires Diaz and Evans adjacent; among the remaining seats {1,2,4,5} the only adjacent pairs are {1,2} and {4,5} (2 and 4 are separated by Chen in seat 3). So the Diaz/Evans block sits in {1,2} or in {4,5}. Case A - Diaz/Evans in {4,5}: then Acharya and Bell take seats 1 and 2; rule 1 (Acharya left of Bell) forces Acharya=1, Bell=2; rule 4 (Bell not in 5) is satisfied. Valid layouts: A,B,C,D,E and A,B,C,E,D. Case B - Diaz/Evans in {1,2}: then Acharya and Bell take seats 4 and 5; rule 1 forces Acharya=4, Bell=5 - but rule 4 forbids Bell in seat 5, a contradiction, so Case B is impossible. Only Case A survives, and in every surviving layout seat 1 is Acharya. Exhaustive enumeration confirms the only valid permutations are (A,B,C,D,E) and (A,B,C,E,D), both with Acharya in seat 1. Distractors: Bell is fixed at seat 2, Chen at 3, Diaz varies between seats 4 and 5, and 'cannot be determined' is wrong because the constraints pin seat 1 uniquely.","reasoningPlanRef":""},{"type":"logicalPuzzle","topic":"Grouping / room assignment with capacity and compatibility","stem":"Which staff members must BOTH be assigned to Room X?","context":"Six staff - Adeyemi, Brooks, Costa, Dunn, Engel and Farr - are divided between two rooms, Room X and Room Y. Each room holds at most three people and everyone is assigned to exactly one room. The constraints are:\n(1) Adeyemi and Brooks must be in the same room.\n(2) Costa and Dunn must be in different rooms.\n(3) Engel must be in Room X.\n(4) Adeyemi is assigned to Room Y.","options":["Engel and Costa","Engel and Farr","Engel and Dunn","Brooks and Farr","Costa and Farr"],"answerIndex":1,"reasoning":"By rule 4, Adeyemi is in Room Y; by rule 1, Brooks is therefore in Room Y too. By rule 3, Engel is in Room X. That leaves Costa, Dunn and Farr to place. Room Y already holds Adeyemi and Brooks, so it can take at most one more person (cap 3); Room X holds Engel, so it can take at most two more. Three people (Costa, Dunn, Farr) remain and Y can absorb only one of them, so exactly two of them go to Room X. Rule 2 forces Costa and Dunn into different rooms, so exactly one of {Costa, Dunn} is in Y and the other in X - that single Y slot is consumed by one of Costa/Dunn. Therefore Farr cannot go to Y and must be in Room X. So Room X always contains Engel and Farr. Exhaustive check confirms only two valid assignments: X={Engel, Dunn, Farr}, Y={Adeyemi, Brooks, Costa}; and X={Engel, Costa, Farr}, Y={Adeyemi, Brooks, Dunn}. In both, Engel and Farr are in X, so option (2) [index 1] is the unique answer. Distractors: 'Engel and Costa' and 'Engel and Dunn' each name a person who is in X in only one of the two valid worlds (Costa and Dunn swap), so neither pair is guaranteed. 'Brooks and Farr' fails because Brooks is in Y. 'Costa and Farr' fails because Costa is not always in X.","reasoningPlanRef":""},{"type":"conditional","topic":"Propositional logic - contrapositive and mutual exclusion","stem":"If the firm does NOT open the Berlin office, which of the following must be true?","context":"A strategy committee has adopted these binding rules for next year's expansion:\n(1) If the firm hires a new CFO, then it will open the Berlin office.\n(2) The firm will launch the mobile product only if it hires a new CFO.\n(3) The firm will either launch the mobile product or expand the support team (or both).","options":["The firm will hire a new CFO.","The firm will expand the support team.","The firm will not expand the support team.","The firm will launch the mobile product.","The firm will open the Berlin office."],"answerIndex":1,"reasoning":"Assume the Berlin office is NOT opened. Rule 1 says CFO-hire implies Berlin-open; by contrapositive, not-Berlin implies not-CFO, so the firm does NOT hire a new CFO. Rule 2 ('launch mobile only if CFO-hire') means launch-mobile implies CFO-hire; by contrapositive, not-CFO implies not-launch-mobile, so the firm does NOT launch the mobile product. Rule 3 is an inclusive disjunction launch-mobile OR expand-support; with launch-mobile false, the disjunction is satisfiable only if expand-support is true. Therefore the firm must expand the support team - option (2) [index 1]. Refuting distractors: 'The firm will hire a new CFO' is contradicted (we derived not-CFO). 'The firm will not expand the support team' is the exact opposite of the forced conclusion. 'The firm will launch the mobile product' was shown false by the contrapositive of rule 2. 'The firm will open the Berlin office' contradicts the question's premise. Only expanding the support team is forced.","reasoningPlanRef":""},{"type":"sequence","topic":"Task sequencing with precedence and adjacency","stem":"Across all valid schedules, which statement MUST be true?","context":"Five project tasks - P, Q, R, S and T - are each scheduled in exactly one of five consecutive slots numbered 1 to 5 (1 = earliest). The dependencies are:\n(1) P is scheduled before R.\n(2) Q is scheduled in the slot immediately before S.\n(3) T is scheduled in slot 5.\n(4) R is not scheduled in slot 1.","options":["P is always in slot 1.","R is always before S.","Q is always before R.","S is never in slot 5.","R is always in slot 4."],"answerIndex":3,"reasoning":"T is fixed in slot 5 (rule 3). The Q-then-S block (rule 2) must occupy two consecutive slots among 1-4; P must precede R (rule 1) and R cannot be slot 1 (rule 4). Exhaustive enumeration yields exactly three valid orderings: (P,Q,S,R,T), (P,R,Q,S,T), and (Q,S,P,R,T). Test the candidates against all three. 'S is never in slot 5': S sits in slot 3, slot 4, slot 2 respectively - never slot 5, since T owns slot 5. This holds in every case, so option (4) [index 3] is the answer. Refuting the others: 'P is always in slot 1' fails on (Q,S,P,R,T) where P is in slot 3. 'R is always before S' fails on (P,Q,S,R,T) where S precedes R. 'Q is always before R' fails on (P,R,Q,S,T) where R precedes Q. 'R is always in slot 4' fails on (P,R,Q,S,T) where R is in slot 2. Only 'S is never in slot 5' is true across all valid schedules.","reasoningPlanRef":""},{"type":"conditional","topic":"Argument evaluation - correlation vs causation","stem":"Which option identifies the central logical flaw in the manager's conclusion?","context":"A division manager argues: 'In the last two quarters we moved the team to a four-day work week. Over the same period, customer-satisfaction scores rose by eight points. Therefore the four-day work week caused the rise in customer satisfaction, and we should roll it out company-wide.'","options":["The argument assumes a change that coincided with the satisfaction rise was its cause, without ruling out other explanations.","The argument relies on customer-satisfaction scores, which are inherently unreliable.","The argument fails because two quarters is mathematically too short to compute an average.","The argument commits the fallacy of denying the antecedent.","The argument over-generalises from a sample that is too small to be statistically valid."],"answerIndex":0,"reasoning":"The conclusion leaps from co-occurrence (the four-day week and the satisfaction rise happened in the same period) to causation (the four-day week caused the rise). This is the classic correlation-as-causation error: the passage never excludes alternative causes such as a new product, seasonal demand, a pricing change, or a different support tool. Option (1) [index 0] names exactly this flaw and is the defensible answer. Refuting distractors: 'satisfaction scores are inherently unreliable' imports an outside assumption not in the passage - we reason only from what is given, and nothing says the metric is unreliable. 'Two quarters is too short to compute an average' is a fabricated objection; an average over any non-empty period is computable. 'Denying the antecedent' is a conditional fallacy of the form 'if A then B; not A; therefore not B' - the argument has no such conditional structure, so the label does not fit. 'Sample too small to be statistically valid' is a sampling-adequacy objection; the decisive defect is the unjustified causal jump from a single coincidence, not sample size. Hence (1).","reasoningPlanRef":""},{"type":"dataSufficiency","topic":"Schedule-clash / availability sufficiency","stem":"Question: Can a one-hour meeting requiring all three managers be held from 14:00 to 15:00? Using the two statements, determine which is sufficient.","context":"Three managers - A, B and C - must all attend a single continuous one-hour meeting during office hours (09:00-17:00). Evaluate the two numbered statements as a data-sufficiency problem.\nStatement (1): Manager A is busy 09:00-12:00 and 15:00-17:00; Manager B is free for the entire afternoon (12:00-17:00).\nStatement (2): Manager C is busy 13:00-14:00 and 16:00-17:00.","options":["Statement (1) alone is sufficient, but statement (2) alone is not.","Statement (2) alone is sufficient, but statement (1) alone is not.","Both statements together are sufficient, but neither alone is sufficient.","Each statement alone is sufficient.","The two statements together are still not sufficient."],"answerIndex":2,"reasoning":"The question asks whether all three are simultaneously free for 14:00-15:00, so we need the availability of A, B and C in that window. Statement (1) alone: A is busy 09:00-12:00 and 15:00-17:00, so A is free 12:00-15:00 - A's next busy block starts exactly at 15:00 (the slot's end boundary), leaving the full hour 14:00-15:00 clear; B is free all afternoon, so B is free 14:00-15:00. But (1) says nothing about C, so the meeting cannot be confirmed - insufficient. Statement (2) alone: C is busy 13:00-14:00 and 16:00-17:00, so C is free 14:00-15:00 (the busy block ends exactly at 14:00); but (2) says nothing about A or B - insufficient. Both together: A free (12:00-15:00 covers it), B free (entire afternoon), C free (14:00-15:00 lies between C's busy blocks). All three are free, so the meeting CAN be held - a definite YES. Neither statement alone fixes all three attendees, but together they do, so option (3) [index 2] is correct. 'Each alone sufficient' fails because each omits at least one manager; 'together still not sufficient' fails because together they fully determine a YES.","reasoningPlanRef":""},{"type":"sequence","topic":"Comparative ranking from relative clues","stem":"Which conclusion MUST be true about the final ranking?","context":"Six analysts - F, G, H, J, K and L - are ranked by quarterly sales, with rank 1 the highest and rank 6 the lowest, no ties. The known relationships are:\n(1) G is ranked higher than H.\n(2) There are exactly two analysts ranked between F and K.\n(3) J is ranked 1st (highest).\n(4) L is ranked lower than H.\n(5) F is ranked higher than G.","options":["L is ranked 6th (lowest).","K is ranked higher than F.","H is ranked 3rd.","G is ranked higher than F.","F is ranked 2nd and K is ranked 5th, necessarily in that orientation only by coincidence."],"answerIndex":0,"reasoning":"J is rank 1 (rule 3). Chaining rules 5, 1 and 4 gives F > G > H > L (where 'higher' = smaller rank number) - four analysts in strict order, all below J. With J at rank 1, this chain occupies four of ranks 2-6 in order, and K takes the remaining slot. Rule 2 requires exactly two analysts strictly between F and K, so their rank positions differ by exactly 3. Since F heads the F>G>H>L chain and J holds rank 1, F is at rank 2 at the earliest. If F=2 then K=5; G,H,L then fill ranks 3,4,6 in order: G=3, H=4, L=6; the two between F(2) and K(5) are ranks 3 and 4 (G and H) - correct. Exhaustive enumeration returns exactly one solution: J=1, F=2, G=3, H=4, K=5, L=6. Therefore L is ranked 6th - option (1) [index 0] is forced. Refuting distractors: 'K higher than F' is false (K=5, F=2). 'H is ranked 3rd' is false (H=4; G is 3rd). 'G higher than F' reverses rule 5. The last option calls the F/K orientation coincidental, but it is in fact forced by the chain plus the gap constraint, so it mischaracterises the deduction.","reasoningPlanRef":""},{"type":"dataSufficiency","topic":"Ordering sufficiency - finishing positions","stem":"Question: Did W finish ahead of Z? Treat the two statements as a data-sufficiency problem and choose the correct option.","context":"Four runners - W, X, Y and Z - finished a race in positions 1 to 4 with no ties (position 1 = first to finish). Evaluate sufficiency.\nStatement (1): X finished immediately ahead of Y, and Y finished ahead of Z.\nStatement (2): W finished ahead of X.","options":["Statement (1) alone is sufficient, but statement (2) alone is not.","Statement (2) alone is sufficient, but statement (1) alone is not.","Each statement alone is sufficient.","Both statements together are sufficient, but neither alone is sufficient.","The two statements together are still not sufficient to answer."],"answerIndex":3,"reasoning":"We must decide whether W finished ahead of Z (W's position number smaller than Z's). Statement (1) alone gives X immediately ahead of Y and Y ahead of Z, i.e. X > Y > Z in finishing order with X,Y adjacent, but W is unconstrained: X=1,Y=2,Z=3,W=4 puts W behind Z, while W=1,X=2,Y=3,Z=4 puts W ahead of Z - both consistent with (1), so it does not settle the question - insufficient. Statement (2) alone (W ahead of X) says nothing about Z relative to W; Z could finish ahead of or behind W - insufficient. Together: from (1), X is ahead of Y which is ahead of Z, so X is ahead of Z; from (2), W is ahead of X; by transitivity W is ahead of X which is ahead of Z, so W is ahead of Z - a definite YES. Exhaustive enumeration confirms that under both statements the only valid ordering is W,X,Y,Z, with W ahead of Z in every case. Neither statement alone settles it, but the two together force the answer, so option (4) [index 3] is correct. The single-statement options fail because each leaves W-vs-Z open; 'together still not sufficient' fails because transitivity nails it.","reasoningPlanRef":""}]; /* @INJECT:deductive */

function normDed(q,i){return {id:'DED-'+(i+1),section:'deductive',number:i+1,type:q.type||'logic',context:q.context||'',stem:q.stem,

const LS_KEY='aptitude-room-v1';
let state={view:'home',mode:'study',section:null,idx:0};
let store={theme:'light',answers:{},revealed:{},flags:{}};
let quiz=null; // {section, ids, answers, flags, idx, start, limit, endsAt, timer, submitted}

function load(){try{const s=JSON.parse(localStorage.getItem(LS_KEY));if(s)store=Object.assign(store,s);}catch(e){}}
function save(){try{localStorage.setItem(LS_KEY,JSON.stringify(store));}catch(e){}}
function esc(s){return (''+(s==null?'':s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1900);}

function setTheme(th){document.documentElement.setAttribute('data-theme',th);store.theme=th;save();
  document.getElementById('themeBtn').innerHTML = th==='dark'
   ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19" stroke-linecap="round"/></svg>'
   : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5Z" stroke-linejoin="round"/></svg>';}
function toggleTheme(){setTheme(store.theme==='dark'?'light':'dark');}

function go(view,opts){state=Object.assign(state,{view},opts||{});window.scrollTo({top:0,behavior:'smooth'});render();}

function renderNav(){
  const items=[['home','Overview'],['study','Study'],['quiz','Mock Test'],['key','Answer Key']];
  document.getElementById('nav').innerHTML=items.map(([v,l])=>{
    const on=(v===state.view||(v==='study'&&state.view==='studyQ')||(v==='quiz'&&(state.view==='quizSetup'||state.view==='quizQ'||state.view==='results')))?'on':'';
    return '<button class="'+on+'" onclick="navTo(\''+v+'\')">'+l+'</button>';
  }).join('');
}
function navTo(v){
  if(v==='study')return go('study');
  if(v==='quiz')return go('quizSetup');
  if(v==='key')return go('key');
  go('home');
}

/* ------------------------------------------------ VIEWS */
function render(){
  renderNav();
  const app=document.getElementById('app');
  let html='';
  if(state.view==='home')html=viewHome();
  else if(state.view==='study')html=viewStudyPicker();
  else if(state.view==='studyQ')html=viewQuestion('study');
  else if(state.view==='quizSetup')html=viewQuizSetup();
  else if(state.view==='quizQ')html=viewQuestion('quiz');
  else if(state.view==='results')html=viewResults();
  else if(state.view==='key')html=viewKey();
  app.innerHTML=html;
}

function secCount(k){return (BANK[k]||[]).length;}
function totalCount(){return SECTIONS.reduce((a,s)=>a+secCount(s.key),0);}

function viewHome(){
  const ready=totalCount();
  let cards=SECTIONS.map((s,i)=>{
    const n=secCount(s.key); const avail=n>0;
    return '<article class="sec-card"><div class="idx">'+(i+1)+'</div>'+
      '<div class="glyph">'+s.glyph+'</div>'+
      '<h3>'+s.name+'</h3><div class="tag">'+s.tag+'</div>'+
      '<p>'+s.blurb+'</p>'+
      '<div class="meta"><span><b>'+(avail?n:'—')+'</b> questions</span><span>~<b>'+(avail?Math.round(n*1.1):'—')+'</b> min</span><span>Level <b>Managerial</b></span></div>'+
      '<div class="acts">'+
        '<button class="btn" '+(avail?'':'disabled')+' onclick="startStudy(\''+s.key+'\')">Study</button>'+
        '<button class="btn ghost" '+(avail?'':'disabled')+' onclick="startQuiz(\''+s.key+'\')">Timed test</button>'+
      '</div></article>';
  }).join('');

  return ''+
  '<section class="hero">'+
    '<div><div class="kicker">Original practice · worked solutions</div>'+
    '<h2>Train for the <em>managerial</em> SHL — one question at a time.</h2>'+
    '<p>Eighty questions across the four classic aptitude families, each pitched at the senior-professional band and explained in full. Study at your own pace, then sit a timed mock under exam conditions.</p></div>'+
    '<div class="hero-stats">'+
      '<div class="hstat"><div class="n">'+(ready||80)+'</div><div class="l">Questions</div></div>'+
      '<div class="hstat"><div class="n">4</div><div class="l">Sections</div></div>'+
    '</div>'+
  '</section>'+
  '<div class="rule"></div>'+
  '<div class="sec-grid">'+cards+'</div>'+
  '<div class="banner"><div><h4>Sit the full mock</h4><p>All four sections back-to-back under a single clock — the closest thing to the real assessment. Get a per-section breakdown and review every answer.</p></div>'+
    '<div class="acts"><button class="btn accent lg" '+(ready?'':'disabled')+' onclick="startQuiz(\'all\')">Begin full mock</button></div></div>'+
  '<div class="tips"><h4>How to get the most from this</h4>'+
    '<ul>'+
    '<li>Do each section in <b>Study</b> first — read every solution, even the ones you got right.</li>'+
    '<li>For Verbal, answer only from the passage. <b>Cannot Say ≠ False.</b></li>'+
    '<li>In Numerical, estimate first; the options are designed to catch a wrong base or a missed fee.</li>'+
    '<li>For Inductive, check for <b>two rules at once</b> (e.g. rotation and shading).</li>'+
    '<li>Then sit the <b>Mock Test</b> timed — managerial pace is roughly a minute a question.</li>'+
    '<li>Re-take a section after a day; durable recall beats cramming.</li>'+
    '</ul></div>';
}

function viewStudyPicker(){
  let cards=SECTIONS.map(s=>{
    const n=secCount(s.key),avail=n>0;
    let done=0;(BANK[s.key]||[]).forEach(q=>{if(store.revealed[q.id])done++;});
    return '<article class="sec-card"><div class="glyph">'+s.glyph+'</div><h3>'+s.name+'</h3>'+
      '<div class="tag">'+s.tag+'</div><p>'+s.blurb+'</p>'+
      '<div class="meta"><span><b>'+(avail?n:'—')+'</b> questions</span><span><b>'+done+'</b> reviewed</span></div>'+
      '<div class="acts"><button class="btn" '+(avail?'':'disabled')+' onclick="startStudy(\''+s.key+'\')">'+(done?'Continue':'Start')+'</button></div></article>';
  }).join('');
  return '<div class="qhead" style="margin-top:18px"><span class="crumb">Study mode · <b>untimed</b></span></div>'+
    '<p style="color:var(--ink-soft);max-width:60ch;margin-bottom:20px">Work through a section at your own pace. Select an answer to check it, then reveal a full worked solution. Your progress is remembered on this device.</p>'+
    '<div class="sec-grid">'+cards+'</div>';
}

function startStudy(key){if(!secCount(key))return;state.mode='study';state.section=key;state.idx=0;go('studyQ');}

function curList(){return state.view==='quizQ'? quiz.questions : (BANK[state.section]||[]);}

function viewQuestion(mode){
  const list=curList(); if(!list.length)return '<p>Section not available yet.</p>';
  const q=list[state.idx];
  const isQuiz=mode==='quiz';
  const chosen = isQuiz? (quiz.answers[q.id]) : (store.answers[q.id]);
  const revealed = isQuiz? false : (store.revealed[q.id] || chosen!=null);
  const sec=SECTIONS.find(s=>s.key===q.section);

  let head='<div class="qhead">'+
    '<span class="crumb"><b>'+sec.name+'</b></span>'+
    '<span class="mode-pill">'+(isQuiz?'Mock test':'Study')+'</span>';
  if(isQuiz)head+='<span class="timer" id="timer">--:--</span>';
  head+='</div>';

  let body='<div class="paper"><div class="qbody">';
  body+='<div class="qnum">Question '+(state.idx+1)+' <span style="color:var(--ink-faint)">/ '+list.length+'</span>'+(q.topic?'<span class="qtopic">'+esc(q.topic)+'</span>':'')+'</div>';

  if(q.passage)body+='<div class="passage">'+esc(q.passage).replace(/\n/g,'<br>')+'</div>';
  if(q.context)body+='<div class="context-box"><span class="lbl">The setup</span>'+esc(q.context).replace(/\n/g,'<br>')+'</div>';

  // visual
  if(q.visual&&q.visual.kind==='chart')body+=renderChart(q.visual.chart);
  if(q.visual&&q.visual.kind==='inductive')body+=renderInductiveVisual(q.visual);

  body+='<div class="stem q">'+q.stem+'</div>';

  // options
  const isFig=q.visual&&q.visual.kind==='inductive';
  body+='<div class="opts'+(isFig?' grid':'')+'">';
  q.options.forEach((o,i)=>{
    let cls='opt'+(isFig?' fig-opt':'');
    if(revealed){ if(i===q.answerIndex)cls+=' correct'; else if(i===chosen)cls+=' wrong'; }
    else if(i===chosen)cls+=' sel';
    const mark = revealed? (i===q.answerIndex?'<span class="mark">Correct</span>':(i===chosen?'<span class="mark">Your pick</span>':'')) :'';
    body+='<button class="'+cls+'" '+(revealed?'disabled':'')+' onclick="pick(\''+q.id+'\','+i+')">'+
      '<span class="bub">'+LETTERS[i]+'</span>'+
      (o.svg? '<span class="figbox">'+o.svg+'</span>' : '<span>'+esc(o.text)+'</span>')+
      mark+'</button>';
  });
  body+='</div>';

  // footer / reveal
  if(!isQuiz){
    body+='<div class="qfoot">'+
      '<button class="btn ghost" onclick="toggleReveal(\''+q.id+'\')">'+(revealed?'Hide solution':'Reveal solution')+'</button>'+
      (chosen!=null&&!revealed?'<span style="color:var(--ink-soft);font-size:.85rem">Answer recorded — reveal to check.</span>':'')+
      '</div>';
    body+='<div class="reveal'+(revealed?' show':'')+'" id="rev-'+q.id+'">'+revealBlock(q,chosen)+'</div>';
  } else {
    body+='<div class="qfoot"><button class="btn ghost" onclick="toggleFlag(\''+q.id+'\')">'+(quiz.flags[q.id]?'★ Flagged':'☆ Flag for review')+'</button></div>';
  }
  body+='</div></div>';

  // pager + rail
  let pager='<div class="pager">'+
    '<button class="btn ghost" '+(state.idx===0?'disabled':'')+' onclick="navQ(-1)">← Prev</button>'+
    '<span class="pinfo">'+(state.idx+1)+' of '+list.length+'</span>';
  if(state.idx<list.length-1)pager+='<button class="btn" onclick="navQ(1)">Next →</button>';
  else if(isQuiz)pager+='<button class="btn accent" onclick="submitQuiz()">Submit test ✓</button>';
  else pager+='<button class="btn" onclick="navTo(\'study\')">Finish ✓</button>';
  pager+='</div>';

  // OMR rail
  let bubbles=list.map((qq,i)=>{
    let c='';
    if(i===state.idx)c+=' cur';
    if(isQuiz){ if(quiz.answers[qq.id]!=null)c+=' done'; if(quiz.flags[qq.id])c+=' flag'; }
    else { if(store.revealed[qq.id]||store.answers[qq.id]!=null){ c+= store.answers[qq.id]===qq.answerIndex?' right':(store.answers[qq.id]!=null?' wrong':' done'); } }
    return '<button class="'+c.trim()+'" onclick="jumpQ('+i+')">'+(i+1)+'</button>';
  }).join('');
  let rail='<div class="rail"><div class="rhead"><span>'+(isQuiz?'Answer sheet':'Progress')+'</span><span>'+(isQuiz?'Filled-in '+Object.keys(quiz.answers).length+'/'+list.length:'')+'</span></div><div class="omr">'+bubbles+'</div></div>';

  return head+body+pager+rail;
}

function renderInductiveVisual(v){
  if(v.layout==='series'){
    let f=v.frames.map(s=>'<div class="frame">'+s+'</div>').join('');
    return '<div class="viz"><div class="frames">'+f+'<div class="arrow-sep">→</div><div class="frame q">?</div></div></div>';
  }
  if(v.layout==='matrix'){
    let cells=v.cells.map(c=> c==null? '<div class="mcell q">?</div>' : '<div class="mcell">'+c+'</div>').join('');
    return '<div class="viz matrix-wrap"><div class="matrix">'+cells+'</div></div>';
  }
  if(v.layout==='analogy'){
    return '<div class="viz"><div class="analogy">'+
      '<div class="pair"><div class="frame sm">'+v.a+'</div><span class="op">:</span><div class="frame sm">'+v.b+'</div></div>'+
      '<span class="op">::</span>'+
      '<div class="pair"><div class="frame sm">'+v.c+'</div><span class="op">:</span><div class="frame q sm">?</div></div>'+
      '</div></div>';
  }
  return ''; // oddoneout: no visual, options carry the figures
}

function revealBlock(q,chosen){
  const correct = chosen===q.answerIndex;
  const got = chosen!=null;
  let v = got
    ? '<div class="verdict '+(correct?'ok':'no')+'"><span class="pin">'+(correct?'CORRECT':'NOT QUITE')+'</span>You chose '+LETTERS[chosen]+' · answer is '+LETTERS[q.answerIndex]+'</div>'
    : '<div class="verdict ok"><span class="pin">ANSWER</span>The answer is '+LETTERS[q.answerIndex]+'</div>';
  return v+'<div class="reasoning"><span class="lbl">Worked solution</span>'+q.reasoning+'</div>';
}

function pick(id,i){
  const list=curList(); const q=list.find(x=>x.id===id);
  if(state.view==='quizQ'){ quiz.answers[id]=i; }
  else { store.answers[id]=i; store.revealed[id]=true; save(); }
  render();
}
function toggleReveal(id){store.revealed[id]=!store.revealed[id];save();render();}
function toggleFlag(id){quiz.flags[id]=!quiz.flags[id];render();}
function navQ(d){const list=curList();state.idx=Math.max(0,Math.min(list.length-1,state.idx+d));go(state.view);}
function jumpQ(i){state.idx=i;go(state.view);}

/* ------------------------------------------------ QUIZ */
function viewQuizSetup(){
  let opts=SECTIONS.map(s=>{const n=secCount(s.key);return '<button class="opt" '+(n?'':'disabled')+' onclick="startQuiz(\''+s.key+'\')"><span class="bub">'+s.name[0]+'</span><span><b>'+s.name+'</b> — '+(n||'—')+' questions · ~'+Math.round(n*1.1)+' min</span></button>';}).join('');
  const tot=totalCount();
  return '<div class="qhead" style="margin-top:18px"><span class="crumb">Mock test · <b>timed</b></span></div>'+
    '<div class="paper"><div class="qbody">'+
    '<div class="stem">Choose your mock</div>'+
    '<p style="color:var(--ink-soft);margin-bottom:18px">Timed at roughly a minute per question — the managerial pace. No solutions until you submit; flag anything you want to revisit.</p>'+
    '<div class="opts" style="margin-bottom:16px"><button class="opt sel" onclick="startQuiz(\'all\')"><span class="bub">★</span><span><b>Full mock</b> — all '+tot+' questions across four sections · ~'+Math.round(tot*1.1)+' min</span></button></div>'+
    '<div class="stem" style="font-size:1rem">…or a single section</div>'+
    '<div class="opts">'+opts+'</div>'+
    '</div></div>';
}

function startQuiz(key){
  let qs=[];
  if(key==='all')SECTIONS.forEach(s=>qs=qs.concat(BANK[s.key]||[]));
  else qs=(BANK[key]||[]).slice();
  if(!qs.length){toast('That section is still being finalised.');return;}
  const limit=Math.round(qs.length*60); // 60s/question
  quiz={key,questions:qs,answers:{},flags:{},start:Date.now(),limit,endsAt:Date.now()+limit*1000,submitted:false,timer:null};
  state.view='quizQ';state.idx=0;
  render();startTimer();
}
function startTimer(){
  if(quiz.timer)clearInterval(quiz.timer);
  const tick=()=>{
    const el=document.getElementById('timer'); if(!el){return;}
    let left=Math.max(0,Math.round((quiz.endsAt-Date.now())/1000));
    const m=Math.floor(left/60),s=left%60;
    el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
    el.classList.toggle('warn',left<=60);
    if(left<=0){clearInterval(quiz.timer);submitQuiz(true);}
  };
  tick();quiz.timer=setInterval(tick,1000);
}
function submitQuiz(auto){
  if(quiz.timer)clearInterval(quiz.timer);
  quiz.submitted=true;quiz.elapsed=Math.round((Date.now()-quiz.start)/1000);
  if(auto)toast("Time's up — test submitted.");
  go('results');
}

function viewResults(){
  const qs=quiz.questions; let correct=0;
  const bySec={};
  qs.forEach(q=>{const ok=quiz.answers[q.id]===q.answerIndex;if(ok)correct++;
    (bySec[q.section]=bySec[q.section]||{c:0,t:0}); bySec[q.section].t++; if(ok)bySec[q.section].c++;});
  const pct=Math.round(correct/qs.length*100);
  const band = pct>=85?'Outstanding':pct>=70?'Strong':pct>=55?'Solid — keep pushing':pct>=40?'Developing':'Early days';
  const mm=Math.floor(quiz.elapsed/60),ss=quiz.elapsed%60;

  let cards=Object.keys(bySec).map(k=>{const b=bySec[k],p=Math.round(b.c/b.t*100);
    const name=SECTIONS.find(s=>s.key===k).name;
    return '<div class="rcard"><div class="rt">'+name+'</div><div class="rv">'+b.c+'/'+b.t+'</div>'+
      '<div class="bar"><i style="width:'+p+'%;background:'+(p>=70?'var(--good)':p>=50?'var(--accent)':'var(--bad)')+'"></i></div></div>';
  }).join('');

  // review chart (reuse bar renderer)
  const chart={chartType:'bar',dataTitle:'Accuracy by section',unit:'%',labels:Object.keys(bySec).map(k=>SECTIONS.find(s=>s.key===k).name.split(' ')[0]),
    series:[{name:'Accuracy',values:Object.keys(bySec).map(k=>Math.round(bySec[k].c/bySec[k].t*100))}]};

  return '<div class="result-hero"><div class="score"><em>'+correct+'</em> / '+qs.length+'</div>'+
    '<div class="band">'+pct+'% · '+band+' · '+ (mm? mm+'m ':'')+ss+'s</div></div>'+
    '<div class="result-grid">'+cards+'</div>'+
    (Object.keys(bySec).length>1? renderChart(chart):'')+
    '<div class="qfoot" style="justify-content:center;margin-top:24px">'+
      '<button class="btn accent" onclick="reviewQuiz()">Review answers</button>'+
      '<button class="btn ghost" onclick="go(\'quizSetup\')">Another test</button>'+
      '<button class="btn ghost" onclick="go(\'home\')">Home</button>'+
    '</div>';
}
function reviewQuiz(){
  // turn quiz answers into study-style reveal: copy into store and open as study list
  quiz.questions.forEach(q=>{if(quiz.answers[q.id]!=null){store.answers[q.id]=quiz.answers[q.id];store.revealed[q.id]=true;}else{store.revealed[q.id]=true;}});
  save();
  // build a transient review by reusing studyQ over the quiz section(s)
  state.reviewList=quiz.questions; state.section=quiz.key==='all'?'numerical':quiz.key;
  // use a dedicated review view via studyQ but on quiz.questions
  state.view='reviewQ';state.idx=0;render();
}

/* review reuses question view over quiz.questions */
const _origCur=curList;
curList=function(){ if(state.view==='reviewQ')return quiz.questions; return _origCur(); };
const _origRender=render;
render=function(){ if(state.view==='reviewQ'){renderNav();document.getElementById('app').innerHTML=viewQuestion('study');return;} _origRender(); };

/* ------------------------------------------------ ANSWER KEY */
let keyFilter='all';
function viewKey(){
  let segs=[['all','All']].concat(SECTIONS.map(s=>[s.key,s.name.split(' ')[0]]));
  let controls='<div class="key-controls"><div class="seg">'+segs.map(([k,l])=>'<button class="'+(keyFilter===k?'on':'')+'" onclick="setKeyFilter(\''+k+'\')">'+l+'</button>').join('')+'</div>'+
    '<button class="btn ghost" onclick="window.print()">Print / Save PDF</button></div>';
  let body='';
  const secs = keyFilter==='all'? SECTIONS.map(s=>s.key) : [keyFilter];
  secs.forEach(k=>{
    const list=BANK[k]||[]; if(!list.length)return;
    body+='<div class="key-sec-title">'+SECTIONS.find(s=>s.key===k).name+'</div>';
    list.forEach((q,i)=>{
      body+='<div class="key-item"><div class="kh"><span class="kid">'+q.id+'</span>'+
        '<span class="kans">Answer: '+LETTERS[q.answerIndex]+(q.options[q.answerIndex]&&q.options[q.answerIndex].text?' · '+esc(q.options[q.answerIndex].text):'')+'</span></div>'+
        (q.passage?'<div style="font-size:.85rem;color:var(--ink-faint);margin-bottom:6px;font-style:italic">Passage '+esc(q.passageId||'')+'</div>':'')+
        '<div class="kstem">'+ (q.context? '<i style="color:var(--ink-soft)">'+esc(q.context).slice(0,160)+(q.context.length>160?'…':'')+'</i><br>':'') + q.stem+'</div>'+
        '<div class="kreason"><b style="color:var(--accent)">Why:</b> '+q.reasoning+'</div></div>';
    });
  });
  return '<div class="qhead" style="margin-top:18px"><span class="crumb">Answer key · <b>all worked solutions</b></span></div>'+controls+(body||'<p style="color:var(--ink-soft)">Questions are still being finalised — check back in a moment.</p>');
}
function setKeyFilter(k){keyFilter=k;render();}

/* ------------------------------------------------ BOOT */
function boot(){
  load();
  setTheme(store.theme||'light');
  buildBank();
  render();
}
boot();
</script>
</body>
</html>
