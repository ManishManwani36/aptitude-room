<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Aptitude Room — SHL Managerial Practice</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2040%2040%22%3E%3Ccircle%20cx%3D%2220%22%20cy%3D%2220%22%20r%3D%2219%22%20fill%3D%22%23bd4d2b%22%2F%3E%3Cpath%20d%3D%22M12%2020.5l5%205L29%2013%22%20fill%3D%22none%22%20stroke%3D%22%23fff%22%20stroke-width%3D%223.6%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%2F%3E%3C%2Fsvg%3E">
<meta name="description" content="A managerial-level SHL practice bank: 80 questions across Numerical, Verbal, Inductive and Deductive reasoning, with worked solutions.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================= THEME */
:root{
  --bg:#f3ecdd; --bg-2:#fbf7ee; --panel:#fffdf8;
  --ink:#22242b; --ink-soft:#6c6457; --ink-faint:#9a9080;
  --line:#e4dac6; --line-strong:#d2c5aa;
  --accent:#bd4d2b; --accent-deep:#9a3c20; --accent-soft:#f0dccf;
  --good:#2f7d57; --good-soft:#dcebdf; --bad:#b23b3b; --warn:#b5862f;
  --fig-ink:#26262c; --fig-grey:#c7bca4; --fig-accent:#bd4d2b;
  --shadow:0 1px 2px rgba(60,45,20,.06), 0 8px 24px -12px rgba(60,45,20,.18);
  --shadow-lg:0 2px 4px rgba(60,45,20,.08), 0 22px 50px -22px rgba(60,45,20,.30);
  --r:14px; --r-sm:9px;
  --serif:'Newsreader',Georgia,'Times New Roman',serif;
  --display:'Fraunces',Georgia,serif;
  --sans:'IBM Plex Sans',-apple-system,'Segoe UI',system-ui,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,monospace;
}
html[data-theme="dark"]{
  --bg:#14151c; --bg-2:#1b1d27; --panel:#21232f;
  --ink:#ece5d6; --ink-soft:#a9a290; --ink-faint:#776f5f;
  --line:#2b2d3a; --line-strong:#3a3d4d;
  --accent:#e07a4f; --accent-deep:#f0936b; --accent-soft:#3a2820;
  --good:#5fc08a; --good-soft:#1f3a2c; --bad:#e87b7b; --warn:#d7a martin;
  --warn:#d7a martin; --warn:#d6a martin;
  --warn:#d6a martin;
  --fig-ink:#ece5d6; --fig-grey:#6a6557; --fig-accent:#e07a4f;
  --shadow:0 1px 2px rgba(0,0,0,.3), 0 10px 30px -14px rgba(0,0,0,.6);
  --shadow-lg:0 2px 6px rgba(0,0,0,.4), 0 26px 60px -26px rgba(0,0,0,.7);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg); color:var(--ink); font-family:var(--sans);
  font-size:16px; line-height:1.55; -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(circle at 12% -8%, rgba(189,77,43,.06), transparent 42%),
    radial-gradient(circle at 100% 0%, rgba(120,110,80,.06), transparent 38%);
  background-attachment:fixed;
}
/* subtle paper grain */
body::before{
  content:""; position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.5;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/></svg>");
  mix-blend-mode:multiply;
}
html[data-theme="dark"] body::before{mix-blend-mode:screen;opacity:.4}
::selection{background:var(--accent-soft);color:var(--ink)}
a{color:var(--accent-deep);text-decoration:none}
button{font-family:inherit}

/* ============================================================= LAYOUT */
.shell{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:0 22px 96px}
.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:18px;
  padding:14px 0 13px;margin-bottom:8px;
  background:linear-gradient(var(--bg) 72%, transparent);}
.brand{display:flex;align-items:center;gap:11px;cursor:pointer;user-select:none}
.brand .seal{width:34px;height:34px;flex:none}
.brand h1{font-family:var(--display);font-weight:600;font-size:1.18rem;letter-spacing:-.01em;line-height:1}
.brand h1 em{font-style:italic;color:var(--accent);font-weight:500}
.brand .sub{font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);font-weight:500;margin-top:3px}
.spacer{flex:1}
.nav{display:flex;gap:2px;background:var(--bg-2);border:1px solid var(--line);border-radius:999px;padding:4px}
.nav button{border:none;background:none;color:var(--ink-soft);font-size:.82rem;font-weight:500;
  padding:7px 15px;border-radius:999px;cursor:pointer;transition:.18s;white-space:nowrap}
.nav button:hover{color:var(--ink)}
.nav button.on{background:var(--ink);color:var(--bg-2);box-shadow:var(--shadow)}
html[data-theme="dark"] .nav button.on{background:var(--accent);color:#1a1206}
.iconbtn{width:38px;height:38px;flex:none;border:1px solid var(--line);background:var(--bg-2);
  border-radius:999px;cursor:pointer;color:var(--ink-soft);display:grid;place-items:center;transition:.18s}
.iconbtn:hover{color:var(--ink);border-color:var(--line-strong)}
.iconbtn svg{width:18px;height:18px}
.testswitch{display:inline-flex;align-items:center;gap:7px;background:var(--bg-2);border:1px solid var(--line);border-radius:999px;padding:5px 7px 5px 14px}
.testswitch .tslabel{font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
.testswitch button{width:30px;height:30px;border-radius:999px;border:1.5px solid transparent;background:none;color:var(--ink-soft);font-family:var(--display);font-weight:600;font-size:1rem;cursor:pointer;transition:.15s}
.testswitch button:hover{color:var(--ink)}
.testswitch button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
html[data-theme="dark"] .testswitch button.on{color:#1a1206}
.testbar{display:flex;align-items:center;gap:16px;margin-bottom:18px;flex-wrap:wrap}
.testdesc{font-size:.9rem;color:var(--ink-soft);font-family:var(--serif);font-style:italic}

/* ============================================================= HOME */
.hero{padding:30px 0 18px;display:grid;grid-template-columns:1.4fr .9fr;gap:34px;align-items:end}
@media(max-width:780px){.hero{grid-template-columns:1fr;gap:20px}}
.hero .kicker{font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:14px}
.hero h2{font-family:var(--display);font-weight:600;font-size:clamp(2.1rem,5vw,3.3rem);line-height:1.02;letter-spacing:-.02em}
.hero h2 em{font-style:italic;color:var(--accent)}
.hero p{margin-top:16px;color:var(--ink-soft);font-family:var(--serif);font-size:1.12rem;max-width:46ch}
.hero-stats{display:flex;gap:26px;justify-self:end}
@media(max-width:780px){.hero-stats{justify-self:start}}
.hstat{text-align:right}
.hstat .n{font-family:var(--display);font-weight:600;font-size:2.4rem;line-height:1;color:var(--ink)}
.hstat .l{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin-top:6px}
.rule{height:1px;background:linear-gradient(90deg,var(--line-strong),transparent);margin:30px 0 26px}

.sec-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
@media(max-width:680px){.sec-grid{grid-template-columns:1fr}}
.sec-card{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
  padding:22px 22px 18px;box-shadow:var(--shadow);overflow:hidden;
  opacity:0;transform:translateY(14px);animation:rise .6s cubic-bezier(.2,.7,.2,1) forwards}
.sec-card:nth-child(1){animation-delay:.05s}.sec-card:nth-child(2){animation-delay:.13s}
.sec-card:nth-child(3){animation-delay:.21s}.sec-card:nth-child(4){animation-delay:.29s}
@keyframes rise{to{opacity:1;transform:none}}
.sec-card .idx{position:absolute;top:6px;right:14px;font-family:var(--display);font-weight:600;
  font-size:5.4rem;line-height:1;color:var(--ink);opacity:.05;pointer-events:none}
.sec-card .glyph{width:50px;height:50px;margin-bottom:14px;color:var(--accent)}
.sec-card h3{font-family:var(--display);font-weight:600;font-size:1.35rem;letter-spacing:-.01em}
.sec-card .tag{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin:3px 0 10px}
.sec-card p{font-size:.92rem;color:var(--ink-soft);min-height:3.1em}
.sec-card .meta{display:flex;gap:16px;margin-top:14px;padding-top:13px;border-top:1px dashed var(--line-strong);font-size:.8rem;color:var(--ink-soft)}
.sec-card .meta b{color:var(--ink);font-variant-numeric:tabular-nums}
.sec-card .acts{display:flex;gap:9px;margin-top:15px}
.btn{border:1px solid var(--ink);background:var(--ink);color:var(--bg-2);border-radius:var(--r-sm);
  padding:9px 15px;font-size:.85rem;font-weight:600;cursor:pointer;transition:.16s;letter-spacing:.01em}
.btn:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.btn.ghost{background:transparent;color:var(--ink);border-color:var(--line-strong)}
.btn.ghost:hover{border-color:var(--ink);background:var(--bg-2)}
.btn.accent{background:var(--accent);border-color:var(--accent);color:#fff}
html[data-theme="dark"] .btn{background:var(--accent);border-color:var(--accent);color:#1a1206}
html[data-theme="dark"] .btn.ghost{background:transparent;color:var(--ink);border-color:var(--line-strong)}
html[data-theme="dark"] .btn.accent{background:var(--accent);color:#1a1206}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn.lg{padding:13px 26px;font-size:.95rem}

.banner{display:flex;flex-wrap:wrap;align-items:center;gap:16px;justify-content:space-between;
  background:var(--bg-2);border:1px solid var(--line);border-left:4px solid var(--accent);
  border-radius:var(--r);padding:18px 22px;margin-top:26px}
.banner h4{font-family:var(--display);font-weight:600;font-size:1.15rem}
.banner p{font-size:.88rem;color:var(--ink-soft);max-width:52ch}
.banner .acts{display:flex;gap:10px}

.tips{margin-top:30px;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:22px 24px;box-shadow:var(--shadow)}
.tips h4{font-family:var(--display);font-weight:600;font-size:1.1rem;margin-bottom:6px}
.tips ul{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:9px 26px;margin-top:12px}
@media(max-width:680px){.tips ul{grid-template-columns:1fr}}
.tips li{font-size:.88rem;color:var(--ink-soft);padding-left:20px;position:relative}
.tips li::before{content:"";position:absolute;left:0;top:.62em;width:7px;height:7px;border-radius:2px;background:var(--accent);transform:rotate(45deg)}

/* ============================================================= QUESTION VIEW */
.qhead{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin:6px 0 16px}
.qhead .crumb{font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:500}
.qhead .crumb b{color:var(--accent)}
.qhead .mode-pill{font-family:var(--mono);font-size:.72rem;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;padding:4px 10px;border-radius:999px;background:var(--accent-soft);color:var(--accent-deep)}
.qhead .timer{margin-left:auto;font-family:var(--mono);font-weight:600;font-size:1.05rem;
  padding:6px 14px;border-radius:999px;border:1px solid var(--line);background:var(--bg-2);color:var(--ink);font-variant-numeric:tabular-nums}
.qhead .timer.warn{color:var(--bad);border-color:var(--bad);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.55}}

.paper{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
  box-shadow:var(--shadow-lg);overflow:hidden}
.paper . qbody, .qbody{padding:30px 34px 28px}
@media(max-width:620px){.qbody{padding:22px 18px}}
.qnum{font-family:var(--display);font-weight:600;font-size:.95rem;color:var(--accent);letter-spacing:.02em;margin-bottom:4px}
.qtopic{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);float:right;margin-top:4px}

.passage{font-family:var(--serif);font-size:1.07rem;line-height:1.72;color:var(--ink);
  background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r-sm);
  padding:20px 24px;margin-bottom:20px;position:relative;max-width:66ch}
.passage::before{content:"PASSAGE";position:absolute;top:-9px;left:16px;background:var(--panel);
  padding:0 8px;font-family:var(--sans);font-size:.62rem;letter-spacing:.18em;color:var(--ink-faint);font-weight:600}
.context-box{font-size:.97rem;line-height:1.65;background:var(--bg-2);border:1px solid var(--line);
  border-left:3px solid var(--accent);border-radius:var(--r-sm);padding:16px 20px;margin-bottom:18px;white-space:pre-line}
.context-box .lbl{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;display:block;margin-bottom:6px}

.stem{font-family:var(--serif);font-size:1.22rem;line-height:1.5;color:var(--ink);margin:4px 0 20px;font-weight:500}
.stem.q{font-weight:500}

/* charts + figures */
.viz{margin:6px 0 22px;background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r-sm);padding:18px 18px 14px}
.viz .viz-title{font-size:.8rem;font-weight:600;color:var(--ink);margin-bottom:4px;text-align:center}
.viz .viz-sub{font-size:.68rem;color:var(--ink-faint);text-align:center;margin-bottom:10px;letter-spacing:.04em}
svg.chart{width:100%;height:auto;display:block;overflow:visible;font-family:var(--mono)}
.chart text{fill:var(--ink-soft);font-size:11px}
.chart .axis{stroke:var(--line-strong);stroke-width:1}
.chart .grid{stroke:var(--line);stroke-width:1;stroke-dasharray:2 3}
.chart .vlabel{fill:var(--ink);font-weight:600;font-size:10.5px}
.legend{display:flex;flex-wrap:wrap;gap:6px 18px;justify-content:center;margin-top:10px}
.legend span{display:inline-flex;align-items:center;gap:7px;font-size:.78rem;color:var(--ink-soft)}
.legend i{width:11px;height:11px;border-radius:3px;display:inline-block}
.dtable{width:100%;border-collapse:collapse;font-size:.9rem}
.dtable caption{font-size:.8rem;font-weight:600;margin-bottom:8px;color:var(--ink)}
.dtable th,.dtable td{border:1px solid var(--line);padding:7px 11px;text-align:right;font-variant-numeric:tabular-nums}
.dtable th{background:var(--bg);font-weight:600;color:var(--ink);font-size:.82rem}
.dtable td:first-child,.dtable th:first-child{text-align:left;font-weight:500}
.dtable tbody tr:nth-child(even){background:var(--bg)}

/* inductive figure layouts */
.fig{width:100%;height:100%;display:block}
.fig .ln{stroke:var(--fig-ink);stroke-width:3.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.fig .s-none{fill:transparent;stroke:var(--fig-ink);stroke-width:3.2}
.fig .s-grey{fill:var(--fig-grey);stroke:var(--fig-ink);stroke-width:3.2}
.fig .s-accent{fill:var(--fig-accent);stroke:var(--fig-ink);stroke-width:3.2}
.fig .s-ink{fill:var(--fig-ink);stroke:var(--fig-ink);stroke-width:3.2}
.fig .dot{fill:var(--fig-ink);stroke:none}
.fig .dot-a{fill:var(--fig-accent);stroke:none}
.fig .dot-g{fill:var(--fig-grey);stroke:var(--fig-ink);stroke-width:1.5}
.fig polygon,.fig circle,.fig rect,.fig line,.fig path{vector-effect:non-scaling-stroke}
.frames{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:center;margin:4px 0 8px}
.frame{width:84px;height:84px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px}
.frame.q{display:grid;place-items:center;border-style:dashed;border-color:var(--accent);color:var(--accent);
  font-family:var(--display);font-size:2.2rem;font-weight:600}
.arrow-sep{color:var(--ink-faint);font-size:1.4rem}
.matrix{display:inline-grid;grid-template-columns:repeat(3,84px);gap:10px;margin:4px auto 8px;justify-content:center}
.mcell{width:84px;height:84px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px}
.mcell.q{display:grid;place-items:center;border-style:dashed;border-color:var(--accent);color:var(--accent);font-family:var(--display);font-size:2.2rem;font-weight:600}
.matrix-wrap{text-align:center}
.analogy{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin:4px 0 10px}
.analogy .pair{display:flex;align-items:center;gap:8px}
.analogy .op{font-family:var(--display);font-size:1.5rem;color:var(--ink-faint)}
.analogy .frame.sm{width:74px;height:74px}

/* options */
.opts{display:grid;gap:10px;margin-top:6px}
.opts.grid{grid-template-columns:repeat(auto-fit,minmax(120px,1fr))}
.opt{display:flex;align-items:center;gap:13px;text-align:left;width:100%;
  background:var(--bg-2);border:1.5px solid var(--line);border-radius:var(--r-sm);
  padding:13px 16px;cursor:pointer;transition:.15s;color:var(--ink);font-size:.97rem;line-height:1.4}
.opt:hover{border-color:var(--line-strong);background:var(--panel);transform:translateX(2px)}
.opt .bub{width:26px;height:26px;flex:none;border:2px solid var(--line-strong);border-radius:999px;
  display:grid;place-items:center;font-family:var(--mono);font-weight:600;font-size:.8rem;color:var(--ink-soft);transition:.15s}
.opt.fig-opt{flex-direction:column;align-items:stretch;gap:10px;padding:14px}
.opt.fig-opt .figbox{width:100%;aspect-ratio:1;max-width:130px;margin:0 auto}
.opt.fig-opt .bub{align-self:flex-start}
.opt.sel{border-color:var(--accent);background:var(--accent-soft)}
.opt.sel .bub{border-color:var(--accent);background:var(--accent);color:#fff}
.opt.correct{border-color:var(--good);background:var(--good-soft)}
.opt.correct .bub{border-color:var(--good);background:var(--good);color:#fff}
.opt.wrong{border-color:var(--bad);background:color-mix(in srgb,var(--bad) 12%,transparent)}
.opt.wrong .bub{border-color:var(--bad);background:var(--bad);color:#fff}
.opt .mark{margin-left:auto;font-weight:600;font-size:.8rem;opacity:0;transition:.2s}
.opt.correct .mark,.opt.wrong .mark{opacity:1}
.opt.correct .mark{color:var(--good)}.opt.wrong .mark{color:var(--bad)}
.opt:disabled{cursor:default}
.opt:disabled:hover{transform:none}

/* reveal / reasoning */
.qfoot{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:22px}
.reveal{margin-top:20px;border-top:1px dashed var(--line-strong);padding-top:0;overflow:hidden;
  max-height:0;opacity:0;transition:max-height .45s ease,opacity .4s ease,padding .4s ease}
.reveal.show{max-height:1400px;opacity:1;padding-top:20px}
.verdict{display:inline-flex;align-items:center;gap:9px;font-family:var(--display);font-weight:600;font-size:1.05rem;margin-bottom:10px}
.verdict .pin{font-family:var(--mono);font-size:.8rem;padding:3px 10px;border-radius:6px}
.verdict.ok .pin{background:var(--good-soft);color:var(--good)}
.verdict.no .pin{background:color-mix(in srgb,var(--bad) 15%,transparent);color:var(--bad)}
.reasoning{font-family:var(--serif);font-size:1.05rem;line-height:1.68;color:var(--ink)}
.reasoning .lbl{font-family:var(--sans);font-size:.64rem;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:600;display:block;margin-bottom:7px}
.reasoning b{color:var(--ink);font-weight:600}

/* nav rail / OMR bubble sheet */
.rail{margin-top:26px;background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px}
.rail .rhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.rail .rhead span{font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
.omr{display:flex;flex-wrap:wrap;gap:7px}
.omr button{width:34px;height:34px;border-radius:999px;border:1.5px solid var(--line-strong);
  background:var(--panel);color:var(--ink-soft);font-family:var(--mono);font-size:.78rem;font-weight:600;
  cursor:pointer;transition:.14s;position:relative}
.omr button:hover{border-color:var(--ink);color:var(--ink)}
.omr button.cur{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.omr button.done{background:var(--ink);color:var(--bg-2);border-color:var(--ink)}
html[data-theme="dark"] .omr button.done{background:var(--accent);color:#1a1206;border-color:var(--accent)}
.omr button.right{background:var(--good);border-color:var(--good);color:#fff}
.omr button.wrong{background:var(--bad);border-color:var(--bad);color:#fff}
.omr button.flag::after{content:"";position:absolute;top:-2px;right:-2px;width:9px;height:9px;border-radius:999px;background:var(--warn);border:1.5px solid var(--panel)}

.pager{display:flex;align-items:center;gap:12px;margin-top:22px}
.pager .pinfo{font-family:var(--mono);font-size:.82rem;color:var(--ink-soft)}

/* results */
.result-hero{text-align:center;padding:26px 0 8px}
.result-hero .score{font-family:var(--display);font-weight:600;font-size:clamp(3rem,9vw,5rem);line-height:1;letter-spacing:-.02em}
.result-hero .score em{font-style:normal;color:var(--accent)}
.result-hero .band{font-family:var(--mono);font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);margin-top:8px}
.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin:26px 0}
.rcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
.rcard .rt{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
.rcard .rv{font-family:var(--display);font-weight:600;font-size:1.9rem;margin-top:6px}
.rcard .bar{height:7px;border-radius:6px;background:var(--line);margin-top:10px;overflow:hidden}
.rcard .bar i{display:block;height:100%;border-radius:6px;background:var(--accent)}

/* answer key */
.key-controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:14px 0 20px}
.key-controls .seg{display:flex;background:var(--bg-2);border:1px solid var(--line);border-radius:999px;padding:3px}
.key-controls .seg button{border:none;background:none;padding:6px 13px;border-radius:999px;font-size:.8rem;color:var(--ink-soft);cursor:pointer}
.key-controls .seg button.on{background:var(--ink);color:var(--bg-2)}
html[data-theme="dark"] .key-controls .seg button.on{background:var(--accent);color:#1a1206}
.key-item{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;margin-bottom:12px;box-shadow:var(--shadow)}
.key-item .kh{display:flex;gap:12px;align-items:baseline;margin-bottom:8px}
.key-item .kid{font-family:var(--mono);font-size:.78rem;color:var(--accent);font-weight:600}
.key-item .kans{font-family:var(--mono);font-weight:600;color:var(--good);margin-left:auto;font-size:.85rem}
.key-item .kstem{font-family:var(--serif);font-size:1.02rem;color:var(--ink)}
.key-item .kreason{font-size:.92rem;color:var(--ink-soft);margin-top:8px;line-height:1.6}
.key-sec-title{font-family:var(--display);font-weight:600;font-size:1.5rem;margin:26px 0 14px;display:flex;align-items:center;gap:12px}
.key-sec-title::after{content:"";flex:1;height:1px;background:var(--line-strong)}

footer{text-align:center;color:var(--ink-faint);font-size:.78rem;margin-top:50px;line-height:1.7}
footer b{color:var(--ink-soft)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);z-index:90;
  background:var(--ink);color:var(--bg-2);padding:11px 20px;border-radius:999px;font-size:.85rem;
  box-shadow:var(--shadow-lg);opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:640px){
  .topbar{flex-wrap:wrap;gap:10px 12px;padding-bottom:10px}
  .brand{order:1}
  #themeBtn{order:2;margin-left:auto}
  .spacer{display:none}
  .nav{order:3;width:100%;overflow-x:auto;justify-content:flex-start;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .nav::-webkit-scrollbar{display:none}
  .nav button{padding:7px 13px;flex:none}
  .viz{overflow-x:auto}
}
@media print{
  .topbar,.rail,.pager,.qfoot,.key-controls,.banner,.nav,.iconbtn,footer .noprint{display:none!important}
  body{background:#fff}
  body::before{display:none}
  .key-item,.paper{box-shadow:none;break-inside:avoid}
}
</style>

<body>
<div class="shell">
  <header class="topbar">
    <div class="brand" onclick="go('home')">
      <svg class="seal" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="18.5" stroke="var(--accent)" stroke-width="1.5"/><circle cx="20" cy="20" r="14" stroke="var(--ink)" stroke-width="1" stroke-dasharray="2 2.5"/><path d="M13 21.5l4.5 4.5L28 14" stroke="var(--accent)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <div>
        <h1>The Aptitude <em>Room</em></h1>
        <div class="sub">SHL · Managerial Practice</div>
      </div>
    </div>
    <div class="spacer"></div>
    <nav class="nav" id="nav"></nav>
    <button class="iconbtn" id="themeBtn" title="Toggle theme" onclick="toggleTheme()"></button>
  </header>
  <main id="app"></main>
  <footer>
    <p><b>The Aptitude Room</b> — 80 original practice questions in the SHL managerial style, with fully worked solutions.</p>
    <p class="noprint">Practice, not prophecy. These are original items written to mirror real SHL formats — not actual test content.</p>
  </footer>
</div>
<div class="toast" id="toast"></div>

<script>
/* ===================================================================
   THE APTITUDE ROOM — SHL managerial practice bank (single-file app)
   Sections: Numerical · Verbal · Inductive · Deductive (20 each)
   =================================================================== */

/* ------------------------------------------------ INDUCTIVE ENGINE
   Every abstract-reasoning item is built from a rule, and the correct
   option is generated BY that rule — so the key is correct by construction.
*/
const ENG = (function(){
  const R = (d)=> (d*Math.PI/180);
  function polyPts(n,cx,cy,r,rot){let p=[];for(let i=0;i<n;i++){const a=R(-90+rot+i*360/n);p.push((cx+r*Math.cos(a)).toFixed(1)+','+(cy+r*Math.sin(a)).toFixed(1));}return p.join(' ');}
  const poly =(n,cx,cy,r,rot,cls)=>'<polygon points="'+polyPts(n,cx,cy,r,rot)+'" class="'+cls+'"/>';
  const circ =(cx,cy,r,cls)=>'<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" class="'+cls+'"/>';
  const dot  =(cx,cy,cls)=>'<circle cx="'+cx+'" cy="'+cy+'" r="6" class="'+(cls||'dot')+'"/>';
  const grp  =(rot,inner)=>'<g transform="rotate('+rot+' 50 50)">'+inner+'</g>';
  const fig  =(inner)=>'<svg viewBox="0 0 100 100" class="fig" preserveAspectRatio="xMidYMid meet">'+inner+'</svg>';
  const SH   = {3:'triangle',4:'square',5:'pentagon',6:'hexagon',7:'heptagon',8:'octagon'};
  // N dots evenly on a ring
  function dotsRing(n,cls){let s='';for(let i=0;i<n;i++){const a=R(-90+i*360/n);s+=dot((50+27*Math.cos(a)).toFixed(1),(50+27*Math.sin(a)).toFixed(1),cls);}return s;}
  // arrow pointing up, rotated
  const arrow=(rot,headCls)=>grp(rot,'<line x1="50" y1="76" x2="50" y2="30" class="ln"/><polygon points="50,18 39,40 61,40" class="'+(headCls||'s-ink')+'"/>');
  // single dial hand pointing up, rotated
  const hand =(rot)=>grp(rot,'<line x1="50" y1="52" x2="50" y2="16" class="ln"/>')+circ(50,50,5,'s-ink');
  const CORN = {TL:[30,30],TR:[70,30],BR:[70,70],BL:[30,70],C:[50,50],T:[50,28],B:[50,72],L:[28,50],Rt:[72,50]};

  // spec renderer (shape + rotation + shade + dot count)
  function spec(s){
    let i='';const sh=s.shade||'none';
    if(s.shape==='circle') i+=circ(50,50,30,'s-'+sh);
    else if(s.shape==='poly') i+=grp(s.rot||0,poly(s.sides,50,50,31,0,'s-'+sh));
    else if(s.shape==='arrow') i+=arrow(s.rot||0,'s-'+(s.shade||'ink'));
    else if(s.shape==='hand') i+=hand(s.rot||0);
    if(s.dots) i+=dotsRing(s.dots,'dot');
    if(s.corner){const c=CORN[s.corner];i+=dot(c[0],c[1],'dot-a');}
    return fig(i);
  }
  // place correct + distractors deterministically (answer position varies by n)
  function place(correctSvg,distractorSvgs,n){
    const arr=[correctSvg].concat(distractorSvgs);
    const k=n%arr.length, out=new Array(arr.length);
    for(let i=0;i<arr.length;i++) out[(i+k)%arr.length]=arr[i];
    return {options:out.map(svg=>({svg})),answerIndex:k};
  }
  return {R,poly,circ,dot,grp,fig,SH,dotsRing,arrow,hand,CORN,spec,place,polyPts};
})();

/* ---- the 20 inductive questions (each returns a normalized object) ---- */
function buildInductive(t){
  const E=ENG, out=[];
  let n=0;
  const push=(o)=>{n++;out.push(Object.assign({id:'T'+t+'-IND-'+n,section:'inductive',number:n,type:'inductive'},o));};
  const series=(specs,ans,dist,stem,reasoning,topic)=>{
    const frames=specs.map(E.spec);
    const p=E.place(E.spec(ans),dist.map(E.spec),n+1);
    return {stem:stem||'Which figure completes the series?',visual:{kind:'inductive',layout:'series',frames},options:p.options,answerIndex:p.answerIndex,reasoning,topic};
  };

  // ===================== TEST 2 (harder) =====================
  if(t===2){
    const matrix=(specs,missingIdx,correct,dist,stem,reasoning,topic)=>{
      const cells=specs.map((c,i)=> i===missingIdx? null : E.spec(c));
      const p=E.place(E.spec(correct),dist.map(E.spec),n+1);
      return {stem:stem||'Which figure completes the grid?',visual:{kind:'inductive',layout:'matrix',cells},options:p.options,answerIndex:p.answerIndex,reasoning,topic};
    };
    const matrixRaw=(cells,correctSvg,distSvgs,stem,reasoning,topic)=>{
      const p=E.place(correctSvg,distSvgs,n+1);
      return {stem:stem||'Which figure completes the grid?',visual:{kind:'inductive',layout:'matrix',cells},options:p.options,answerIndex:p.answerIndex,reasoning,topic};
    };
    const odd=(cells,answerIndex,stem,reasoning,topic)=>({stem:stem||'Which figure is the odd one out?',visual:{kind:'inductive',layout:'oddoneout'},options:cells.map(svg=>({svg})),answerIndex,reasoning,topic});
    const analogy=(a,b,c,correct,dist,reasoning,topic)=>{const p=E.place(E.spec(correct),dist.map(E.spec),n+1);return {stem:'Figure A is to Figure B as Figure C is to&nbsp;?',visual:{kind:'inductive',layout:'analogy',a:E.spec(a),b:E.spec(b),c:E.spec(c)},options:p.options,answerIndex:p.answerIndex,reasoning,topic};};

    // 1 — hand rotates 135° clockwise (large step)
    push(series([{shape:'hand',rot:0},{shape:'hand',rot:135},{shape:'hand',rot:270},{shape:'hand',rot:45}],{shape:'hand',rot:180},[{shape:'hand',rot:315},{shape:'hand',rot:90},{shape:'hand',rot:225}],null,'The hand turns <b>135° clockwise</b> each step (0° → 135° → 270° → 45°, since 405° ≡ 45°). The next is 45° + 135° = <b>180°</b>.','Rotation'));
    // 2 — dots +1 AND fill alternates white/grey
    push(series([{shape:'circle',shade:'none',dots:3},{shape:'circle',shade:'grey',dots:4},{shape:'circle',shade:'none',dots:5},{shape:'circle',shade:'grey',dots:6}],{shape:'circle',shade:'none',dots:7},[{shape:'circle',shade:'grey',dots:7},{shape:'circle',shade:'none',dots:6},{shape:'circle',shade:'none',dots:8}],null,'Two rules run together: the dot count rises by one (3, 4, 5, 6) and the fill alternates white / grey. Next comes <b>7 dots, unfilled</b>.','Two rules'));
    // 3 — arrow rotates 45° AND head shade cycles hollow→grey→black
    push(series([{shape:'arrow',rot:0,shade:'none'},{shape:'arrow',rot:45,shade:'grey'},{shape:'arrow',rot:90,shade:'ink'},{shape:'arrow',rot:135,shade:'none'}],{shape:'arrow',rot:180,shade:'grey'},[{shape:'arrow',rot:180,shade:'none'},{shape:'arrow',rot:135,shade:'ink'},{shape:'arrow',rot:225,shade:'grey'}],null,'The arrow rotates <b>45° clockwise</b> while its head cycles hollow → grey → black → hollow. After the hollow head at 135°, the next is <b>180° with a grey head</b>.','Two rules'));
    // 4 — hand rotates 90° ANTICLOCKWISE AND dots +1
    push(series([{shape:'hand',rot:0,dots:1},{shape:'hand',rot:270,dots:2},{shape:'hand',rot:180,dots:3},{shape:'hand',rot:90,dots:4}],{shape:'hand',rot:0,dots:5},[{shape:'hand',rot:0,dots:4},{shape:'hand',rot:90,dots:5},{shape:'hand',rot:180,dots:5}],null,'The hand turns <b>90° anticlockwise</b> each step (0° → 270° → 180° → 90°) while the dots increase by one. Next: hand back at the <b>top with 5 dots</b>.','Two rules'));
    // 5 — sides +1 AND dots +1
    push(series([{shape:'poly',sides:3,shade:'none',dots:1},{shape:'poly',sides:4,shade:'none',dots:2},{shape:'poly',sides:5,shade:'none',dots:3},{shape:'poly',sides:6,shade:'none',dots:4}],{shape:'poly',sides:7,shade:'none',dots:5},[{shape:'poly',sides:6,shade:'none',dots:5},{shape:'poly',sides:7,shade:'none',dots:4},{shape:'poly',sides:8,shade:'none',dots:5}],null,'Both attributes advance together: the shape gains a side (3 → 4 → 5 → 6) and the dot count rises (1 → 2 → 3 → 4). Next is a <b>7-sided figure with 5 dots</b>.','Two rules'));
    // 6 — dot steps one position clockwise around eight points
    (function(){
      const P=[[28,28],[50,24],[72,28],[76,50],[72,72],[50,76],[28,72],[24,50]];
      const sq='<rect x="22" y="22" width="56" height="56" rx="4" class="s-none"/>';
      const cell=(i)=>E.fig(sq+E.dot(P[i][0],P[i][1],'dot-a'));
      const frames=[cell(0),cell(1),cell(2),cell(3)];
      const p=E.place(cell(4),[cell(6),cell(5),cell(7)],n+1);
      push({stem:'Which figure continues the series?',visual:{kind:'inductive',layout:'series',frames},options:p.options,answerIndex:p.answerIndex,reasoning:'The dot moves <b>one position clockwise</b> around eight points on the square (top-left → top → top-right → right). The next position is the <b>bottom-right corner</b>.',topic:'Position'});
    })();
    // 7 — triangle rotates 30° CW AND dots +1
    push(series([{shape:'poly',sides:3,shade:'none',rot:0,dots:1},{shape:'poly',sides:3,shade:'none',rot:30,dots:2},{shape:'poly',sides:3,shade:'none',rot:60,dots:3},{shape:'poly',sides:3,shade:'none',rot:90,dots:4}],{shape:'poly',sides:3,shade:'none',rot:120,dots:5},[{shape:'poly',sides:3,shade:'none',rot:120,dots:4},{shape:'poly',sides:3,shade:'none',rot:90,dots:5},{shape:'poly',sides:3,shade:'none',rot:150,dots:5}],null,'The triangle rotates <b>30° clockwise</b> and gains a dot each step. Next: triangle at <b>120° with 5 dots</b>.','Two rules'));
    // 8 — square rotates 45° AND fill cycles four shades
    push(series([{shape:'poly',sides:4,rot:0,shade:'none'},{shape:'poly',sides:4,rot:45,shade:'grey'},{shape:'poly',sides:4,rot:90,shade:'accent'},{shape:'poly',sides:4,rot:135,shade:'ink'}],{shape:'poly',sides:4,rot:180,shade:'none'},[{shape:'poly',sides:4,rot:180,shade:'grey'},{shape:'poly',sides:4,rot:135,shade:'none'},{shape:'poly',sides:4,rot:90,shade:'ink'}],null,'Two rules: the square turns 45° each step (so it alternates diamond / upright) and the fill cycles white → grey → orange → black. After black, the fill resets to <b>white</b> (a diamond at 180°).','Two rules'));

    // 9 — superimposition: third cell = lines in exactly one of the first two (XOR)
    (function(){
      const L={V:'<line x1="50" y1="22" x2="50" y2="78" class="ln"/>',H:'<line x1="22" y1="50" x2="78" y2="50" class="ln"/>',D:'<line x1="26" y1="26" x2="74" y2="74" class="ln"/>'};
      const c=(ks)=>E.fig(ks.map(k=>L[k]).join(''));
      const cells=[c(['V']),c(['H']),c(['V','H']), c(['V','H']),c(['H']),c(['V']), c(['V','D']),c(['V']), null];
      push(matrixRaw(cells,c(['D']),[c(['V']),c(['V','D']),c(['H'])],null,'In each row the third cell keeps the lines found in <b>exactly one</b> of the first two — any line common to both cancels out. The bottom row holds {vertical, diagonal} and {vertical}; the shared vertical cancels, leaving the <b>lone diagonal</b>.','Superimposition (XOR)'));
    })();
    // 10 — three rules: shape by column, shade by row, dots = row number
    (function(){
      const s=(sides,shade,dots)=>({shape:'poly',sides,shade,dots});
      const specs=[s(3,'none',1),s(4,'none',1),s(5,'none',1), s(3,'grey',2),s(4,'grey',2),s(5,'grey',2), s(3,'ink',3),s(4,'ink',3),null];
      push(matrix(specs,8,s(5,'ink',3),[s(5,'ink',2),s(5,'grey',3),s(6,'ink',3)],null,'Three rules at once: across each row the shape gains a side (triangle → square → pentagon); down each column the fill darkens (white → grey → black); and the dot count equals the row number (1, 2, 3). The missing cell is a <b>black pentagon with 3 dots</b>.','Matrix (three rules)'));
    })();
    // 11 — additive number grid
    (function(){
      const d=(dots)=>({shape:'circle',shade:'none',dots});
      const specs=[d(2),d(3),d(4), d(3),d(4),d(5), d(4),d(5),null];
      push(matrix(specs,8,d(6),[d(5),d(7),d(4)],null,'The dot count rises by one for every step to the right and every step down. Continuing that pattern, the bottom-right cell holds <b>6 dots</b>.','Matrix (number)'));
    })();
    // 12 — hand rotation by column, dots by row
    (function(){
      const h=(rot,dots)=>({shape:'hand',rot,dots});
      const specs=[h(0,1),h(120,1),h(240,1), h(0,2),h(120,2),h(240,2), h(0,3),h(120,3),null];
      push(matrix(specs,8,h(240,3),[h(120,3),h(240,2),h(0,3)],null,'Across each row the hand turns 120° clockwise (0°, 120°, 240°); down each column the dot count rises (1, 2, 3). The missing cell is the hand at <b>240° with 3 dots</b>.','Matrix'));
    })();
    // 13 — arrow rotation by column, head shade by row
    (function(){
      const a=(rot,shade)=>({shape:'arrow',rot,shade});
      const specs=[a(0,'none'),a(90,'none'),a(180,'none'), a(0,'grey'),a(90,'grey'),a(180,'grey'), a(0,'ink'),a(90,'ink'),null];
      push(matrix(specs,8,a(180,'ink'),[a(180,'grey'),a(90,'ink'),a(0,'ink')],null,'Across each row the arrow rotates 90° clockwise (up → right → down); down each column the head darkens (hollow → grey → black). The final cell is a <b>downward arrow with a solid black head</b>.','Matrix'));
    })();

    // 14 — sides + dots = 8
    (function(){
      const f=(sides,dots)=>E.spec({shape:'poly',sides,shade:'none',dots});
      const cells=[f(3,5),f(4,4),f(5,3),f(4,5),f(6,2)];
      push(odd(cells,3,null,'In four figures the number of <b>sides plus dots equals 8</b> (3+5, 4+4, 5+3, 6+2). The odd one is the <b>square with 5 dots</b>, which totals 9.','Odd one out'));
    })();
    // 15 — even dot count (shapes vary, all grey)
    (function(){
      const cells=[E.spec({shape:'poly',sides:4,shade:'grey',dots:2}),E.spec({shape:'poly',sides:3,shade:'grey',dots:4}),E.spec({shape:'poly',sides:5,shade:'grey',dots:2}),E.spec({shape:'poly',sides:6,shade:'grey',dots:3}),E.spec({shape:'circle',shade:'grey',dots:4})];
      push(odd(cells,3,null,'Every figure is grey and the shape varies, but four carry an <b>even</b> number of dots (2, 4, 2, 4). The figure with <b>3 dots</b> breaks the rule.','Parity'));
    })();
    // 16 — dots = sides − 1
    (function(){
      const f=(sides,dots)=>E.spec({shape:'poly',sides,shade:'none',dots});
      const cells=[f(3,2),f(4,3),f(5,4),f(5,3),f(6,5)];
      push(odd(cells,3,null,'In four figures the dot count is <b>one fewer than the number of sides</b> (3-2, 4-3, 5-4, 6-5). The odd one is the <b>pentagon with only 3 dots</b> — it should have 4.','Relation'));
    })();
    // 17 — dot inside vs outside the shape
    (function(){
      const inC=(sides)=>E.fig(E.poly(sides,50,50,30,0,'s-grey')+E.dot(50,50,'dot'));
      const outC=E.fig(E.poly(5,50,50,28,0,'s-grey')+E.dot(50,10,'dot'));
      const circIn=E.fig(E.circ(50,50,30,'s-grey')+E.dot(50,50,'dot'));
      const cells=[inC(3),inC(4),outC,inC(6),circIn];
      push(odd(cells,2,null,'In four figures the dot sits <b>inside</b> the shape; in one it sits <b>outside</b> (above) it. The varying shapes are a distraction — the dot’s position is the rule.','Position'));
    })();

    // 18 — analogy: add a side, fill grey, add a dot
    push(analogy({shape:'poly',sides:3,shade:'none'},{shape:'poly',sides:4,shade:'grey',dots:1},{shape:'poly',sides:5,shade:'none'},{shape:'poly',sides:6,shade:'grey',dots:1},[{shape:'poly',sides:6,shade:'grey'},{shape:'poly',sides:6,shade:'none',dots:1},{shape:'poly',sides:7,shade:'grey',dots:1}],'A → B does three things: the shape gains a side (triangle → square), it is filled grey, and a dot is added. Applying all three to the pentagon in C gives a <b>grey hexagon with one dot</b>.','Analogy'));
    // 19 — analogy: rotate 90° CW and double the dots
    push(analogy({shape:'hand',rot:0,dots:1},{shape:'hand',rot:90,dots:2},{shape:'hand',rot:0,dots:2},{shape:'hand',rot:90,dots:4},[{shape:'hand',rot:90,dots:3},{shape:'hand',rot:180,dots:4},{shape:'hand',rot:90,dots:2}],'A → B rotates the hand 90° clockwise and <b>doubles</b> the dots (1 → 2). Applying the same to C (2 dots) gives the hand at <b>90° with 4 dots</b>.','Analogy'));
    // 20 — analogy: rotate 180° and change head black → grey
    push(analogy({shape:'arrow',rot:0,shade:'ink'},{shape:'arrow',rot:180,shade:'grey'},{shape:'arrow',rot:90,shade:'ink'},{shape:'arrow',rot:270,shade:'grey'},[{shape:'arrow',rot:90,shade:'grey'},{shape:'arrow',rot:270,shade:'ink'},{shape:'arrow',rot:270,shade:'none'}],'A → B turns the arrow <b>180°</b> and changes its head from black to grey. Applying that to C (pointing right, black) gives an arrow pointing <b>left (270°) with a grey head</b>.','Analogy'));

    return out;
  }

  // 1 — rotation of a single hand, +45° CW
  push(series(
    [{shape:'hand',rot:0},{shape:'hand',rot:45},{shape:'hand',rot:90},{shape:'hand',rot:135}],
    {shape:'hand',rot:180},
    [{shape:'hand',rot:225},{shape:'hand',rot:90},{shape:'hand',rot:270}],
    null,'The hand turns <b>45° clockwise</b> each step (0°, 45°, 90°, 135°). The next position is <b>180°</b> — pointing straight down.','Rotation'));

  // 2 — dot count +1
  push(series(
    [{shape:'circle',shade:'none',dots:2},{shape:'circle',shade:'none',dots:3},{shape:'circle',shade:'none',dots:4},{shape:'circle',shade:'none',dots:5}],
    {shape:'circle',shade:'none',dots:6},
    [{shape:'circle',shade:'none',dots:5},{shape:'circle',shade:'none',dots:7},{shape:'circle',shade:'none',dots:4}],
    null,'The number of dots increases by one each step (2, 3, 4, 5). The next figure must hold <b>6 dots</b>.','Quantity'));

  // 3 — polygon sides +1
  push(series(
    [{shape:'poly',sides:3,shade:'none'},{shape:'poly',sides:4,shade:'none'},{shape:'poly',sides:5,shade:'none'},{shape:'poly',sides:6,shade:'none'}],
    {shape:'poly',sides:7,shade:'none'},
    [{shape:'poly',sides:6,shade:'none'},{shape:'poly',sides:8,shade:'none'},{shape:'poly',sides:5,shade:'none'}],
    null,'Each shape gains one side: triangle (3) → square (4) → pentagon (5) → hexagon (6). The next is a <b>heptagon (7 sides)</b>.','Progression'));

  // 4 — shade cycle none→grey→accent→ink→(none)
  push(series(
    [{shape:'poly',sides:4,shade:'none'},{shape:'poly',sides:4,shade:'grey'},{shape:'poly',sides:4,shade:'accent'},{shape:'poly',sides:4,shade:'ink'}],
    {shape:'poly',sides:4,shade:'none'},
    [{shape:'poly',sides:4,shade:'grey'},{shape:'poly',sides:4,shade:'accent'},{shape:'poly',sides:4,shade:'ink'}],
    null,'The fill cycles white → grey → orange → black, then repeats. After black the cycle restarts at <b>white (unfilled)</b>.','Shading cycle'));

  // 5 — dot moves clockwise around the four corners (custom render: square outline + corner dot)
  (function(){
    const sq=()=>'<rect x="22" y="22" width="56" height="56" rx="4" class="s-none"/>';
    const cell=(corner)=>{const c=E.CORN[corner];return E.fig(sq()+E.dot(c[0],c[1],'dot-a'));};
    const order=['TL','TR','BR','BL'];
    const frames=order.map(cell);
    const correct=cell('TL');
    const dist=[cell('TR'),cell('BR'),cell('C')];
    const p=E.place(correct,dist,n+1);
    push({stem:'Which figure continues the series?',visual:{kind:'inductive',layout:'series',frames},options:p.options,answerIndex:p.answerIndex,
      reasoning:'The dot travels <b>clockwise</b> around the corners: top-left → top-right → bottom-right → bottom-left. After the bottom-left corner it returns to the <b>top-left</b>.',topic:'Position'});
  })();

  // 6 — combined: hand rotates +90° CW AND dot count +1
  push(series(
    [{shape:'hand',rot:0,dots:1},{shape:'hand',rot:90,dots:2},{shape:'hand',rot:180,dots:3},{shape:'hand',rot:270,dots:4}],
    {shape:'hand',rot:0,dots:5},
    [{shape:'hand',rot:0,dots:4},{shape:'hand',rot:90,dots:5},{shape:'hand',rot:270,dots:5}],
    null,'Two rules run at once: the hand rotates <b>90° clockwise</b> (0→90→180→270) and the dots increase by <b>one</b> each step. Next: hand back to the top (360°≡0°) with <b>5 dots</b>.','Two rules'));

  // 7 — shape alternates square/circle, dots +1
  (function(){
    const mk=(shape,d)=>E.fig((shape==='square'?E.poly(4,50,50,33,0,'s-none'):E.circ(50,50,31,'s-none'))+E.dotsRing(d,'dot'));
    const frames=[mk('square',1),mk('circle',2),mk('square',3),mk('circle',4)];
    const correct=mk('square',5);
    const dist=[mk('circle',5),mk('square',4),mk('square',6)];
    const p=E.place(correct,dist,n+1);
    push({stem:'Which figure completes the series?',visual:{kind:'inductive',layout:'series',frames},options:p.options,answerIndex:p.answerIndex,
      reasoning:'The outline alternates <b>square, circle, square, circle</b> — so the next is a square. The dot count rises by one (1, 2, 3, 4), giving <b>5 dots</b>. The answer is a <b>square with 5 dots</b>.',topic:'Two rules'});
  })();

  // 8 — arrow rotates +45° CW; head fill alternates ink / none
  push(series(
    [{shape:'arrow',rot:0,shade:'ink'},{shape:'arrow',rot:45,shade:'none'},{shape:'arrow',rot:90,shade:'ink'},{shape:'arrow',rot:135,shade:'none'}],
    {shape:'arrow',rot:180,shade:'ink'},
    [{shape:'arrow',rot:180,shade:'none'},{shape:'arrow',rot:135,shade:'ink'},{shape:'arrow',rot:225,shade:'ink'}],
    null,'The arrow rotates <b>45° clockwise</b> each step while its head <b>alternates filled / hollow</b>. After a hollow head at 135° comes a <b>filled head at 180°</b>.','Two rules'));

  // ---- matrices ----
  const matrix=(cells,missingIdx,correct,dist,stem,reasoning,topic)=>{
    const rendered=cells.map((c,i)=> i===missingIdx? null : E.spec(c));
    const p=E.place(E.spec(correct),dist.map(E.spec),n+1);
    return {stem:stem||'Which figure completes the grid?',visual:{kind:'inductive',layout:'matrix',cells:rendered},options:p.options,answerIndex:p.answerIndex,reasoning,topic};
  };

  // 9 — columns add a side (3,4,5); rows deepen shade (none,grey,ink)
  push(matrix(
    [{shape:'poly',sides:3,shade:'none'},{shape:'poly',sides:4,shade:'none'},{shape:'poly',sides:5,shade:'none'},
     {shape:'poly',sides:3,shade:'grey'},{shape:'poly',sides:4,shade:'grey'},{shape:'poly',sides:5,shade:'grey'},
     {shape:'poly',sides:3,shade:'ink'}, {shape:'poly',sides:4,shade:'ink'}, {shape:'poly',sides:5,shade:'ink'}],
    8,{shape:'poly',sides:5,shade:'ink'},
    [{shape:'poly',sides:5,shade:'grey'},{shape:'poly',sides:6,shade:'ink'},{shape:'poly',sides:4,shade:'ink'}],
    null,'Across each row the shape gains a side (triangle → square → pentagon); down each column the fill darkens (white → grey → black). The missing cell sits in the <b>pentagon</b> column and the <b>black</b> row: a <b>solid black pentagon</b>.','Matrix'));

  // 10 — columns rotate the hand (0,45,90); rows add a dot (1,2,3)
  push(matrix(
    [{shape:'hand',rot:0,dots:1},{shape:'hand',rot:45,dots:1},{shape:'hand',rot:90,dots:1},
     {shape:'hand',rot:0,dots:2},{shape:'hand',rot:45,dots:2},{shape:'hand',rot:90,dots:2},
     {shape:'hand',rot:0,dots:3},{shape:'hand',rot:45,dots:3},{shape:'hand',rot:90,dots:3}],
    8,{shape:'hand',rot:90,dots:3},
    [{shape:'hand',rot:45,dots:3},{shape:'hand',rot:90,dots:2},{shape:'hand',rot:0,dots:3}],
    null,'Along each row the hand turns 45° clockwise (0°, 45°, 90°); down each column the dot count rises (1, 2, 3). The last cell needs the <b>90° hand with 3 dots</b>.','Matrix'));

  // 11 — columns change shape (circle, square, triangle); rows add count (1,2,3)
  (function(){
    const shp=['circle','poly','poly'], sides=[0,4,3];
    const mk=(ci,cnt)=>{const inner=(ci===0?E.circ(50,50,12,'s-none'):'');return null;};
    // build explicit cells with count of small shapes
    function multi(ci,cnt){
      let s='';const positions=cnt===1?[[50,50]]:cnt===2?[[36,50],[64,50]]:[[50,33],[36,64],[64,64]];
      for(const[px,py]of positions){
        if(ci===0)s+=E.circ(px,py,11,'s-none');
        else if(ci===1)s+=E.poly(4,px,py,13,0,'s-none');
        else s+=E.poly(3,px,py,13,0,'s-none');
      }
      return E.fig(s);
    }
    const cells=[multi(0,1),multi(1,1),multi(2,1),multi(0,2),multi(1,2),multi(2,2),multi(0,3),multi(1,3),null];
    const correct=multi(2,3);
    const dist=[multi(1,3),multi(2,2),multi(0,3)];
    const p=E.place(correct,dist,n+1);
    push({stem:'Which figure completes the grid?',visual:{kind:'inductive',layout:'matrix',cells},options:p.options,answerIndex:p.answerIndex,
      reasoning:'Each column fixes a shape (circle, square, triangle) and each row fixes a quantity (1, 2, 3). The missing cell is the <b>triangle</b> column and the <b>three</b> row, so it shows <b>three triangles</b>.',topic:'Matrix'});
  })();

  // 12 — columns rotate arrow (0,90,180); rows shade head (none,grey,ink)
  push(matrix(
    [{shape:'arrow',rot:0,shade:'none'},{shape:'arrow',rot:90,shade:'none'},{shape:'arrow',rot:180,shade:'none'},
     {shape:'arrow',rot:0,shade:'grey'},{shape:'arrow',rot:90,shade:'grey'},{shape:'arrow',rot:180,shade:'grey'},
     {shape:'arrow',rot:0,shade:'ink'}, {shape:'arrow',rot:90,shade:'ink'}, {shape:'arrow',rot:180,shade:'ink'}],
    8,{shape:'arrow',rot:180,shade:'ink'},
    [{shape:'arrow',rot:180,shade:'grey'},{shape:'arrow',rot:90,shade:'ink'},{shape:'arrow',rot:0,shade:'ink'}],
    null,'Across each row the arrow rotates 90° clockwise (up → right → down); down each column the head darkens (hollow → grey → black). The final cell is a <b>downward arrow with a solid black head</b>.','Matrix'));

  // 13 — superimposition: third column = first two overlaid
  (function(){
    const vline='<line x1="50" y1="22" x2="50" y2="78" class="ln"/>';
    const hline='<line x1="22" y1="50" x2="78" y2="50" class="ln"/>';
    const circle=E.circ(50,50,26,'s-none');
    const square=E.poly(4,50,50,30,0,'s-none');
    const tri=E.poly(3,50,50,30,0,'s-none');
    const dotC=E.dot(50,50,'dot');
    const cells=[
      E.fig(vline),E.fig(hline),E.fig(vline+hline),
      E.fig(circle),E.fig(square),E.fig(circle+square),
      E.fig(tri),E.fig(dotC),null];
    const correct=E.fig(tri+dotC);
    const dist=[E.fig(tri),E.fig(square+dotC),E.fig(circle+dotC)];
    const p=E.place(correct,dist,n+1);
    push({stem:'Which figure completes the grid?',visual:{kind:'inductive',layout:'matrix',cells},options:p.options,answerIndex:p.answerIndex,
      reasoning:'In every row the third cell is the <b>two earlier cells superimposed</b> (vertical + horizontal line = a cross; circle + square = both). The bottom row is a triangle and a centre dot, so the answer is a <b>triangle with a dot at its centre</b>.',topic:'Superimposition'});
  })();

  // ---- odd-one-out ----
  const odd=(cells,answerIndex,stem,reasoning,topic)=>({stem:stem||'Which figure is the odd one out?',visual:{kind:'inductive',layout:'oddoneout'},options:cells.map(svg=>({svg})),answerIndex,reasoning,topic});

  // 14 — dots should equal sides; one breaks the rule
  (function(){
    const mk=(sides,dots)=>E.fig(E.poly(sides,50,50,33,0,'s-none')+E.dotsRing(dots,'dot'));
    const cells=[mk(3,3),mk(4,4),mk(5,5),mk(4,3),mk(6,6)]; // index 3 breaks (square w/ 3 dots)
    push(odd(cells,3,null,'In four figures the <b>number of dots equals the number of sides</b> (triangle-3, square-4, pentagon-5, hexagon-6). The odd one is the <b>square holding only 3 dots</b> — its dot count does not match its sides.','Odd one out'));
  })();

  // 15 — dot always on the right of the cell; rotating arrow is a distraction; one has dot on the left
  (function(){
    const mk=(rot,side)=>E.fig(E.arrow(rot,'s-ink')+E.dot(side==='R'?72:28,50,'dot-a'));
    const cells=[mk(0,'R'),mk(90,'R'),mk(180,'R'),mk(135,'L'),mk(270,'R')]; // index 3 odd (dot on left)
    push(odd(cells,3,null,'The arrows point in different directions — that rotation is a deliberate distraction. The constant rule is that the accent dot sits on the <b>right-hand side of the cell</b>. In one figure the dot sits on the <b>left</b>, so it is the odd one out.','Reflection'));
  })();

  // 16 — four even-sided polygons (all visually distinct), one odd-sided
  (function(){
    const mk=(s,rot)=>E.fig(E.poly(s,50,50,33,rot||0,'s-grey'));
    const cells=[mk(4,0),mk(4,45),mk(6,0),mk(8,0),mk(5,0)]; // square, diamond, hexagon, octagon, [pentagon=odd]
    push(odd(cells,4,null,'Four shapes have an <b>even</b> number of sides — a square and a diamond (both 4 sides), a hexagon (6) and an octagon (8). The <b>pentagon (5 sides)</b> is the only odd-sided figure, so it is the odd one out.','Odd one out'));
  })();

  // 17 — varied grey shapes each with a black dot; one reverses the shading
  (function(){
    const mk=(sides)=>E.fig(E.poly(sides,50,50,32,0,'s-grey')+E.dot(50,50,'dot'));
    const inv=E.fig(E.poly(4,50,50,32,0,'s-ink')+E.dot(50,50,'dot-g'));
    const cells=[mk(3),mk(4),mk(5),inv,mk(6)]; // index 3 inverted shading
    push(odd(cells,3,null,'The shapes differ (triangle, square, pentagon, hexagon), but four share one rule: a <b>grey shape carrying a black centre dot</b>. One figure <b>reverses the shading</b> — a black shape with a grey dot — so it is the odd one out.','Shading'));
  })();

  // ---- analogies (A:B :: C:?) ----
  const analogy=(a,b,c,correct,dist,reasoning,topic)=>{
    const p=E.place(E.spec(correct),dist.map(E.spec),n+1);
    return {stem:'Figure A is to Figure B as Figure C is to&nbsp;?',visual:{kind:'inductive',layout:'analogy',a:E.spec(a),b:E.spec(b),c:E.spec(c)},options:p.options,answerIndex:p.answerIndex,reasoning,topic};
  };

  // 18 — relation: rotate 90° CW
  push(analogy(
    {shape:'arrow',rot:0,shade:'ink'},{shape:'arrow',rot:90,shade:'ink'},
    {shape:'hand',rot:0},{shape:'hand',rot:90},
    [{shape:'hand',rot:180},{shape:'hand',rot:270},{shape:'hand',rot:45}],
    'A → B is a <b>90° clockwise rotation</b> (the arrow turns from up to right). Applying the same turn to the upward hand in C gives a hand pointing <b>right (90°)</b>.','Analogy'));

  // 19 — relation: fill black + add a dot
  push(analogy(
    {shape:'poly',sides:4,shade:'none'},{shape:'poly',sides:4,shade:'ink',dots:1},
    {shape:'poly',sides:3,shade:'none'},{shape:'poly',sides:3,shade:'ink',dots:1},
    [{shape:'poly',sides:3,shade:'none',dots:1},{shape:'poly',sides:3,shade:'ink'},{shape:'poly',sides:4,shade:'ink',dots:1}],
    'A → B does two things: the shape is <b>filled black</b> and a <b>single dot</b> is added. Doing the same to the hollow triangle in C yields a <b>solid black triangle with one dot</b>.','Analogy'));

  // 20 — relation: gain a side + shade grey
  push(analogy(
    {shape:'poly',sides:3,shade:'none'},{shape:'poly',sides:4,shade:'grey'},
    {shape:'poly',sides:5,shade:'none'},{shape:'poly',sides:6,shade:'grey'},
    [{shape:'poly',sides:6,shade:'none'},{shape:'poly',sides:5,shade:'grey'},{shape:'poly',sides:7,shade:'grey'}],
    'A → B <b>adds one side</b> (triangle → square) and <b>shades the shape grey</b>. Applying that to the hollow pentagon in C gives a <b>grey hexagon</b>.','Analogy'));

  return out;
}

/* ------------------------------------------------ SVG CHART RENDERER */
const PAL=['#bd4d2b','#2b6c70','#c79a36','#4f6d9c','#8c4a6b','#5f7d3f'];
function niceMax(v){if(v<=0)return 1;const p=Math.pow(10,Math.floor(Math.log10(v)));const f=v/p;let nf=f<=1?1:f<=2?2:f<=2.5?2.5:f<=5?5:10;return nf*p;}
function fmtNum(v){const a=Math.abs(v);if(a>=1000)return (v).toLocaleString('en-US');if(a%1!==0)return v.toFixed(a<10?2:1);return ''+v;}
function legend(series){return '<div class="legend">'+series.map((s,i)=>'<span><i style="background:'+PAL[i%PAL.length]+'"></i>'+esc(s.name)+'</span>').join('')+'</div>';}

function renderChart(c){
  const t=c.chartType;
  let body='';
  if(t==='table'){
    let h='<table class="dtable">';
    if(c.dataTitle)h+='<caption>'+esc(c.dataTitle)+'</caption>';
    if(c.tableHeaders){h+='<thead><tr>'+c.tableHeaders.map(x=>'<th>'+esc(x)+'</th>').join('')+'</tr></thead>';}
    h+='<tbody>'+(c.tableRows||[]).map(r=>'<tr>'+r.map((x,i)=>'<td>'+esc(x)+'</td>').join('')+'</tr>').join('')+'</tbody></table>';
    return '<div class="viz">'+h+'</div>';
  }
  const W=580,H=300,L=52,Rp=18,Tp=14,B=46, iw=W-L-Rp, ih=H-Tp-B;
  const labels=c.labels||[], series=c.series||[];
  if(t==='pie'){
    const vals=(series[0]&&series[0].values)||[]; const total=vals.reduce((a,b)=>a+b,0)||1;
    let ang=-90, cx=150,cy=150,r=120, slices='';
    vals.forEach((v,i)=>{const a0=ang, a1=ang+v/total*360; ang=a1;
      const x0=cx+r*Math.cos(ENG.R(a0)),y0=cy+r*Math.sin(ENG.R(a0));
      const x1=cx+r*Math.cos(ENG.R(a1)),y1=cy+r*Math.sin(ENG.R(a1));
      const large=(a1-a0)>180?1:0;
      slices+='<path d="M'+cx+','+cy+' L'+x0.toFixed(1)+','+y0.toFixed(1)+' A'+r+','+r+' 0 '+large+' 1 '+x1.toFixed(1)+','+y1.toFixed(1)+' Z" fill="'+PAL[i%PAL.length]+'" stroke="var(--panel)" stroke-width="2"/>';
      const mid=(a0+a1)/2, lx=cx+r*0.62*Math.cos(ENG.R(mid)), ly=cy+r*0.62*Math.sin(ENG.R(mid));
      const pct=Math.round(v/total*100); if(pct>=6)slices+='<text x="'+lx.toFixed(1)+'" y="'+ly.toFixed(1)+'" text-anchor="middle" dy=".35em" fill="#fff" style="font-weight:600;font-size:12px">'+pct+'%</text>';
    });
    body='<svg class="chart" viewBox="0 0 300 300">'+slices+'</svg>';
    return '<div class="viz">'+title(c)+body+legend(labels.map((l,i)=>({name:l})))+'</div>';
  }
  // numeric axes for bar/line/grouped/stacked
  let maxV=0;
  if(t==='stackedBar'){maxV=Math.max.apply(null,labels.map((_,li)=>series.reduce((s,se)=>s+(se.values[li]||0),0)));}
  else{series.forEach(se=>se.values.forEach(v=>{if(v>maxV)maxV=v;}));}
  maxV=niceMax(maxV); const steps=5;
  const x=(i)=>L+ (labels.length>1? i*iw/(labels.length-(t==='line'?1:0)) : iw/2);
  const y=(v)=>Tp+ih-(v/maxV)*ih;
  let grid='';for(let s=0;s<=steps;s++){const gv=maxV*s/steps, gy=Tp+ih-(s/steps)*ih;grid+='<line class="grid" x1="'+L+'" y1="'+gy.toFixed(1)+'" x2="'+(W-Rp)+'" y2="'+gy.toFixed(1)+'"/><text x="'+(L-8)+'" y="'+(gy+3).toFixed(1)+'" text-anchor="end">'+fmtNum(gv)+'</text>';}
  grid+='<line class="axis" x1="'+L+'" y1="'+Tp+'" x2="'+L+'" y2="'+(Tp+ih)+'"/><line class="axis" x1="'+L+'" y1="'+(Tp+ih)+'" x2="'+(W-Rp)+'" y2="'+(Tp+ih)+'"/>';
  let marks='';
  const bw= labels.length? iw/labels.length : iw; // band width
  if(t==='bar'){
    const se=series[0]||{values:[]}; const w=Math.min(46,bw*0.55);
    se.values.forEach((v,i)=>{const bx=L+bw*i+bw/2-w/2, by=y(v);
      marks+='<rect x="'+bx.toFixed(1)+'" y="'+by.toFixed(1)+'" width="'+w.toFixed(1)+'" height="'+(Tp+ih-by).toFixed(1)+'" rx="2" fill="'+PAL[0]+'"/>';
      marks+='<text class="vlabel" x="'+(bx+w/2).toFixed(1)+'" y="'+(by-5).toFixed(1)+'" text-anchor="middle">'+fmtNum(v)+'</text>';});
  } else if(t==='groupedBar'){
    const gw=bw*0.7, w=gw/series.length;
    labels.forEach((_,i)=>{series.forEach((se,si)=>{const v=se.values[i]||0;const bx=L+bw*i+(bw-gw)/2+w*si, by=y(v);
      marks+='<rect x="'+bx.toFixed(1)+'" y="'+by.toFixed(1)+'" width="'+(w-2).toFixed(1)+'" height="'+(Tp+ih-by).toFixed(1)+'" rx="1.5" fill="'+PAL[si%PAL.length]+'"/>';});});
  } else if(t==='stackedBar'){
    const w=Math.min(46,bw*0.55);
    labels.forEach((_,i)=>{let acc=0;series.forEach((se,si)=>{const v=se.values[i]||0;const by=y(acc+v),bh=(y(acc)-y(acc+v));acc+=v;
      marks+='<rect x="'+(L+bw*i+bw/2-w/2).toFixed(1)+'" y="'+by.toFixed(1)+'" width="'+w.toFixed(1)+'" height="'+bh.toFixed(1)+'" fill="'+PAL[si%PAL.length]+'"/>';});});
  } else if(t==='line'){
    series.forEach((se,si)=>{let d='';se.values.forEach((v,i)=>{const px=x(i),py=y(v);d+=(i?'L':'M')+px.toFixed(1)+','+py.toFixed(1)+' ';});
      marks+='<path d="'+d+'" fill="none" stroke="'+PAL[si%PAL.length]+'" stroke-width="2.5" stroke-linejoin="round"/>';
      se.values.forEach((v,i)=>{marks+='<circle cx="'+x(i).toFixed(1)+'" cy="'+y(v).toFixed(1)+'" r="3.5" fill="'+PAL[si%PAL.length]+'"/>';});});
  }
  let xl='';labels.forEach((l,i)=>{const cx = t==='line'? x(i): L+bw*i+bw/2; xl+='<text x="'+cx.toFixed(1)+'" y="'+(Tp+ih+18)+'" text-anchor="middle">'+esc(shortLab(l))+'</text>';});
  body='<svg class="chart" viewBox="0 0 '+W+' '+H+'">'+grid+marks+xl+(c.unit?'<text x="'+L+'" y="'+(Tp-3)+'" fill="var(--ink-faint)" style="font-size:10px">'+esc(c.unit)+'</text>':'')+'</svg>';
  const leg = series.length>1? legend(series):'';
  return '<div class="viz">'+title(c)+body+leg+'</div>';
}
function title(c){let h='';if(c.dataTitle)h+='<div class="viz-title">'+esc(c.dataTitle)+'</div>';if(c.unit)h+='<div class="viz-sub">figures in '+esc(c.unit)+'</div>';return h;}
function shortLab(l){l=''+l;return l.length>10?l.slice(0,9)+'…':l;}

const NUMERICAL_DATA = [{"stem":"Helmsworth Tooling Ltd manufactures the CX-7 hydraulic clamp. Using the unit economics and the annual fixed costs allocated to the product line shown below, how many units of the CX-7 must be sold for the product line to break even (profit = £0)?","topic":"Contribution margin / break-even","dataTitle":"CX-7 hydraulic clamp — unit economics and allocated fixed costs","chartType":"table","unit":"units","tableHeaders":["Item","Value (£)"],"tableRows":[["Selling price per unit","48.00"],["Variable cost per unit","31.50"],["Annual fixed costs allocated to line","247,500.00"]],"options":["5,156 units","7,857 units","15,000 units","18,750 units"],"answerIndex":2,"reasoning":"Contribution margin per unit = price − variable cost = 48.00 − 31.50 = £16.50. Break-even units = fixed costs ÷ CM per unit = 247,500 ÷ 16.50 = 15,000 units. Distractor 5,156 wrongly divides fixed costs by the selling price (247,500/48 = 5,156.25); 7,857 wrongly divides by the variable cost (247,500/31.50 = 7,857.1). Both ignore that break-even is driven by contribution, not by price or cost alone. 18,750 is a planted round-ish value with no valid derivation."},{"stem":"The table shows each firm's share of the UK industrial-coatings market in 2023 and 2024. By what percentage did Brennan Coatings' market share increase from 2023 to 2024 (i.e. the relative increase, not the change in percentage points)?","topic":"Percentage change vs percentage points / market share","dataTitle":"UK industrial-coatings market share by firm","chartType":"groupedBar","unit":"%","labels":["Brennan","Caldwell","Pendrey","Others"],"series":[{"name":"2023 share (%)","values":[18,24,15,43]},{"name":"2024 share (%)","values":[21.6,22,16.4,40]}],"options":["3.6%","16.67%","20.0%","21.6%"],"answerIndex":2,"reasoning":"Relative percentage increase = (new − old)/old × 100 = (21.6 − 18.0)/18.0 × 100 = 3.6/18.0 × 100 = 20.0%. Distractor 3.6% is the percentage-point change (21.6 − 18.0), not the relative increase. Distractor 16.67% uses the new value as the base (3.6/21.6 × 100), the classic wrong-base error. 21.6% simply restates the 2024 figure."},{"stem":"Northgate Logistics reported the annual revenues below. Calculate the compound annual growth rate (CAGR) of revenue over the full period from 2021 to 2024.","topic":"CAGR / compound growth","dataTitle":"Northgate Logistics — annual revenue","chartType":"line","unit":"%","labels":["2021","2022","2023","2024"],"series":[{"name":"Revenue (£m)","values":[120,141.6,167.09,197.16]}],"options":["13.22%","18.0%","21.43%","64.3%"],"answerIndex":1,"reasoning":"CAGR spans n = 3 growth periods (2021→2022→2023→2024). CAGR = (end/start)^(1/n) − 1 = (197.16/120)^(1/3) − 1 = (1.6430)^(0.3333) − 1 = 1.1800 − 1 = 18.0% (the series compounds at ~18% each year: 141.6/120 = 1.180, 167.09/141.6 = 1.180, 197.16/167.09 = 1.180). Distractor 64.3% is the total cumulative growth over the period [(197.16 − 120)/120 = 64.3%]. Distractor 21.43% divides that total growth by 3 (a simple average, ignoring compounding). 13.22% wrongly uses 4 years instead of 3 (off-by-one period error: (1.6430)^(1/4) − 1)."},{"stem":"Saxby Interiors invoiced a German client EUR 420,000. The amount is converted to sterling at the rate shown, and the bank charges a 1.75% commission on the converted (sterling) amount. How much will Saxby actually receive in GBP, to the nearest pound?","topic":"Currency conversion with commission","dataTitle":"Conversion terms — EUR invoice to GBP","chartType":"table","unit":"£","tableHeaders":["Item","Value"],"tableRows":[["Invoice amount (EUR)","420,000.00"],["Exchange rate (GBP per 1 EUR)","0.8650"],["Bank commission on converted amount","1.75%"]],"options":["£356,942","£363,300","£370,121","£477,052"],"answerIndex":0,"reasoning":"Converted gross = 420,000 × 0.8650 = £363,300. Commission = 1.75% of £363,300 = £6,357.75. Net received = 363,300 − 6,357.75 = £356,942.25 ≈ £356,942. Distractor £363,300 forgets the commission entirely. Distractor £370,121 sits above the gross conversion — the error of treating the 1.75% as an uplift added to the converted amount rather than a deduction from it. Distractor £477,052 divides by the rate instead of multiplying (420,000/0.8650 = 485,549, then deducts the 1.75% fee), inverting the conversion direction."},{"stem":"Veridian Group has four operating divisions. Using each division's revenue and operating margin below, calculate the group's blended (overall) operating margin.","topic":"Weighted average margin","dataTitle":"Veridian Group — divisional revenue and operating margin","chartType":"table","unit":"%","tableHeaders":["Division","Revenue (£m)","Operating margin (%)"],"tableRows":[["North","85.0","22.0"],["South","140.0","15.0"],["East","60.0","28.0"],["West","115.0","19.0"]],"options":["19.59%","20.25%","21.0%","23.5%"],"answerIndex":0,"reasoning":"Blended margin = total operating profit ÷ total revenue. Profit by division = revenue × margin: North 85 × 0.22 = 18.70; South 140 × 0.15 = 21.00; East 60 × 0.28 = 16.80; West 115 × 0.19 = 21.85. Total profit = 18.70 + 21.00 + 16.80 + 21.85 = 78.35; total revenue = 85 + 140 + 60 + 115 = 400. Blended margin = 78.35/400 × 100 = 19.59%. Distractor 21.0% is the simple (unweighted) average of the four margins [(22 + 15 + 28 + 19)/4], the planted error for ignoring division size. The correct figure is pulled below the simple average because the lowest-margin division (South, 15%) carries the largest revenue weight. 20.25% and 23.5% have no valid derivation."},{"stem":"The table compares actual spend against budget for four cost lines at Marlowe Foods last quarter. For the cost line with the largest ADVERSE variance (actual exceeding budget) expressed as a percentage of its budget, what is that percentage?","topic":"Variance to budget","dataTitle":"Marlowe Foods — actual vs budget by cost line (£'000)","chartType":"groupedBar","unit":"%","labels":["Materials","Labour","Logistics","Overheads"],"series":[{"name":"Actual (£'000)","values":[1240,980,415,560]},{"name":"Budget (£'000)","values":[1180,1015,380,575]}],"options":["5.08%","9.21%","15.79%","35.0%"],"answerIndex":1,"reasoning":"Adverse variance means actual > budget. Materials: (1240 − 1180)/1180 = +5.08% (adverse); Logistics: (415 − 380)/380 = +9.21% (adverse). Labour (980 vs 1015) and Overheads (560 vs 575) are favourable (actual below budget), so they are excluded. The largest adverse variance as a % of budget is Logistics at 9.21%. Distractor 5.08% is Materials, which has the larger absolute variance (£60k vs £35k) but a smaller percentage — the trap is comparing pound amounts instead of percentages. Distractor 35.0% is Logistics' absolute variance in £'000 (415 − 380 = 35) misread as a percentage. 15.79% has no valid derivation."},{"stem":"Using the two tables below, identify the region with the highest revenue per employee and the region with the lowest, then calculate the difference in revenue per employee between them. Give the answer in £ thousand per employee.","topic":"Multi-table cross-reference / per-unit metric","dataTitle":"Regional revenue (£m) and headcount","chartType":"table","unit":"£k per employee","tableHeaders":["Region","Revenue (£m)","Headcount"],"tableRows":[["UK","312.0","1,450"],["Germany","268.0","1,180"],["France","195.0","1,020"],["Spain","142.0","760"]],"options":["£36.0k","£40.3k","£170.0k","£227.1k"],"answerIndex":1,"reasoning":"Revenue per employee = revenue ÷ headcount: UK 312,000,000/1,450 = £215,172; Germany 268,000,000/1,180 = £227,119 (highest); France 195,000,000/1,020 = £191,176; Spain 142,000,000/760 = £186,842 (lowest). Difference = 227,119 − 186,842 = £40,277 ≈ £40.3k. Distractor £36.0k pairs the highest (Germany) against France instead of the true lowest, Spain (227,119 − 191,176 = £35.9k) — wrong 'lowest' region. Distractor £170.0k ignores headcount entirely: it is the max−min of raw revenue in £m (312 − 142 = 170) mislabelled as £k per employee. Distractor £227.1k is Germany's value alone, the trap of reporting the maximum instead of the spread. The key requires pairing each revenue with its own headcount across the two columns before differencing."},{"stem":"For its product portfolio below, Calderbank plc wants to focus on its higher-growth lines. Considering ONLY the products whose year-on-year revenue growth exceeded 10%, what is their combined revenue as a percentage of the total portfolio revenue?","topic":"Conditional / threshold-filtered calculation","dataTitle":"Calderbank plc — product revenue and YoY growth","chartType":"table","unit":"%","tableHeaders":["Product","YoY growth (%)","Revenue (£m)"],"tableRows":[["Alpha","12.5","48.0"],["Beta","8.0","62.0"],["Gamma","15.2","35.0"],["Delta","4.5","90.0"],["Epsilon","22.0","27.0"],["Zeta","9.8","55.0"]],"options":["34.7%","45.6%","65.3%","71.6%"],"answerIndex":0,"reasoning":"Total portfolio revenue = 48 + 62 + 35 + 90 + 27 + 55 = £317m. Products with growth > 10%: Alpha (12.5%), Gamma (15.2%), Epsilon (22.0%). Their combined revenue = 48 + 35 + 27 = £110m. Share = 110/317 × 100 = 34.70%. Distractor 65.3% is the complement (100 − 34.7 = 65.3%), i.e. the revenue share of the products that did NOT exceed 10% — selecting the wrong side of the filter. Distractor 71.6% applies the wrong threshold (> 5%, adding Beta and Zeta: 110 + 62 + 55 = 227; 227/317 = 71.6%). Distractor 45.6% sums a wrong subset (Delta £90m + Zeta £55m = £145m; 145/317 = 45.7%). The condition must be applied before aggregating; the qualifying set is exactly {Alpha, Gamma, Epsilon}."},{"stem":"Aldermoor Retail expresses its annual sales as an index with 2020 = 100. Given the 2020 actual sales figure (in £'000) and the 2024 index value below, what were Aldermoor's 2024 sales, expressed in £m?","topic":"Index numbers / scale conversion","dataTitle":"Aldermoor Retail — sales index (2020 = 100)","chartType":"table","unit":"£m","tableHeaders":["Item","Value"],"tableRows":[["2020 actual sales (£'000)","84,500"],["2020 sales index","100"],["2024 sales index","142"]],"options":["£84.5m","£120.0m","£204.5m","£119,990m"],"answerIndex":1,"reasoning":"2024 sales (£'000) = 2020 sales × index/100 = 84,500 × 142/100 = 84,500 × 1.42 = 119,990 (£'000). Convert £'000 to £m by dividing by 1,000: 119,990/1,000 = £119.99m ≈ £120.0m. Distractor £119,990m fails the thousands-to-millions scale conversion (leaves the £'000 figure but stamps £m on it). Distractor £204.5m treats the index of 142 as a 142% increase (×2.42) rather than a level (×1.42): 84,500 × 2.42 = 204,490 → £204.5m. £84.5m is the unindexed 2020 base value with the wrong scale."},{"stem":"The summarised P&L for Thornbury Manufacturing is shown for 2023 and 2024 (operating profit is not stated and must be derived). By how many percentage points did the operating margin change from 2023 to 2024?","topic":"P&L derivation / margin change","dataTitle":"Thornbury Manufacturing — summarised P&L (£m)","chartType":"table","unit":"percentage points","tableHeaders":["Line","2023 (£m)","2024 (£m)"],"tableRows":[["Revenue","540.0","612.0"],["Cost of goods sold","351.0","379.0"],["Operating expenses","92.0","104.0"]],"options":["+3.07 pp","+3.12 pp","+17.34 pp","+32.0 pp"],"answerIndex":1,"reasoning":"Operating profit = revenue − COGS − opex. 2023: 540 − 351 − 92 = £97m; margin = 97/540 = 17.96%. 2024: 612 − 379 − 104 = £129m; margin = 129/612 = 21.08%. Change = 21.08 − 17.96 = +3.12 percentage points. Distractor +3.07 pp is the change in GROSS margin [(540 − 351)/540 = 35.00% vs (612 − 379)/612 = 38.07%], excluding opex — the wrong profit line. Distractor +17.34 pp is the relative % change in the margin [(21.08 − 17.96)/17.96 × 100], not the percentage-point change. +32.0 is the change in operating profit in £m (129 − 97), not a margin change."},{"stem":"Helix Diagnostics reported the annual revenue figures shown. Calculate the compound annual growth rate (CAGR) of revenue over the period from 2019 to 2023, to the nearest 0.1 percentage point.","topic":"CAGR / compound growth","unit":"%","dataTitle":"Helix Diagnostics — annual revenue (£m)","chartType":"bar","labels":["2019","2020","2021","2022","2023"],"series":[{"name":"Revenue (£m)","values":[48,55.1,68.4,79.2,92.6]}],"options":["14.0%","17.9%","23.2%","19.3%"],"answerIndex":1,"reasoning":"CAGR uses only the endpoints and the number of intervals. From 2019 to 2023 is 4 intervals (not 5 years). CAGR = (92.6/48.0)^(1/4) − 1 = (1.929167)^0.25 − 1 = 1.178535 − 1 = 0.178535 = 17.85%, which rounds to 17.9%. Distractor 23.2% is the simple total growth (92.6/48.0 − 1 = 92.92%) divided by 4 (= 23.23%) — averaging arithmetically instead of compounding. Distractor 14.0% comes from dividing by 5 instead of 4 intervals: (92.6/48.0)^(1/5) − 1 = 14.04%, the off-by-one-period error. Distractor 19.3% matches no consistent method (the simple-growth-over-5 figure is 18.6%), serving as a near-miss."},{"stem":"A UK importer must pay a German supplier an invoice of EUR 1,460,000. Its bank will convert at the quoted rate of GBP 1 = EUR 1.1840 and adds a commission of 0.85% on the sterling amount converted. What is the total cost to the importer, in sterling?","topic":"Currency conversion with commission","unit":"£000","dataTitle":"FX transaction terms","chartType":"table","tableHeaders":["Item","Value"],"tableRows":[["Invoice amount (EUR)","1460000"],["Quoted rate (EUR per GBP 1)","1.1840"],["Bank commission on sterling amount (%)","0.85"]],"options":["£1,222.6k","£1,233.1k","£1,243.6k","£1,728.6k"],"answerIndex":2,"reasoning":"Since GBP 1 = EUR 1.1840, divide to get sterling: 1,460,000 / 1.1840 = £1,233,108.11. Commission is 0.85% of that: 1,233,108.11 × 0.0085 = £10,481.42. Total = 1,233,108.11 + 10,481.42 = £1,243,589.53 ≈ £1,243.6k. Distractor £1,233.1k omits the commission entirely. Distractor £1,728.6k multiplies by the rate instead of dividing (1,460,000 × 1.1840 / 1000), the inverted-conversion error. Distractor £1,222.6k wrongly subtracts the commission instead of adding it (1,233,108.11 − 10,481.42)."},{"stem":"The table shows Tarrant Manufacturing's annual production index (base year 2018 = 100). Management wishes to re-base the series so that 2020 = 100. On the re-based series, what is the index value for 2022 (to the nearest 0.1)?","topic":"Index numbers","unit":"index","dataTitle":"Tarrant Manufacturing — production index (2018 = 100)","chartType":"line","labels":["2018","2019","2020","2021","2022"],"series":[{"name":"Production index","values":[100,108,103,121,134]}],"options":["117.5","130.1","131.0","134.0"],"answerIndex":1,"reasoning":"Re-basing to 2020 means dividing each year's index by the 2020 value and multiplying by 100. For 2022: 134 / 103 × 100 = 130.097, which rounds to 130.1. Distractor 134.0 fails to re-base at all (keeps the 2018 base). Distractor 131.0 comes from the additive error 134 − 103 + 100 = 131, treating index points as differences rather than ratios. Distractor 117.5 is the re-based 2021 value (121/103×100 = 117.48), the off-by-one-row error."},{"stem":"The table shows output and headcount for three of Calbourne Industries' plants in the last quarter. Which plant achieved the highest output per employee, and what was that figure (to the nearest whole unit)?","topic":"Per-unit productivity","unit":"units/employee","dataTitle":"Calbourne Industries — quarterly output and headcount","chartType":"table","tableHeaders":["Plant","Output (000 units)","Headcount"],"tableRows":[["Aldridge","184.5","246"],["Brentmoor","212.8","305"],["Caldwell","167.2","209"]],"options":["Brentmoor — 698 units","Aldridge — 750 units","Caldwell — 800 units","Caldwell — 750 units"],"answerIndex":2,"reasoning":"Output is in thousands of units, so convert before dividing. Aldridge: 184,500/246 = 750.0. Brentmoor: 212,800/305 = 697.7. Caldwell: 167,200/209 = 800.0. Caldwell is highest at 800 units/employee. Distractor 'Brentmoor — 698' picks the plant with the largest raw output, ignoring that productivity is per head. Distractor 'Aldridge — 750' is the correct value for the wrong (second-highest) plant. Distractor 'Caldwell — 750' attaches Aldridge's figure to the right plant — an adjacent-row mix-up."},{"stem":"At the end of August (eight months), Westgate Logistics has cumulative revenue of £14.72m. September is expected to run exactly at the simple monthly run-rate set by the first eight months, while each of the final three months (October–December) is expected to run 15% above that run-rate. What is the forecast full-year revenue?","topic":"Proration & forecasting","unit":"£m","dataTitle":"Westgate Logistics — revenue forecast inputs","chartType":"table","tableHeaders":["Item","Value"],"tableRows":[["Cumulative revenue, Jan–Aug (£m)","14.72"],["Months elapsed","8"],["September run-rate vs. monthly average","100%"],["Oct–Dec run-rate vs. monthly average","115%"]],"options":["£22.08m","£22.91m","£23.18m","£21.07m"],"answerIndex":1,"reasoning":"Monthly run-rate = 14.72 / 8 = £1.84m. September at run-rate = 1.84. Oct–Dec at 115%: 1.84 × 3 × 1.15 = £6.348m. Full year = 14.72 + 1.84 + 6.348 = £22.908m ≈ £22.91m. Distractor £22.08m is the naive straight-line 1.84 × 12 with no uplift. Distractor £23.18m applies the 15% uplift to all four remaining months including September (14.72 + 1.84×4×1.15 = 23.184). Distractor £21.07m omits September altogether (14.72 + 6.348 = 21.068)."},{"stem":"Marlowe Appliances sells a kettle for £42.50 per unit. The variable cost is £27.80 per unit and annual fixed costs attributable to the product are £388,000. How many units must be sold for the product to break even (rounded up to the next whole unit)?","topic":"Break-even","unit":"units","dataTitle":"Marlowe Appliances — kettle cost structure","chartType":"table","tableHeaders":["Item","Value (£)"],"tableRows":[["Selling price per unit","42.50"],["Variable cost per unit","27.80"],["Annual fixed costs","388000"]],"options":["9,129 units","13,957 units","26,395 units","26,394 units"],"answerIndex":2,"reaso
