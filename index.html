const NUMERICAL_DATA = [{"stem":"Helmsworth Tooling Ltd manufactures the CX-7 hydraulic clamp. Using the unit economics and the annual fixed costs allocated to the product line shown below, how many units of the CX-7 must be sold for the product line to break even (profit = £0)?","topic":"Contribution margin / break-even","dataTitle":"CX-7 hydraulic clamp — unit economics and allocated fixed costs","chartType":"table","unit":"units","tableHeaders":["Item","Value (£)"],"tableRows":[["Selling price per unit","48.00"],["Variable cost per unit","31.50"],["Annual fixed costs allocated to line","247,500.00"]],"options":["5,156 units","7,857 units","15,000 units","18,750 units"],"answerIndex":2,"reasoning":"Contribution margin per unit = price − variable cost = 48.00 − 31.50 = £16.50. Break-even units = fixed costs ÷ CM per unit = 247,500 ÷ 16.50 = 15,000 units. Distractor 5,156 wrongly divides fixed costs by the selling price (247,500/48 = 5,156.25); 7,857 wrongly divides by the variable cost (247,500/31.50 = 7,857.1). Both ignore that break-even is driven by contribution, not by price or cost alone. 18,750 is a planted round-ish value with no valid derivation."},{"stem":"The table shows each firm's share of the UK industrial-coatings market in 2023 and 2024. By what percentage did Brennan Coatings' market share increase from 2023 to 2024 (i.e. the relative increase, not the change in percentage points)?","topic":"Percentage change vs percentage points / market share","dataTitle":"UK industrial-coatings market share by firm","chartType":"groupedBar","unit":"%","labels":["Brennan","Caldwell","Pendrey","Others"],"series":[{"name":"2023 share (%)","values":[18,24,15,43]},{"name":"2024 share (%)","values":[21.6,22,16.4,40]}],"options":["3.6%","16.67%","20.0%","21.6%"],"answerIndex":2,"reasoning":"Relative percentage increase = (new − old)/old × 100 = (21.6 − 18.0)/18.0 × 100 = 3.6/18.0 × 100 = 20.0%. Distractor 3.6% is the percentage-point change (21.6 − 18.0), not the relative increase. Distractor 16.67% uses the new value as the base (3.6/21.6 × 100), the classic wrong-base error. 21.6% simply restates the 2024 figure."},{"stem":"Northgate Logistics reported the annual revenues below. Calculate the compound annual growth rate (CAGR) of revenue over the full period from 2021 to 2024.","topic":"CAGR / compound growth","dataTitle":"Northgate Logistics — annual revenue","chartType":"line","unit":"%","labels":["2021","2022","2023","2024"],"series":[{"name":"Revenue (£m)","values":[120,141.6,167.09,197.16]}],"options":["13.22%","18.0%","21.43%","64.3%"],"answerIndex":1,"reasoning":"CAGR spans n = 3 growth periods (2021→2022→2023→2024). CAGR = (end/start)^(1/n) − 1 = (197.16/120)^(1/3) − 1 = (1.6430)^(0.3333) − 1 = 1.1800 − 1 = 18.0% (the series compounds at ~18% each year: 141.6/120 = 1.180, 167.09/141.6 = 1.180, 197.16/167.09 = 1.180). Distractor 64.3% is the total cumulative growth over the period [(197.16 − 120)/120 = 64.3%]. Distractor 21.43% divides that total growth by 3 (a simple average, ignoring compounding). 13.22% wrongly uses 4 years instead of 3 (off-by-one period error: (1.6430)^(1/4) − 1)."},{"stem":"Saxby Interiors invoiced a German client EUR 420,000. The amount is converted to sterling at the rate shown, and the bank charges a 1.75% commission on the converted (sterling) amount. How much will Saxby actually receive in GBP, to the nearest pound?","topic":"Currency conversion with commission","dataTitle":"Conversion terms — EUR invoice to GBP","chartType":"table","unit":"£","tableHeaders":["Item","Value"],"tableRows":[["Invoice amount (EUR)","420,000.00"],["Exchange rate (GBP per 1 EUR)","0.8650"],["Bank commission on converted amount","1.75%"]],"options":["£356,942","£363,300","£370,121","£477,052"],"answerIndex":0,"reasoning":"Converted gross = 420,000 × 0.8650 = £363,300. Commission = 1.75% of £363,300 = £6,357.75. Net received = 363,300 − 6,357.75 = £356,942.25 ≈ £356,942. Distractor £363,300 forgets the commission entirely. Distractor £370,121 sits above the gross conversion — the error of treating the 1.75% as an uplift added to the converted amount rather than a deduction from it. Distractor £477,052 divides by the rate instead of multiplying (420,000/0.8650 = 485,549, then deducts the 1.75% fee), inverting the conversion direction."},{"stem":"Veridian Group has four operating divisions. Using each division's revenue and operating margin below, calculate the group's blended (overall) operating margin.","topic":"Weighted average margin","dataTitle":"Veridian Group — divisional revenue and operating margin","chartType":"table","unit":"%","tableHeaders":["Division","Revenue (£m)","Operating margin (%)"],"tableRows":[["North","85.0","22.0"],["South","140.0","15.0"],["East","60.0","28.0"],["West","115.0","19.0"]],"options":["19.59%","20.25%","21.0%","23.5%"],"answerIndex":0,"reasoning":"Blended margin = total operating profit ÷ total revenue. Profit by division = revenue × margin: North 85 × 0.22 = 18.70; South 140 × 0.15 = 21.00; East 60 × 0.28 = 16.80; West 115 × 0.19 = 21.85. Total profit = 18.70 + 21.00 + 16.80 + 21.85 = 78.35; total revenue = 85 + 140 + 60 + 115 = 400. Blended margin = 78.35/400 × 100 = 19.59%. Distractor 21.0% is the simple (unweighted) average of the four margins [(22 + 15 + 28 + 19)/4], the planted error for ignoring division size. The correct figure is pulled below the simple average because the lowest-margin division (South, 15%) carries the largest revenue weight. 20.25% and 23.5% have no valid derivation."},{"stem":"The table compares actual spend against budget for four cost lines at Marlowe Foods last quarter. For the cost line with the largest ADVERSE variance (actual exceeding budget) expressed as a percentage of its budget, what is that percentage?","topic":"Variance to budget","dataTitle":"Marlowe Foods — actual vs budget by cost line (£'000)","chartType":"groupedBar","unit":"%","labels":["Materials","Labour","Logistics","Overheads"],"series":[{"name":"Actual (£'000)","values":[1240,980,415,560]},{"name":"Budget (£'000)","values":[1180,1015,380,575]}],"options":["5.08%","9.21%","15.79%","35.0%"],"answerIndex":1,"reasoning":"Adverse variance means actual > budget. Materials: (1240 − 1180)/1180 = +5.08% (adverse); Logistics: (415 − 380)/380 = +9.21% (adverse). Labour (980 vs 1015) and Overheads (560 vs 575) are favourable (actual below budget), so they are excluded. The largest adverse variance as a % of budget is Logistics at 9.21%. Distractor 5.08% is Materials, which has the larger absolute variance (£60k vs £35k) but a smaller percentage — the trap is comparing pound amounts instead of percentages. Distractor 35.0% is Logistics' absolute variance in £'000 (415 − 380 = 35) misread as a percentage. 15.79% has no valid derivation."},{"stem":"Using the two tables below, identify the region with the highest revenue per employee and the region with the lowest, then calculate the difference in revenue per employee between them. Give the answer in £ thousand per employee.","topic":"Multi-table cross-reference / per-unit metric","dataTitle":"Regional revenue (£m) and headcount","chartType":"table","unit":"£k per employee","tableHeaders":["Region","Revenue (£m)","Headcount"],"tableRows":[["UK","312.0","1,450"],["Germany","268.0","1,180"],["France","195.0","1,020"],["Spain","142.0","760"]],"options":["£36.0k","£40.3k","£170.0k","£227.1k"],"answerIndex":1,"reasoning":"Revenue per employee = revenue ÷ headcount: UK 312,000,000/1,450 = £215,172; Germany 268,000,000/1,180 = £227,119 (highest); France 195,000,000/1,020 = £191,176; Spain 142,000,000/760 = £186,842 (lowest). Difference = 227,119 − 186,842 = £40,277 ≈ £40.3k. Distractor £36.0k pairs the highest (Germany) against France instead of the true lowest, Spain (227,119 − 191,176 = £35.9k) — wrong 'lowest' region. Distractor £170.0k ignores headcount entirely: it is the max−min of raw revenue in £m (312 − 142 = 170) mislabelled as £k per employee. Distractor £227.1k is Germany's value alone, the trap of reporting the maximum instead of the spread. The key requires pairing each revenue with its own headcount across the two columns before differencing."},{"stem":"For its product portfolio below, Calderbank plc wants to focus on its higher-growth lines. Considering ONLY the products whose year-on-year revenue growth exceeded 10%, what is their combined revenue as a percentage of the total portfolio revenue?","topic":"Conditional / threshold-filtered calculation","dataTitle":"Calderbank plc — product revenue and YoY growth","chartType":"table","unit":"%","tableHeaders":["Product","YoY growth (%)","Revenue (£m)"],"tableRows":[["Alpha","12.5","48.0"],["Beta","8.0","62.0"],["Gamma","15.2","35.0"],["Delta","4.5","90.0"],["Epsilon","22.0","27.0"],["Zeta","9.8","55.0"]],"options":["34.7%","45.6%","65.3%","71.6%"],"answerIndex":0,"reasoning":"Total portfolio revenue = 48 + 62 + 35 + 90 + 27 + 55 = £317m. Products with growth > 10%: Alpha (12.5%), Gamma (15.2%), Epsilon (22.0%). Their combined revenue = 48 + 35 + 27 = £110m. Share = 110/317 × 100 = 34.70%. Distractor 65.3% is the complement (100 − 34.7 = 65.3%), i.e. the revenue share of the products that did NOT exceed 10% — selecting the wrong side of the filter. Distractor 71.6% applies the wrong threshold (> 5%, adding Beta and Zeta: 110 + 62 + 55 = 227; 227/317 = 71.6%). Distractor 45.6% sums a wrong subset (Delta £90m + Zeta £55m = £145m; 145/317 = 45.7%). The condition must be applied before aggregating; the qualifying set is exactly {Alpha, Gamma, Epsilon}."},{"stem":"Aldermoor Retail expresses its annual sales as an index with 2020 = 100. Given the 2020 actual sales figure (in £'000) and the 2024 index value below, what were Aldermoor's 2024 sales, expressed in £m?","topic":"Index numbers / scale conversion","dataTitle":"Aldermoor Retail — sales index (2020 = 100)","chartType":"table","unit":"£m","tableHeaders":["Item","Value"],"tableRows":[["2020 actual sales (£'000)","84,500"],["2020 sales index","100"],["2024 sales index","142"]],"options":["£84.5m","£120.0m","£204.5m","£119,990m"],"answerIndex":1,"reasoning":"2024 sales (£'000) = 2020 sales × index/100 = 84,500 × 142/100 = 84,500 × 1.42 = 119,990 (£'000). Convert £'000 to £m by dividing by 1,000: 119,990/1,000 = £119.99m ≈ £120.0m. Distractor £119,990m fails the thousands-to-millions scale conversion (leaves the £'000 figure but stamps £m on it). Distractor £204.5m treats the index of 142 as a 142% increase (×2.42) rather than a level (×1.42): 84,500 × 2.42 = 204,490 → £204.5m. £84.5m is the unindexed 2020 base value with the wrong scale."},{"stem":"The summarised P&L for Thornbury Manufacturing is shown for 2023 and 2024 (operating profit is not stated and must be derived). By how many percentage points did the operating margin change from 2023 to 2024?","topic":"P&L derivation / margin change","dataTitle":"Thornbury Manufacturing — summarised P&L (£m)","chartType":"table","unit":"percentage points","tableHeaders":["Line","2023 (£m)","2024 (£m)"],"tableRows":[["Revenue","540.0","612.0"],["Cost of goods sold","351.0","379.0"],["Operating expenses","92.0","104.0"]],"options":["+3.07 pp","+3.12 pp","+17.34 pp","+32.0 pp"],"answerIndex":1,"reasoning":"Operating profit = revenue − COGS − opex. 2023: 540 − 351 − 92 = £97m; margin = 97/540 = 17.96%. 2024: 612 − 379 − 104 = £129m; margin = 129/612 = 21.08%. Change = 21.08 − 17.96 = +3.12 percentage points. Distractor +3.07 pp is the change in GROSS margin [(540 − 351)/540 = 35.00% vs (612 − 379)/612 = 38.07%], excluding opex — the wrong profit line. Distractor +17.34 pp is the relative % change in the margin [(21.08 − 17.96)/17.96 × 100], not the percentage-point change. +32.0 is the change in operating profit in £m (129 − 97), not a margin change."},{"stem":"Helix Diagnostics reported the annual revenue figures shown. Calculate the compound annual growth rate (CAGR) of revenue over the period from 2019 to 2023, to the nearest 0.1 percentage point.","topic":"CAGR / compound growth","unit":"%","dataTitle":"Helix Diagnostics — annual revenue (£m)","chartType":"bar","labels":["2019","2020","2021","2022","2023"],"series":[{"name":"Revenue (£m)","values":[48,55.1,68.4,79.2,92.6]}],"options":["14.0%","17.9%","23.2%","19.3%"],"answerIndex":1,"reasoning":"CAGR uses only the endpoints and the number of intervals. From 2019 to 2023 is 4 intervals (not 5 years). CAGR = (92.6/48.0)^(1/4) − 1 = (1.929167)^0.25 − 1 = 1.178535 − 1 = 0.178535 = 17.85%, which rounds to 17.9%. Distractor 23.2% is the simple total growth (92.6/48.0 − 1 = 92.92%) divided by 4 (= 23.23%) — averaging arithmetically instead of compounding. Distractor 14.0% comes from dividing by 5 instead of 4 intervals: (92.6/48.0)^(1/5) − 1 = 14.04%, the off-by-one-period error. Distractor 19.3% matches no consistent method (the simple-growth-over-5 figure is 18.6%), serving as a near-miss."},{"stem":"A UK importer must pay a German supplier an invoice of EUR 1,460,000. Its bank will convert at the quoted rate of GBP 1 = EUR 1.1840 and adds a commission of 0.85% on the sterling amount converted. What is the total cost to the importer, in sterling?","topic":"Currency conversion with commission","unit":"£000","dataTitle":"FX transaction terms","chartType":"table","tableHeaders":["Item","Value"],"tableRows":[["Invoice amount (EUR)","1460000"],["Quoted rate (EUR per GBP 1)","1.1840"],["Bank commission on sterling amount (%)","0.85"]],"options":["£1,222.6k","£1,233.1k","£1,243.6k","£1,728.6k"],"answerIndex":2,"reasoning":"Since GBP 1 = EUR 1.1840, divide to get sterling: 1,460,000 / 1.1840 = £1,233,108.11. Commission is 0.85% of that: 1,233,108.11 × 0.0085 = £10,481.42. Total = 1,233,108.11 + 10,481.42 = £1,243,589.53 ≈ £1,243.6k. Distractor £1,233.1k omits the commission entirely. Distractor £1,728.6k multiplies by the rate instead of dividing (1,460,000 × 1.1840 / 1000), the inverted-conversion error. Distractor £1,222.6k wrongly subtracts the commission instead of adding it (1,233,108.11 − 10,481.42)."},{"stem":"The table shows Tarrant Manufacturing's annual production index (base year 2018 = 100). Management wishes to re-base the series so that 2020 = 100. On the re-based series, what is the index value for 2022 (to the nearest 0.1)?","topic":"Index numbers","unit":"index","dataTitle":"Tarrant Manufacturing — production index (2018 = 100)","chartType":"line","labels":["2018","2019","2020","2021","2022"],"series":[{"name":"Production index","values":[100,108,103,121,134]}],"options":["117.5","130.1","131.0","134.0"],"answerIndex":1,"reasoning":"Re-basing to 2020 means dividing each year's index by the 2020 value and multiplying by 100. For 2022: 134 / 103 × 100 = 130.097, which rounds to 130.1. Distractor 134.0 fails to re-base at all (keeps the 2018 base). Distractor 131.0 comes from the additive error 134 − 103 + 100 = 131, treating index points as differences rather than ratios. Distractor 117.5 is the re-based 2021 value (121/103×100 = 117.48), the off-by-one-row error."},{"stem":"The table shows output and headcount for three of Calbourne Industries' plants in the last quarter. Which plant achieved the highest output per employee, and what was that figure (to the nearest whole unit)?","topic":"Per-unit productivity","unit":"units/employee","dataTitle":"Calbourne Industries — quarterly output and headcount","chartType":"table","tableHeaders":["Plant","Output (000 units)","Headcount"],"tableRows":[["Aldridge","184.5","246"],["Brentmoor","212.8","305"],["Caldwell","167.2","209"]],"options":["Brentmoor — 698 units","Aldridge — 750 units","Caldwell — 800 units","Caldwell — 750 units"],"answerIndex":2,"reasoning":"Output is in thousands of units, so convert before dividing. Aldridge: 184,500/246 = 750.0. Brentmoor: 212,800/305 = 697.7. Caldwell: 167,200/209 = 800.0. Caldwell is highest at 800 units/employee. Distractor 'Brentmoor — 698' picks the plant with the largest raw output, ignoring that productivity is per head. Distractor 'Aldridge — 750' is the correct value for the wrong (second-highest) plant. Distractor 'Caldwell — 750' attaches Aldridge's figure to the right plant — an adjacent-row mix-up."},{"stem":"At the end of August (eight months), Westgate Logistics has cumulative revenue of £14.72m. September is expected to run exactly at the simple monthly run-rate set by the first eight months, while each of the final three months (October–December) is expected to run 15% above that run-rate. What is the forecast full-year revenue?","topic":"Proration & forecasting","unit":"£m","dataTitle":"Westgate Logistics — revenue forecast inputs","chartType":"table","tableHeaders":["Item","Value"],"tableRows":[["Cumulative revenue, Jan–Aug (£m)","14.72"],["Months elapsed","8"],["September run-rate vs. monthly average","100%"],["Oct–Dec run-rate vs. monthly average","115%"]],"options":["£22.08m","£22.91m","£23.18m","£21.07m"],"answerIndex":1,"reasoning":"Monthly run-rate = 14.72 / 8 = £1.84m. September at run-rate = 1.84. Oct–Dec at 115%: 1.84 × 3 × 1.15 = £6.348m. Full year = 14.72 + 1.84 + 6.348 = £22.908m ≈ £22.91m. Distractor £22.08m is the naive straight-line 1.84 × 12 with no uplift. Distractor £23.18m applies the 15% uplift to all four remaining months including September (14.72 + 1.84×4×1.15 = 23.184). Distractor £21.07m omits September altogether (14.72 + 6.348 = 21.068)."},{"stem":"Marlowe Appliances sells a kettle for £42.50 per unit. The variable cost is £27.80 per unit and annual fixed costs attributable to the product are £388,000. How many units must be sold for the product to break even (rounded up to the next whole unit)?","topic":"Break-even","unit":"units","dataTitle":"Marlowe Appliances — kettle cost structure","chartType":"table","tableHeaders":["Item","Value (£)"],"tableRows":[["Selling price per unit","42.50"],["Variable cost per unit","27.80"],["Annual fixed costs","388000"]],"options":["9,129 units","13,957 units","26,395 units","26,394 units"],"answerIndex":2,"reasoning":"Contribution margin per unit = 42.50 − 27.80 = £14.70. Break-even = fixed costs / contribution = 388,000 / 14.70 = 26,394.56 units; rounding up gives 26,395. Distractor 26,394 rounds down rather than up — at 26,394 units contribution is 26,394 × 14.70 = £387,991.80, still short of £388,000, so it does not break even. Distractor 9,129 divides fixed cost by price (388,000/42.50 = 9,129.4), ignoring variable cost. Distractor 13,957 divides by the variable cost instead of the contribution margin (388,000/27.80 = 13,956.8)."},{"stem":"BluePeak Telecom routes customer calls through three service tiers, each with its own per-call cost, as shown. What is the blended cost per call across all calls handled (to the nearest penny)?","topic":"Blended rates","unit":"£/call","dataTitle":"BluePeak Telecom — calls and cost by tier","chartType":"table","tableHeaders":["Tier","Calls handled","Cost per call (£)"],"tableRows":[["Tier 1","12400","3.20"],["Tier 2","7800","5.75"],["Tier 3","3100","9.40"]],"options":["£4.88","£6.12","£5.43","£4.65"],"answerIndex":0,"reasoning":"A blended rate must be weighted by volume. Total cost = 12,400×3.20 + 7,800×5.75 + 3,100×9.40 = 39,680 + 44,850 + 29,140 = £113,670. Total calls = 12,400 + 7,800 + 3,100 = 23,300. Blended = 113,670 / 23,300 = £4.878 ≈ £4.88. Distractor £6.12 is the simple unweighted mean of the three rates (3.20+5.75+9.40)/3 = 6.117 — the classic planted error that ignores the very different call volumes. Distractors £5.43 and £4.65 are near-miss values that no consistent method produces."},{"stem":"Vantage Software competes in a market that grew over the year shown. Using the figures in the table, by how many percentage points did Vantage's market share change from 2022 to 2023?","topic":"Market-share shift / percentage points","unit":"pp","dataTitle":"Vantage Software — revenue vs. total market (£m)","chartType":"groupedBar","labels":["2022","2023"],"series":[{"name":"Vantage revenue (£m)","values":[96,128]},{"name":"Total market (£m)","values":[640,710]}],"options":["+3.03 pp","+20.19 pp","+33.33 pp","+2.00 pp"],"answerIndex":0,"reasoning":"Share 2022 = 96/640 = 15.00%. Share 2023 = 128/710 = 18.03%. The change in percentage points is 18.03 − 15.00 = +3.03 pp. Distractor +20.19 pp is the relative percentage change in the share itself ((18.03−15.00)/15.00 = 20.19%) mislabelled as percentage points — the headline percentage-point versus percentage trap. Distractor +33.33 pp is Vantage's own revenue growth ((128−96)/96 = 33.33%), ignoring that the market also grew. Distractor +2.00 pp is a plausible-looking near-miss that no consistent method produces (note that even rounding both shares to whole numbers before differencing still gives 18 − 15 = 3 pp, not 2)."},{"stem":"The chart shows the year-on-year change applied to Northwind Media's subscriber base in three successive years. The base stood at 250,000 subscribers at the end of 2021. What was the subscriber base at the end of 2024 (to the nearest thousand)?","topic":"Compound growth (multi-period)","unit":"subscribers","dataTitle":"Northwind Media — year-on-year change in subscriber base","chartType":"bar","labels":["2021→2022","2022→2023","2023→2024"],"series":[{"name":"Change (%)","values":[12,8,-5]}],"options":["287,000","288,000","302,000","263,000"],"answerIndex":0,"reasoning":"Compound the factors sequentially on 250,000: ×1.12 = 280,000; ×1.08 = 302,400; ×0.95 = 287,280, which rounds to 287,000. Distractor 288,000 comes from adding the percentages (12 + 8 − 5 = +15%) and applying once: 250,000 × 1.15 = 287,500 → 288,000 — the additive-instead-of-compound error landing one option away. Distractor 302,000 forgets the final year's 5% churn (250,000 × 1.12 × 1.08 = 302,400). Distractor 263,000 (≈ 250,000 × 1.12 × 1.08 × 0.95 mishandled, or netting +5% then a 12% drop) reflects applying one step's change in the wrong direction."},{"stem":"For each product in Saxon Foods' range, gross margin % = (revenue − direct cost) / revenue. Considering only the products whose gross margin exceeds 40%, what is the combined gross margin percentage of that group taken together (to the nearest 0.1 percentage point)?","topic":"Conditional / threshold-filtered margin","unit":"%","dataTitle":"Saxon Foods — revenue and direct cost by product (£000)","chartType":"table","tableHeaders":["Product","Revenue (£000)","Direct cost (£000)"],"tableRows":[["Nimbus","1240","706.8"],["Orbit","980","539.0"],["Pulse","1560","998.4"],["Quartz","720","381.6"],["Strata","1100","704.0"]],"options":["40.5%","44.7%","45.0%","43.0%"],"answerIndex":1,"reasoning":"First compute each margin: Nimbus (1240−706.8)/1240 = 43.0%, Orbit (980−539.0)/980 = 45.0%, Pulse (1560−998.4)/1560 = 36.0%, Quartz (720−381.6)/720 = 47.0%, Strata (1100−704.0)/1100 = 36.0%. Only Nimbus, Orbit and Quartz exceed 40%. Combine those three in aggregate: revenue = 1240+980+720 = 2,940; direct cost = 706.8+539.0+381.6 = 1,627.4; combined gross margin = (2,940 − 1,627.4)/2,940 = 1,312.6/2,940 = 44.65% → 44.7%. Distractor 45.0% is the simple average of the three selected margins (43+45+47)/3, which ignores their different revenue weights. Distractor 40.5% aggregates over all five products ((5,600 − 3,329.8)/5,600 = 40.5%), ignoring the >40% filter. Distractor 43.0% is a single product's margin (Nimbus), an adjacent-value pick."}]; /* @INJECT:numerical */
const VERBAL_DATA = [{"passageId":"p1","type":"tfc","topic":"Competition regulation / corporate strategy","passage":"In its provisional findings, the competition authority concluded that the proposed merger between Meridian Logistics and Calderon Freight would substantially lessen competition in the overnight parcel segment, where the combined entity would control an estimated 58 percent of national capacity. The authority noted that two smaller carriers had entered the segment in the preceding three years, but judged that neither possessed the depot network required to constrain the merged firm's pricing in the near term. Meridian's representatives argued that efficiency gains from consolidating sortation hubs would be passed to customers as lower tariffs; the authority acknowledged that such gains were plausible but said it had received no verifiable evidence that they would materialise at the scale claimed. The authority indicated that it would consider remedies, including the divestiture of selected depots, before issuing a final decision. It made no determination regarding the same-day courier segment, in which both firms also operate.","statement":"The competition authority found that the two smaller carriers that recently entered the overnight parcel segment would be unable to constrain the merged firm's pricing in the near term.","options":["True","False","Cannot Say"],"answerIndex":0,"reasoning":"The passage states the authority 'judged that neither possessed the depot network required to constrain the merged firm's pricing in the near term.' Lacking the depot network that is required to constrain pricing entails being unable to constrain it, and 'neither' covers both entrants, so the statement is entailed in full, including the 'near term' qualifier — TRUE. It is not Cannot Say because the authority's judgement on precisely this point is explicitly recorded; it is not False because nothing in the passage contradicts it."},{"passageId":"p1","type":"tfc","topic":"Competition regulation / corporate strategy","passage":"In its provisional findings, the competition authority concluded that the proposed merger between Meridian Logistics and Calderon Freight would substantially lessen competition in the overnight parcel segment, where the combined entity would control an estimated 58 percent of national capacity. The authority noted that two smaller carriers had entered the segment in the preceding three years, but judged that neither possessed the depot network required to constrain the merged firm's pricing in the near term. Meridian's representatives argued that efficiency gains from consolidating sortation hubs would be passed to customers as lower tariffs; the authority acknowledged that such gains were plausible but said it had received no verifiable evidence that they would materialise at the scale claimed. The authority indicated that it would consider remedies, including the divestiture of selected depots, before issuing a final decision. It made no determination regarding the same-day courier segment, in which both firms also operate.","statement":"The merger would give the combined entity a dominant position in the same-day courier segment.","options":["True","False","Cannot Say"],"answerIndex":2,"reasoning":"The final sentence states the authority 'made no determination regarding the same-day courier segment,' and the passage supplies no capacity figure or competitive assessment for that segment. Whether the entity would be dominant there is therefore undeterminable from the passage — CANNOT SAY. It is not True (the 58 percent figure is scoped explicitly to overnight parcels) and not False (the passage does not assert the entity would be non-dominant there; it is simply silent). This is the silence-versus-contradiction trap."},{"passageId":"p1","type":"tfc","topic":"Competition regulation / corporate strategy","passage":"In its provisional findings, the competition authority concluded that the proposed merger between Meridian Logistics and Calderon Freight would substantially lessen competition in the overnight parcel segment, where the combined entity would control an estimated 58 percent of national capacity. The authority noted that two smaller carriers had entered the segment in the preceding three years, but judged that neither possessed the depot network required to constrain the merged firm's pricing in the near term. Meridian's representatives argued that efficiency gains from consolidating sortation hubs would be passed to customers as lower tariffs; the authority acknowledged that such gains were plausible but said it had received no verifiable evidence that they would materialise at the scale claimed. The authority indicated that it would consider remedies, including the divestiture of selected depots, before issuing a final decision. It made no determination regarding the same-day courier segment, in which both firms also operate.","statement":"The authority concluded that consolidating Meridian's sortation hubs would produce no efficiency gains.","options":["True","False","Cannot Say"],"answerIndex":1,"reasoning":"The passage says the authority 'acknowledged that such gains were plausible' — it accepted the gains might exist, doubting only that they would materialise 'at the scale claimed.' A statement that the authority concluded there would be NO gains directly contradicts 'acknowledged that such gains were plausible,' so FALSE. The distractor conflates 'no verifiable evidence of the claimed scale' with 'concluded there are none'; the passage does the former, not the latter."},{"passageId":"p1","type":"tfc","topic":"Competition regulation / corporate strategy","passage":"In its provisional findings, the competition authority concluded that the proposed merger between Meridian Logistics and Calderon Freight would substantially lessen competition in the overnight parcel segment, where the combined entity would control an estimated 58 percent of national capacity. The authority noted that two smaller carriers had entered the segment in the preceding three years, but judged that neither possessed the depot network required to constrain the merged firm's pricing in the near term. Meridian's representatives argued that efficiency gains from consolidating sortation hubs would be passed to customers as lower tariffs; the authority acknowledged that such gains were plausible but said it had received no verifiable evidence that they would materialise at the scale claimed. The authority indicated that it would consider remedies, including the divestiture of selected depots, before issuing a final decision. It made no determination regarding the same-day courier segment, in which both firms also operate.","statement":"Divestiture of selected depots will be required as a condition of approving the merger.","options":["True","False","Cannot Say"],"answerIndex":2,"reasoning":"The passage says the authority 'indicated that it would consider remedies, including the divestiture of selected depots, before issuing a final decision.' Considering a remedy is not imposing it, and the passage states the final decision has not yet been made. Whether divestiture WILL be required is therefore undetermined — CANNOT SAY. Marking True over-reads 'consider' as 'will require' (modal drift); marking False is wrong because the passage does not rule divestiture out either."},{"passageId":"p1","type":"mcq","topic":"Critical reasoning — assumption","passage":"In its provisional findings, the competition authority concluded that the proposed merger between Meridian Logistics and Calderon Freight would substantially lessen competition in the overnight parcel segment, where the combined entity would control an estimated 58 percent of national capacity. The authority noted that two smaller carriers had entered the segment in the preceding three years, but judged that neither possessed the depot network required to constrain the merged firm's pricing in the near term. Meridian's representatives argued that efficiency gains from consolidating sortation hubs would be passed to customers as lower tariffs; the authority acknowledged that such gains were plausible but said it had received no verifiable evidence that they would materialise at the scale claimed. The authority indicated that it would consider remedies, including the divestiture of selected depots, before issuing a final decision. It made no determination regarding the same-day courier segment, in which both firms also operate.","statement":"Which of the following is an assumption REQUIRED by Meridian's argument that the merger would benefit customers?","options":["The two smaller carriers will exit the overnight parcel segment within three years.","Consolidating the sortation hubs would not raise the merged firm's costs by more than the efficiency savings it generates.","The authority will decline to impose any divestiture remedy.","Same-day courier customers would also receive lower tariffs after the merger.","Calderon Freight currently charges higher tariffs than Meridian."],"answerIndex":1,"reasoning":"Meridian's argument is that efficiency gains from consolidation will be passed on as LOWER tariffs. For there to be net savings to pass on, consolidation must not cost more than it saves — option 2 is a necessary suppressed premise. Apply the negation test: if consolidation costs exceed the savings, there is no net gain to pass through and the conclusion collapses, so the assumption is required. Option 1 concerns rivals, not pass-through. Option 3 is about the authority's remedy, irrelevant to whether customers benefit from the gains. Option 4 extends to a segment the argument never addresses. Option 5 (relative tariffs) is neither stated nor needed for the pass-through logic."},{"passageId":"p2","type":"tfc","topic":"Macroeconomics / monetary policy","passage":"The central bank's quarterly bulletin reported that headline inflation had fallen to 3.1 percent, down from 4.4 percent in the previous quarter, while core inflation, which excludes energy and food prices, remained elevated at 4.0 percent. The bulletin attributed the decline in the headline figure primarily to a sharp fall in wholesale gas prices rather than to any broad easing of domestic demand. The Monetary Policy Committee voted by a margin of six to three to hold the policy rate at its current level, with the dissenting members favouring a further increase on the grounds that wage growth, at 5.6 percent, continued to outpace productivity gains. The bulletin cautioned that the disinflationary effect of energy prices was likely to prove temporary and that services inflation, a closer proxy for underlying price pressure, had not yet shown a sustained downward trend. It offered no forecast for the policy rate beyond the current quarter.","statement":"Core inflation, which excludes energy and food prices, was higher than headline inflation in the quarter reported.","options":["True","False","Cannot Say"],"answerIndex":0,"reasoning":"For the reported quarter the passage gives headline inflation as 3.1 percent and core inflation as 4.0 percent. 4.0 > 3.1, so the statement follows directly — TRUE. The base must be tracked carefully (the 4.4 percent figure is the prior quarter's headline, not a comparator here); no extra assumption is needed, so it is not Cannot Say, and the figures do not contradict the claim, so it is not False."},{"passageId":"p2","type":"tfc","topic":"Macroeconomics / monetary policy","passage":"The central bank's quarterly bulletin reported that headline inflation had fallen to 3.1 percent, down from 4.4 percent in the previous quarter, while core inflation, which excludes energy and food prices, remained elevated at 4.0 percent. The bulletin attributed the decline in the headline figure primarily to a sharp fall in wholesale gas prices rather than to any broad easing of domestic demand. The Monetary Policy Committee voted by a margin of six to three to hold the policy rate at its current level, with the dissenting members favouring a further increase on the grounds that wage growth, at 5.6 percent, continued to outpace productivity gains. The bulletin cautioned that the disinflationary effect of energy prices was likely to prove temporary and that services inflation, a closer proxy for underlying price pressure, had not yet shown a sustained downward trend. It offered no forecast for the policy rate beyond the current quarter.","statement":"The bulletin attributed the decline in headline inflation primarily to the fall in wholesale gas prices.","options":["True","False","Cannot Say"],"answerIndex":0,"reasoning":"The passage states verbatim that the bulletin 'attributed the decline in the headline figure primarily to a sharp fall in wholesale gas prices rather than to any broad easing of domestic demand,' and the statement restates that attribution — TRUE. The statement is deliberately scoped to what the bulletin attributed (a reported claim) rather than to free-standing causal fact, so the passage establishes it directly: it is not Cannot Say, and nothing contradicts it, so it is not False."},{"passageId":"p2","type":"tfc","topic":"Macroeconomics / monetary policy","passage":"The central bank's quarterly bulletin reported that headline inflation had fallen to 3.1 percent, down from 4.4 percent in the previous quarter, while core inflation, which excludes energy and food prices, remained elevated at 4.0 percent. The bulletin attributed the decline in the headline figure primarily to a sharp fall in wholesale gas prices rather than to any broad easing of domestic demand. The Monetary Policy Committee voted by a margin of six to three to hold the policy rate at its current level, with the dissenting members favouring a further increase on the grounds that wage growth, at 5.6 percent, continued to outpace productivity gains. The bulletin cautioned that the disinflationary effect of energy prices was likely to prove temporary and that services inflation, a closer proxy for underlying price pressure, had not yet shown a sustained downward trend. It offered no forecast for the policy rate beyond the current quarter.","statement":"The Monetary Policy Committee will raise the policy rate at its next meeting.","options":["True","False","Cannot Say"],"answerIndex":2,"reasoning":"The Committee voted six to three to HOLD the rate this quarter, and the passage states it 'offered no forecast for the policy rate beyond the current quarter.' What it will do at the next meeting is therefore undetermined — CANNOT SAY. Marking True imports the three dissenters' preference as a future outcome though the minority did not carry the vote; marking False wrongly treats 'no forecast' as a commitment not to raise. The explicit refusal to forecast is the load-bearing clause."},{"passageId":"p3","type":"tfc","topic":"Corporate strategy / climate-risk modelling","passage":"A consultancy's report on physical climate risk to industrial assets modelled flood exposure for 1,200 manufacturing sites operated by its client across four regions. Using a high-emissions scenario, the model projected that the proportion of sites facing a one-in-twenty-year flood event would rise from 14 percent today to 31 percent by 2050. The report stressed that the model captured only riverine and coastal flooding and excluded surface-water flooding from intense rainfall, which it described as a material but poorly quantified additional hazard. It recommended that the client prioritise adaptation spending at the 96 sites already classified as high-exposure, noting that retrofitting flood defences at these sites would cost less than the expected value of the losses they would otherwise incur. The report did not assess the cost-effectiveness of adaptation at sites in the lower exposure bands, and it assumed, for tractability, that the client's asset footprint would remain unchanged through 2050.","statement":"Under the high-emissions scenario, the model projected that the number of the client's sites exposed to a one-in-twenty-year flood event would more than double between today and 2050.","options":["True","False","Cannot Say"],"answerIndex":0,"reasoning":"The footprint is held constant at 1,200 sites through 2050 (stated as the report's tractability assumption), and the exposed proportion rises from 14 percent to 31 percent. Against a fixed base the count scales with the proportion, and 31/14 = 2.21x — equivalently 168 sites today versus 372 by 2050 — which exceeds doubling, so TRUE. The constant-footprint assumption is what licenses converting a proportion change into a count change; without it the count claim would be Cannot Say, which is the discriminator being tested. Nothing contradicts the claim, so it is not False."},{"passageId":"p3","type":"mcq","topic":"Critical reasoning — weaken","passage":"A consultancy's report on physical climate risk to industrial assets modelled flood exposure for 1,200 manufacturing sites operated by its client across four regions. Using a high-emissions scenario, the model projected that the proportion of sites facing a one-in-twenty-year flood event would rise from 14 percent today to 31 percent by 2050. The report stressed that the model captured only riverine and coastal flooding and excluded surface-water flooding from intense rainfall, which it described as a material but poorly quantified additional hazard. It recommended that the client prioritise adaptation spending at the 96 sites already classified as high-exposure, noting that retrofitting flood defences at these sites would cost less than the expected value of the losses they would otherwise incur. The report did not assess the cost-effectiveness of adaptation at sites in the lower exposure bands, and it assumed, for tractability, that the client's asset footprint would remain unchanged through 2050.","statement":"The report concludes that the client should concentrate adaptation spending on the 96 currently high-exposure sites. Which of the following, if true, would MOST weaken the case for that recommendation as a strategy for minimising the client's total expected flood losses?","options":["Retrofitting the 96 high-exposure sites would take several years to complete.","The majority of the client's expected flood losses arise at lower-exposure sites because surface-water flooding, which the model omitted, is concentrated there.","Some of the 96 high-exposure sites are located in only two of the four regions studied.","The high-emissions scenario is more severe than the scenario the client considers most likely.","Flood-defence retrofitting costs have risen since the report was published.","A competitor adopted a similar site-prioritisation approach."],"answerIndex":1,"reasoning":"The recommendation aims to reduce TOTAL expected flood losses by spending on the 96 modelled high-exposure sites. Option 2 attacks the foundation: if most expected losses actually sit at lower-exposure sites via the surface-water hazard the model explicitly excluded, then concentrating spend on the 96 misallocates resources against the stated objective — the strongest weakener, exploiting the passage's own acknowledged limitation. Option 1 (timing) does not show the 96 are the wrong targets. Option 3 (geographic spread) is irrelevant to loss minimisation. Option 4 makes the scenario conservative but leaves the 96 as valid priorities. Option 5 raises cost levels but not the relative prioritisation between bands. Option 6 (competitor behaviour) is irrelevant to whether the strategy minimises this client's losses."},{"passage":"The fabrication of leading-edge logic semiconductors—those at process nodes of five nanometres and below—remains overwhelmingly concentrated in a small number of foundries located in East Asia. Constructing a single advanced fabrication plant now requires capital outlays exceeding twenty billion dollars and a lead time of three to four years before commercial output begins. To diversify supply, several governments have introduced subsidy programmes that defray a portion of construction costs for plants built within their borders. Industry analysts caution, however, that capital alone does not guarantee competitive production. A newly commissioned plant typically suffers low manufacturing yields—the proportion of usable chips per silicon wafer—during its initial ramp, and reaching the yields achieved by an established facility can take many quarters of iterative process tuning. Moreover, the specialised lithography equipment essential to the most advanced nodes is supplied by a single firm, whose annual output is finite. Consequently, even a fully funded plant may be constrained by its place in the equipment-delivery queue. The subsidy programmes have unquestionably accelerated announcements of new capacity, but whether they will materially reduce geographic concentration at the leading edge depends on factors that public funding does not directly address.","passageId":"p4","type":"tfc","statement":"The government subsidy programmes fully cover the construction costs of the new fabrication plants they support.","options":["True","False","Cannot Say"],"answerIndex":1,"reasoning":"The passage says the programmes 'defray a portion of construction costs,' which directly contradicts the claim that they 'fully cover' those costs. Because the statement conflicts with an explicit assertion in the text, it is False rather than Cannot Say; 'a portion' necessarily excludes 'fully.'","topic":"semiconductors"},{"passage":"The fabrication of leading-edge logic semiconductors—those at process nodes of five nanometres and below—remains overwhelmingly concentrated in a small number of foundries located in East Asia. Constructing a single advanced fabrication plant now requires capital outlays exceeding twenty billion dollars and a lead time of three to four years before commercial output begins. To diversify supply, several governments have introduced subsidy programmes that defray a portion of construction costs for plants built within their borders. Industry analysts caution, however, that capital alone does not guarantee competitive production. A newly commissioned plant typically suffers low manufacturing yields—the proportion of usable chips per silicon wafer—during its initial ramp, and reaching the yields achieved by an established facility can take many quarters of iterative process tuning. Moreover, the specialised lithography equipment essential to the most advanced nodes is supplied by a single firm, whose annual output is finite. Consequently, even a fully funded plant may be constrained by its place in the equipment-delivery queue. The subsidy programmes have unquestionably accelerated announcements of new capacity, but whether they will materially reduce geographic concentration at the leading edge depends on factors that public funding does not directly address.","passageId":"p4","type":"tfc","statement":"The single firm that supplies the specialised lithography equipment is located in East Asia.","options":["True","False","Cannot Say"],"answerIndex":2,"reasoning":"The passage states that the most advanced foundries are concentrated in East Asia and that the lithography equipment comes from a single firm, but it never states where that supplier is located. The geographic location of the equipment firm is not given, so the passage provides insufficient information—Cannot Say. It is not True (no location stated) and not False (nothing contradicts an East Asian location either); the real-world fact that this supplier is European is a deliberate trap, since the answer must rest on the passage alone.","topic":"semiconductors"},{"passage":"The fabrication of leading-edge logic semiconductors—those at process nodes of five nanometres and below—remains overwhelmingly concentrated in a small number of foundries located in East Asia. Constructing a single advanced fabrication plant now requires capital outlays exceeding twenty billion dollars and a lead time of three to four years before commercial output begins. To diversify supply, several governments have introduced subsidy programmes that defray a portion of construction costs for plants built within their borders. Industry analysts caution, however, that capital alone does not guarantee competitive production. A newly commissioned plant typically suffers low manufacturing yields—the proportion of usable chips per silicon wafer—during its initial ramp, and reaching the yields achieved by an established facility can take many quarters of iterative process tuning. Moreover, the specialised lithography equipment essential to the most advanced nodes is supplied by a single firm, whose annual output is finite. Consequently, even a fully funded plant may be constrained by its place in the equipment-delivery queue. The subsidy programmes have unquestionably accelerated announcements of new capacity, but whether they will materially reduce geographic concentration at the leading edge depends on factors that public funding does not directly address.","passageId":"p4","type":"mcq","statement":"Which of the following is an assumption required by the analysts' caution that 'capital alone does not guarantee competitive production'?","options":["Subsidy programmes will eventually be discontinued by governments.","Factors other than available funding, such as yield ramps and equipment access, materially affect whether a plant becomes competitive.","Leading-edge nodes will remain at five nanometres for the foreseeable future.","East Asian foundries receive no government support of any kind.","Demand for leading-edge chips will continue to grow indefinitely."],"answerIndex":1,"reasoning":"The caution that money alone is insufficient only makes sense if something besides money determines competitiveness; the passage supplies exactly these factors (yield ramps that 'can take many quarters' and a constrained 'equipment-delivery queue'). Option B states that required assumption. The other options introduce claims (discontinuation of subsidies, frozen node sizes, no East Asian support, indefinite demand growth) that the argument neither requires nor mentions.","topic":"semiconductors"},{"passage":"A gene drive is a genetic engineering technique that biases inheritance so that a chosen DNA sequence is passed to nearly all of an organism's offspring, rather than to the roughly half predicted by ordinary Mendelian inheritance. Using CRISPR-based constructs, researchers have built drives in laboratory populations of the Anopheles mosquito, the principal vector of malaria, that spread a gene impairing female fertility. In contained cage trials, such drives have driven the engineered sequence to high frequency within several generations and, in some experiments, caused the population to collapse. Proponents argue that a self-propagating drive could suppress vector populations across a region without the recurrent application of insecticides. Critics raise two distinct concerns. First, because a drive is designed to spread autonomously, an accidental release could affect wild populations beyond any intended boundary, and once established a drive may be difficult to recall. Second, suppressing a vector species could have ecological consequences that cage trials cannot fully reveal. In response, some laboratories have developed 'reversal drives' intended to overwrite an earlier construct and restore the original sequence. Several scientific bodies have called for a moratorium on any open release until containment and reversibility have been more thoroughly demonstrated. No open-field release of a mosquito gene drive has yet been authorised.","passageId":"p5","type":"tfc","statement":"A gene drive causes a chosen DNA sequence to be inherited by a substantially greater proportion of offspring than ordinary Mendelian inheritance would predict.","options":["True","False","Cannot Say"],"answerIndex":0,"reasoning":"The opening sentence defines a gene drive as biasing inheritance 'so that a chosen DNA sequence is passed to nearly all of an organism's offspring, rather than to the roughly half predicted by ordinary Mendelian inheritance.' 'Nearly all' versus 'roughly half' is substantially greater, so the statement follows necessarily and is True. It is not False (it restates the definition) and not Cannot Say (the comparison is explicit).","topic":"biotechnology"},{"passage":"A gene drive is a genetic engineering technique that biases inheritance so that a chosen DNA sequence is passed to nearly all of an organism's offspring, rather than to the roughly half predicted by ordinary Mendelian inheritance. Using CRISPR-based constructs, researchers have built drives in laboratory populations of the Anopheles mosquito, the principal vector of malaria, that spread a gene impairing female fertility. In contained cage trials, such drives have driven the engineered sequence to high frequency within several generations and, in some experiments, caused the population to collapse. Proponents argue that a self-propagating drive could suppress vector populations across a region without the recurrent application of insecticides. Critics raise two distinct concerns. First, because a drive is designed to spread autonomously, an accidental release could affect wild populations beyond any intended boundary, and once established a drive may be difficult to recall. Second, suppressing a vector species could have ecological consequences that cage trials cannot fully reveal. In response, some laboratories have developed 'reversal drives' intended to overwrite an earlier construct and restore the original sequence. Several scientific bodies have called for a moratorium on any open release until containment and reversibility have been more thoroughly demonstrated. No open-field release of a mosquito gene drive has yet been authorised.","passageId":"p5","type":"tfc","statement":"Deploying a gene drive in wild mosquito populations would eradicate malaria as a human disease.","options":["True","False","Cannot Say"],"answerIndex":2,"reasoning":"The passage says drives could 'suppress vector populations' and impair fertility, and that cage trials sometimes caused population collapse, but it never claims that deploying a drive in the wild would eradicate the disease malaria in humans—indeed no open release has been authorised. Disease eradication is a stronger, separate outcome the passage does not establish, so Cannot Say. It is not True (never asserted) and not False (the passage does not deny it either); the plausibility of the claim in popular discussion is the trap.","topic":"biotechnology"},{"passage":"A gene drive is a genetic engineering technique that biases inheritance so that a chosen DNA sequence is passed to nearly all of an organism's offspring, rather than to the roughly half predicted by ordinary Mendelian inheritance. Using CRISPR-based constructs, researchers have built drives in laboratory populations of the Anopheles mosquito, the principal vector of malaria, that spread a gene impairing female fertility. In contained cage trials, such drives have driven the engineered sequence to high frequency within several generations and, in some experiments, caused the population to collapse. Proponents argue that a self-propagating drive could suppress vector populations across a region without the recurrent application of insecticides. Critics raise two distinct concerns. First, because a drive is designed to spread autonomously, an accidental release could affect wild populations beyond any intended boundary, and once established a drive may be difficult to recall. Second, suppressing a vector species could have ecological consequences that cage trials cannot fully reveal. In response, some laboratories have developed 'reversal drives' intended to overwrite an earlier construct and restore the original sequence. Several scientific bodies have called for a moratorium on any open release until containment and reversibility have been more thoroughly demonstrated. No open-field release of a mosquito gene drive has yet been authorised.","passageId":"p5","type":"tfc","statement":"Every gene drive built by researchers to date has caused the laboratory mosquito population to collapse.","options":["True","False","Cannot Say"],"answerIndex":1,"reasoning":"The passage states that population collapse occurred 'in some experiments,' which entails that not all experiments produced collapse; the universal claim 'every... has caused' therefore contradicts the text and is False. It is not Cannot Say because the qualifier 'in some experiments' provides definite information that refutes the universal statement; it is not True for the same reason.","topic":"biotechnology"},{"passage":"A gene drive is a genetic engineering technique that biases inheritance so that a chosen DNA sequence is passed to nearly all of an organism's offspring, rather than to the roughly half predicted by ordinary Mendelian inheritance. Using CRISPR-based constructs, researchers have built drives in laboratory populations of the Anopheles mosquito, the principal vector of malaria, that spread a gene impairing female fertility. In contained cage trials, such drives have driven the engineered sequence to high frequency within several generations and, in some experiments, caused the population to collapse. Proponents argue that a self-propagating drive could suppress vector populations across a region without the recurrent application of insecticides. Critics raise two distinct concerns. First, because a drive is designed to spread autonomously, an accidental release could affect wild populations beyond any intended boundary, and once established a drive may be difficult to recall. Second, suppressing a vector species could have ecological consequences that cage trials cannot fully reveal. In response, some laboratories have developed 'reversal drives' intended to overwrite an earlier construct and restore the original sequence. Several scientific bodies have called for a moratorium on any open release until containment and reversibility have been more thoroughly demonstrated. No open-field release of a mosquito gene drive has yet been authorised.","passageId":"p5","type":"mcq","statement":"Which option, if true, would most strengthen the proponents' case for deploying a self-propagating gene drive?","options":["Insecticide-based vector control is expensive to administer repeatedly.","Field studies confirm that reversal drives reliably and completely undo an established drive and restore the original population.","The Anopheles mosquito is the principal vector of malaria.","CRISPR constructs are increasingly inexpensive to design in the laboratory.","Some cage trials did not result in population collapse."],"answerIndex":1,"reasoning":"The critics' strongest objection is that a drive may spread beyond intended boundaries and 'may be difficult to recall.' Evidence that reversal drives reliably and completely undo an established drive directly neutralises that objection and thus most strengthens the case for deployment (option B). Option A and D add minor cost considerations, option C merely restates a passage fact, and option E actually undercuts the proponents. Only B addresses the central recallability concern.","topic":"biotechnology"},{"passage":"Small modular reactors, or SMRs, are nuclear fission plants with a generating capacity typically below three hundred megawatts, designed to be assembled largely from factory-built components rather than constructed entirely on site. Advocates contend that standardised, factory production could reduce the cost overruns and schedule delays that have long afflicted large conventional reactors, and that an SMR's smaller output makes it suitable for grids or industrial sites that cannot absorb a gigawatt-scale unit. Several designs incorporate passive safety systems that rely on natural circulation to remove residual heat without external power or operator intervention. Critics note that, because few SMRs have been built and operated commercially, claims about their delivered cost per unit of electricity remain largely projections rather than demonstrated results, and that smaller reactors forgo some of the economies of scale enjoyed by larger plants. SMRs still produce radioactive waste, though proponents argue that certain designs generate less per unit of energy and that the waste can be managed with existing approaches. Regulatory frameworks in many jurisdictions were written for large light-water reactors, and adapting licensing procedures to novel SMR designs has in several cases proved slower than developers anticipated. No consensus yet exists on whether SMRs will achieve the cost reductions their advocates project.","passageId":"p6","type":"tfc","statement":"Small modular reactors produce no radioactive waste.","options":["True","False","Cannot Say"],"answerIndex":1,"reasoning":"The passage states explicitly that 'SMRs still produce radioactive waste,' which directly contradicts the claim that they produce none. This is a flat contradiction of the text, so the statement is False, not Cannot Say; the passage settles the question definitively (it only adds that some designs may produce less per unit, not zero).","topic":"energy"},{"passage":"Small modular reactors, or SMRs, are nuclear fission plants with a generating capacity typically below three hundred megawatts, designed to be assembled largely from factory-built components rather than constructed entirely on site. Advocates contend that standardised, factory production could reduce the cost overruns and schedule delays that have long afflicted large conventional reactors, and that an SMR's smaller output makes it suitable for grids or industrial sites that cannot absorb a gigawatt-scale unit. Several designs incorporate passive safety systems that rely on
