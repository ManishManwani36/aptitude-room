oration, so its overall environmental advantage depends on the carbon intensity of the electricity used. It made no estimate of national lithium demand and did not compare DLE with extraction from hard-rock ore.","statement":"Direct lithium extraction will achieve an 86 percent recovery rate when operated at full commercial scale.","options":["True","False","Cannot Say"],"answerIndex":2,"reasoning":"The 86 percent figure is reported for 'the company's single pilot plant,' and the study 'cautioned that these results were obtained at pilot scale and that recovery and cost at full commercial throughput had not yet been demonstrated.' Whether the same rate will hold at commercial scale is therefore undetermined — CANNOT SAY (index 2). Marking True commits the pilot-to-commercial extrapolation the study expressly refuses to make. Marking False is also wrong: the passage does not assert the rate will drop, only that commercial performance has not yet been shown. The explicit scale caveat creates the fine True-versus-Cannot-Say discrimination."},{"passageId":"p3","type":"mcq","topic":"Critical reasoning — required assumption","passage":"A feasibility study commissioned by an industrial-strategy unit assessed direct lithium extraction (DLE) as an alternative to conventional evaporation ponds for producing battery-grade lithium from continental brines. At the company's single pilot plant, DLE recovered 86 percent of the lithium present in the brine, compared with recovery rates the study described as typically below 50 percent for evaporation ponds in the same basin, and it returned the spent brine underground within hours rather than over the months ponds require. The study cautioned that these results were obtained at pilot scale and that recovery and cost at full commercial throughput had not yet been demonstrated; it also noted that the pilot's favourable water balance depended on a site-specific ability to reinject brine, which may not be available at every prospective location. While DLE reduces the surface land area required, the study observed that its energy demand per tonne of product is higher than that of evaporation, so its overall environmental advantage depends on the carbon intensity of the electricity used. It made no estimate of national lithium demand and did not compare DLE with extraction from hard-rock ore.","statement":"An official concludes from the study: 'Replacing evaporation ponds with DLE at our brine sites will lower the carbon footprint of our lithium production.' Which of the following is an assumption REQUIRED by that conclusion?","options":["DLE recovers more of the lithium present in the brine than evaporation ponds do.","The electricity powering DLE will be low-carbon enough that DLE's higher energy demand per tonne does not outweigh its other advantages, leaving net emissions lower than ponds'.","The ability to reinject spent brine will be available at every one of the official's sites.","DLE can match the 86 percent recovery rate at full commercial scale.","Hard-rock ore extraction has a higher carbon footprint than DLE."],"answerIndex":1,"reasoning":"The conclusion is specifically that emissions — the CARBON footprint — will fall. The passage states DLE's 'energy demand per tonne of product is higher than that of evaporation, so its overall environmental advantage depends on the carbon intensity of the electricity used.' For the switch to lower emissions, the electricity must be clean enough that the higher energy use does not cancel the benefit — option 2. Negation test: if the power were carbon-intensive enough to leave DLE's net emissions equal or higher than ponds', the conclusion would fail, so the assumption is required. Option 1 (recovery) and option 4 (commercial-scale recovery) bear on yield and economics, not on whether emissions fall — a higher-recovery process can still emit more if its electricity is dirty, so neither is required. Option 3 concerns the water balance, a separate advantage from carbon. Option 5 compares an alternative the official is not choosing and the study expressly did not assess, so it is not needed for a conclusion about replacing ponds."}]; /* @INJECT:verbal2 */
const DEDUCTIVE_DATA_2 = [{"type":"conditional","topic":"Extended conditional chains / contrapositive","context":"At a portfolio firm the following policy rules all hold without exception:\n(1) If a deal is sponsor-led, then it carries a management fee.\n(2) If a deal carries a management fee, then it is reported to the limited partners.\n(3) If a deal is reported to the limited partners, then it appears in the quarterly statement.\n(4) If a deal appears in the quarterly statement, then it has been independently valued.\n(5) If a deal has been independently valued, then it is logged in the audit register.\nAn analyst confirms that one particular deal is NOT logged in the audit register.","stem":"Which one of the following must be true of that deal?","options":["It is not sponsor-led.","It is reported to the limited partners.","It has been independently valued.","It is sponsor-led but exempt from the management fee.","It appears in the quarterly statement."],"answerIndex":0,"reasoning":"The five rules compose into one forward chain: sponsor-led -> management fee -> reported -> quarterly statement -> independently valued -> logged. Hence sponsor-led -> logged. Given the deal is NOT logged, the contrapositive of the composed chain gives NOT logged -> NOT sponsor-led, so option A is the unique necessary consequence. Climbing the contrapositive of each link also forces NOT independently valued, NOT in the quarterly statement, NOT reported, and NO management fee for this deal. That is exactly why B, C and E are false: each asserts a POSITIVE link the deal in fact lacks. Option D is internally contradictory: rule (1) makes a management fee a necessary consequence of being sponsor-led, so 'sponsor-led but exempt' can never hold; and we have in any case derived the deal is not sponsor-led. Only A survives."},{"type":"conditional","topic":"Necessary vs sufficient with negation","context":"Two governance rules are in force at a regulated bank:\n(1) The internal audit proceeds only if the control framework is certified.\n(2) Unless the legacy vendor is replaced, the control framework is not certified.\nAn inspector establishes as fact that the control framework IS certified.","stem":"On the basis of these statements alone, which one must be true?","options":["The legacy vendor has been replaced.","The internal audit is proceeding.","The internal audit is not proceeding.","The legacy vendor has not been replaced.","If the control framework is certified, the internal audit must be proceeding."],"answerIndex":0,"reasoning":"Translate each rule precisely. Rule (1) 'audit proceeds only if certified' makes certification a NECESSARY condition for the audit: audit -> certified. It does not say certification triggers the audit. Rule (2) 'unless the vendor is replaced, not certified' means (not replaced) -> (not certified); contrapositive: certified -> replaced. We are given the framework is certified, so certified -> replaced yields option A as a necessary truth. Options B and E commit the converse error (affirming the consequent) on rule (1): certification is necessary but not sufficient for the audit, so the audit's status is undetermined - which also makes C unsupported, since 'not proceeding' is no more forced than 'proceeding'. Option D directly contradicts the valid derivation that the vendor has been replaced. Only A is forced."},{"type":"conditional","topic":"Biconditional chains","context":"A research consortium has agreed that the following equivalences hold strictly (each 'if and only if' is a genuine biconditional):\n(1) Grant A is renewed if and only if Grant B is renewed.\n(2) Grant B is renewed if and only if Grant C is renewed.\n(3) Grant C is renewed if and only if Grant D is renewed.\nIt is later confirmed that Grant D is NOT renewed.","stem":"Which one of the following must be true?","options":["Grant A is not renewed.","Grant A is renewed.","Grant B is renewed but Grant C is not.","Exactly one of the four grants is renewed.","Grant C is renewed."],"answerIndex":0,"reasoning":"Biconditionals chain in truth value: from A<->B, B<->C and C<->D it follows that all four grants share one common renewal status (all renewed or all not). Given D is not renewed, every grant is not renewed, so 'Grant A is not renewed' (option A) is necessarily true. Option B asserts the opposite of the forced value. Option C violates biconditional (2), which requires B and C to match. Option E contradicts (3), since D's non-renewal forces C's non-renewal. Option D is impossible: the grants cannot differ in status, so 'exactly one renewed' (which would require a difference) cannot occur - in fact zero are renewed. Only A holds."},{"type":"conditional","topic":"Chain with negated antecedents / contrapositive","context":"A programme office operates under these standing rules:\n(1) If the budget is not frozen, then the pilot launches.\n(2) If the pilot launches, then the eastern region expands.\n(3) If the eastern region expands, then headcount rises.\nAt year end, it is recorded that headcount did NOT rise.","stem":"Which one of the following must be true?","options":["The budget is frozen.","The budget is not frozen.","The pilot launched.","The eastern region expanded.","Headcount rose after all, contradicting the record."],"answerIndex":0,"reasoning":"Chain the rules: (not frozen) -> pilot -> region expands -> headcount rises. By transitivity, (not frozen) -> headcount rises. The contrapositive is (not headcount rises) -> frozen. Given headcount did not rise, the budget must be frozen, so option A is forced. The same contrapositive chain also forces 'the region did not expand' and 'the pilot did not launch', which is precisely why options C and D, asserting those positive events, are false. Option B denies the very conclusion we derived. Option E rejects a stated premise (the recorded fact) rather than reasoning from it, and is not a valid inference. Only A is entailed."},{"type":"sequence","topic":"Grouping with chained conditionals","context":"Six analysts - A, B, C, D, E, F - are split into exactly two project teams, Alpha and Beta, with three analysts on each team. The following all hold:\n(1) A is on Alpha.\n(2) If A is on Alpha, then B is on Beta.\n(3) If B is on Beta, then C is on Beta.\nNo other constraints apply.","stem":"Which one of the following must be true?","options":["C is on Beta.","D is on Alpha.","F is on Alpha.","E is on Beta.","B is on Alpha."],"answerIndex":0,"reasoning":"Apply the conditional chain. Premise (1) puts A on Alpha. Premise (2) then fires (antecedent satisfied), forcing B onto Beta. Premise (3) then fires, forcing C onto Beta. So Beta contains B and C and Alpha contains A; the remaining seat on each team is filled from D, E, F with no further constraint, giving exactly three completions: {Alpha: A,D,E / Beta: B,C,F}, {Alpha: A,D,F / Beta: B,C,E}, {Alpha: A,E,F / Beta: B,C,D}. 'C is on Beta' (option A) holds in all three and is the only fully forced placement. The distractors fail necessity: across these three layouts D is on Alpha in two but on Beta in one (so option B fails), F is on Alpha in two but on Beta in one (option C fails), and E is on Beta in only one of the three (option D fails). Option E ('B on Alpha') directly contradicts the chain, which put B on Beta. Only A is necessary."},{"type":"syllogism","topic":"Quantified syllogism via contrapositive chain","context":"Within an organisation the following universal statements are all true:\n(1) Every compliant initiative is audited.\n(2) No audited initiative is unfunded (equivalently, every audited initiative is funded).\n(3) Every funded initiative is logged.\nConsider one particular initiative that is NOT logged.","stem":"Which one of the following must be true of that initiative?","options":["It is not compliant.","It is funded.","It is audited.","It is compliant.","Because it is not logged, it would become compliant only once logged."],"answerIndex":0,"reasoning":"Read each universal as a conditional about any initiative x: compliant -> audited; audited -> funded; funded -> logged. Composing gives compliant -> logged. The initiative is not logged, so by contrapositive of the composed chain, not logged -> not compliant: option A. The intermediate contrapositive steps also force 'not funded' and 'not audited' for this initiative, which is exactly why options B and C, asserting it IS funded / IS audited, are false. Option D asserts it is compliant, the reverse of the valid conclusion. Option E is an illicit conversion: from 'every compliant initiative is logged' one cannot infer 'every logged initiative is compliant', and it inverts the direction of the conditional. Only A follows."},{"type":"sequence","topic":"Partial-information ranking","context":"Five executives - K, L, M, N, O - are ranked 1 through 5 by revenue generated, where rank 1 is the highest and all ranks are distinct. The following are known:\n(1) K outranks L.\n(2) M outranks N.\n(3) Exactly two executives outrank O.","stem":"Which one of the following must be true?","options":["O is ranked third.","K is ranked first.","N is ranked last (fifth).","L outranks M.","M is ranked second."],"answerIndex":0,"reasoning":"Clue (3) is decisive: if exactly two executives outrank O, then precisely two sit above O and the remaining two below, fixing O at rank 3 in every admissible arrangement, so option A is forced. The other clues (K before L, M before N) order the remaining four executives across ranks 1, 2, 4, 5 but leave room: enumerating all arrangements consistent with the three clues yields exactly six, and in them K is first in only three (M leads in the others), N is last in only some, L outranks M in only some, and M is second in only some. So options B, C, D and E are each possible-but-not-necessary over-reads. Only O's third place is entailed by all the constraints, so A is the unique answer."},{"type":"conditional","topic":"Long chain - identifying the invalid inference","context":"The following conditional rules all hold:\n(1) If a request is escalated, then it is triaged.\n(2) If a request is triaged, then it is assigned an owner.\n(3) If a request is assigned an owner, then it is tracked.\n(4) If a request is tracked, then it is reviewed.","stem":"Four of the following are valid inferences from these rules; which one is NOT?","options":["If a request is reviewed, then it was escalated.","If a request is escalated, then it is reviewed.","If a request is not reviewed, then it was not escalated.","If a request is not assigned an owner, then it was not escalated.","If a request is not tracked, then it was not triaged."],"answerIndex":0,"reasoning":"The rules compose into the forward chain escalated -> triaged -> owner -> tracked -> reviewed. The valid inferences are exactly the composed conditionals in this direction and their contrapositives. Option B ('escalated -> reviewed') is the full forward composition: valid. Option C ('not reviewed -> not escalated') is the contrapositive of B: valid. Option D ('not owner -> not escalated') is the contrapositive of 'escalated -> owner' (rules 1-2): valid. Option E ('not tracked -> not triaged') is the contrapositive of 'triaged -> tracked' (rules 2-3): valid. Option A ('reviewed -> escalated') reverses the chain - it affirms the consequent, the classic illicit conversion - and is NOT entailed. A truth-table check confirms a model in which reviewed is true while escalated, triaged, owner and tracked are all false satisfies all four rules, so A fails. A is the one invalid inference."},{"type":"conditional","topic":"Biconditional plus necessary condition with negation","context":"A transaction is governed by these rules:\n(1) The deal closes if and only if both due diligence clears and the board approves.\n(2) The board approves only if the chief financial officer signs.\n(3) The chief financial officer does not sign.","stem":"Which one of the following must be true?","options":["The deal does not close.","Due diligence does not clear.","The deal closes.","The chief financial officer signs.","The board approves."],"answerIndex":0,"reasoning":"From rule (2), board approval requires the CFO's signature (approves -> signs); contrapositive: not signs -> not approves. Rule (3) gives 'not signs', so the board does not approve - making option E false. Rule (1) is a biconditional: the deal closes exactly when BOTH due diligence clears AND the board approves. Since the board does not approve, the conjunction is false, so the biconditional forces the deal NOT to close: option A. Option C asserts the opposite. Option D contradicts rule (3). Option B is the key trap: a false conjunction (diligence AND board) requires only that at least one conjunct fail, and the board conjunct already fails - this leaves due diligence undetermined. A truth-table check shows two satisfying models, {close F, dd F, board F, cfo F} and {close F, dd T, board F, cfo F}; due diligence is true in one and false in the other, so B is not necessary. Only A is forced."},{"type":"sequence","topic":"Combined ordering and grouping","context":"Five products - V, W, X, Y, Z - are launched one at a time in positions 1 (first) through 5 (last), all in distinct positions. Each product is in exactly one tier, Premium or Standard. The following all hold:\n(1) V is launched before both W and X.\n(2) Z is launched immediately after X (in the very next position).\n(3) Exactly two products are Premium.\n(4) Y is Premium.\n(5) W is Standard.\n(6) The two Premium products are launched in consecutive positions.\n(7) The first product launched is Standard.","stem":"Which one of the following must be true?","options":["V is launched first.","X is Premium.","Z is Premium.","Y is launched before Z.","X is launched third."],"answerIndex":0,"reasoning":"Work the constraints jointly. Enumerating every ordering and tiering against the seven rules yields exactly four admissible layouts: [V,W,X,Z,Y] Premium {Y,Z}; [V,W,Y,X,Z] Premium {X,Y}; [V,X,Z,Y,W] Premium {Y,Z}; [V,Y,X,Z,W] Premium {X,Y}. In all four, V is in position 1, so 'V is launched first' (option A) is necessary. The argument for why: clue (1) puts V before W and X; clue (2) makes Z follow X, so V precedes Z too; the only product that could possibly precede V is Y, but Y is Premium (clue 4) and clue (7) requires the first launch to be Standard, so Y cannot be first - leaving V as the sole candidate for position 1. The distractors are each possible but not necessary: X is Premium in two of the four layouts and Z Premium in the other two; Y launches before Z in two of four; and X is third in only some - so options B, C, D and E all fail necessity. Only A is forced in every layout."},{"type":"arrangement","topic":"6-entity puzzle combining left-right ordering with two-group assignment; forced grouping despite floating positions","context":"Six analysts — Maro, Niven, Okabe, Pak, Quinn and Rao — are seated in a single row of six desks numbered 1 to 6 from left to right (one analyst per desk). Independently, each analyst is assigned to exactly one of two project pods, Alpha or Beta, and each pod contains exactly three analysts. All of the following hold:\n(1) Maro sits at one end of the row (desk 1 or desk 6).\n(2) Niven sits immediately to the left of Okabe.\n(3) Pak and Quinn are in the same pod.\n(4) Rao is in a different pod from Niven.\n(5) The three Alpha analysts occupy three consecutive desks.\n(6) Okabe is in pod Beta and sits somewhere to the right of Quinn.\n(7) Maro and Rao are in the same pod.","stem":"Which one of the following MUST be true?","options":["Pak and Quinn are in different pods.","Okabe shares a pod with both Maro and Rao.","Niven occupies desk 4.","Quinn sits somewhere to the left of Pak.","Rao and Niven share a pod."],"answerIndex":1,"reasoning":"The grouping is fully forced even though the seating is not. Work the pods first.\n\nStep 1 — pod sizes. Each pod has exactly three members.\n\nStep 2 — chase the pod constraints. From (6) Okabe is Beta. From (3) Pak and Quinn share a pod; if that pod were Beta it would already hold Okabe, Pak, Quinn — three — forcing Niven, Maro, Rao into Alpha, but (4) says Rao and Niven differ, a contradiction. So Pak and Quinn are both ALPHA. From (7) Maro and Rao share a pod; from (4) Rao differs from Niven. Alpha now holds Pak and Quinn (two of its three seats). If Maro and Rao were Alpha they would be a third and fourth Alpha member — impossible — so Maro and Rao are both BETA. That fills Beta with Okabe, Maro, Rao (three). The last seat in Alpha must be Niven. Check (4): Niven (Alpha) differs from Rao (Beta) — satisfied. So the pods are forced: Alpha = {Niven, Pak, Quinn}; Beta = {Maro, Okabe, Rao}.\n\nStep 3 — evaluate the options against this forced split. Option (B) 'Okabe shares a pod with both Maro and Rao' is exactly Beta = {Maro, Okabe, Rao} — TRUE in every solution.\n\nWhy the others fail. (A) contradicts the deduction that Pak and Quinn are both Alpha. (E) contradicts (4)/the deduction that Niven is Alpha and Rao is Beta. (C) and (D) are about seating, which is NOT pinned down: an exhaustive search yields exactly eight valid layouts (e.g. Maro-Pak-Quinn-Niven-Okabe-Rao and Maro-Rao-Pak-Quinn-Niven-Okabe both satisfy every rule), and across them Niven occupies several different desks and Quinn is sometimes right of Pak — so neither 'must' hold. The trap is assuming that because the pods are determined the positions must be too; only (B) is genuinely forced."},{"type":"arrangement","topic":"6-entity ordering plus two-cohort assignment; first three positions and full cohort split forced, last three positions free","context":"Six trainees — Hale, Iqbal, Jung, Kerr, Lund and Moss — are placed in a single mentoring rota occupying positions 1 to 6 (1 = first, one trainee per position). Separately, each trainee belongs to exactly one of two cohorts, Onyx or Pearl, with exactly three in each cohort. All of the following hold:\n(1) Hale is in cohort Onyx.\n(2) Iqbal sits immediately to the right of (one position later than) Jung.\n(3) Kerr and Lund are in the same cohort.\n(4) Moss is in a different cohort from Hale.\n(5) The three Pearl trainees occupy three consecutive positions.\n(6) Jung is in cohort Onyx and is positioned before Kerr.\n(7) Hale occupies position 1.","stem":"Which one of the following MUST be true?","options":["Kerr is in cohort Onyx.","Iqbal is in cohort Onyx and occupies position 3.","Lund occupies position 4.","Moss occupies position 6.","Kerr and Hale are in the same cohort."],"answerIndex":1,"reasoning":"Deduce the cohorts and the first three positions; the last three positions remain open.\n\nStep 1 — cohorts. (1) Hale = Onyx; (6) Jung = Onyx. That is two of Onyx's three seats. (4) Moss differs from Hale, so Moss = Pearl. (3) Kerr and Lund share a cohort; they cannot both be Onyx (only one Onyx seat remains, and a pair needs two), so Kerr = Lund = Pearl. With Moss, that completes Pearl = {Kerr, Lund, Moss}. The remaining trainee, Iqbal, takes the last Onyx seat: Onyx = {Hale, Iqbal, Jung}.\n\nStep 2 — positions 1-3. (7) Hale = position 1 and is Onyx, so the Pearl trio cannot include position 1. (5) the three Pearl trainees {Kerr, Lund, Moss} occupy three consecutive positions; the only block of three consecutive positions that excludes position 1 and accommodates exactly the three Pearl members (leaving the two remaining Onyx members, Iqbal and Jung, in the other two non-position-1 slots) is positions 4-5-6. Hence positions 2 and 3 hold the two remaining Onyx members, Iqbal and Jung. (2) Iqbal = Jung + 1, so within {2,3} we get Jung = 2, Iqbal = 3. (6) Jung before Kerr: Jung = 2 < Kerr (who is in 4-6) — satisfied.\n\nResult: positions 1-2-3 are Hale, Jung, Iqbal; positions 4-5-6 are Kerr/Lund/Moss in some order. Option (B) — 'Iqbal is in cohort Onyx and occupies position 3' — holds in every solution.\n\nWhy the others fail. (A) and (E) contradict the forced split (Kerr is Pearl, not Onyx, and Hale is Onyx). (C) and (D) concern positions 4-6, which are NOT fixed: Kerr, Lund and Moss can be permuted freely across 4, 5, 6 (an exhaustive search gives exactly six valid layouts), so Lund need not be at 4 and Moss need not be at 6. The trap is over-reading the consecutive-block rule as fixing the order within the block — it fixes only the set of positions, not who sits where."},{"type":"logicalPuzzle","topic":"Comparative ranking fused with three-way region assignment; ranking nearly forced and one region tie-break unresolved","context":"Five managers — Reyes, Sato, Tran, Voss and Wynn — are ranked 1 to 5 by tenure (1 = longest-serving, no ties), and each is assigned to exactly one of three regions: North, South or West. All of the following hold:\n(1) Reyes has longer tenure than Sato (a smaller rank number).\n(2) Exactly one manager ranks between Tran and Voss (their rank numbers differ by exactly two).\n(3) Wynn is ranked either 1st or 5th.\n(4) North has exactly two managers; South and West each have at least one.\n(5) The two North managers hold consecutive ranks.\n(6) Reyes is assigned to West.\n(7) The manager ranked 1st is assigned to North.\n(8) Sato and Tran are in different regions.","stem":"Which one of the following MUST be true?","options":["Sato is ranked 1st.","Tran is ranked 2nd.","Reyes is ranked 3rd and is assigned to West.","Voss is assigned to South.","Wynn and Reyes are in the same region."],"answerIndex":2,"reasoning":"The ranking is forced up to a single Tran/Voss swap; one region remains free.\n\nStep 1 — ranks. (6) Reyes is West, but (7) says rank 1 is North, so Reyes is not rank 1. (1) Reyes is above Sato, so Sato is not rank 1 either. (3) Wynn is 1st or 5th. The clean line is Wynn = 1 (and by (7) Wynn is North). With Wynn = 1, ranks 2-5 hold Reyes, Sato, Tran, Voss. (2) |Tran − Voss| = 2; within {2,3,4,5} the candidate pairs are {2,4} and {3,5}. If Tran/Voss took {3,5}, then Reyes/Sato would take {2,4} with Reyes < Sato ⇒ Reyes 2, Sato 4; an exhaustive solver shows this branch cannot also satisfy the North-consecutive rule (5) together with (4) and (8), so it dies. The surviving family is Tran/Voss in {2,4} and Reyes/Sato in {3,5}: Reyes < Sato ⇒ Reyes 3, Sato 5. So ranks are Wynn 1, Reyes 3, Sato 5, with Tran/Voss filling {2,4} in either order. An exhaustive search confirms exactly five total solutions, every one with Wynn = 1, Reyes = 3, Sato = 5.\n\nStep 2 — regions. (6) pins Reyes = West. (7) Wynn (rank 1) = North. Across the five solutions, Sato's, Voss's and Tran's regions vary (subject to (4),(5),(8)). The only region facts true in every solution are Reyes = West and Wynn = North.\n\nOption (C) 'Reyes is ranked 3rd and is assigned to West' combines two facts that hold in all five solutions — the answer.\n\nWhy the others fail. (A) is false — Sato is always 5th, never 1st. (B) is only sometimes true — Tran and Voss swap between ranks 2 and 4 (three solutions have Tran 2, two have Tran 4). (D) is only sometimes true — Voss's region varies across solutions. (E) is false — Wynn is North and Reyes is West, never the same region (an illicit 'same group' over-read)."},{"type":"logicalPuzzle","topic":"Comparative ranking from chained partial relations; the rank-4 slot is forced even though the full order is not","context":"Six suppliers — Apex, Boric, Crane, Delos, Evtech and Forge — submitted sealed price bids, ranked 1 to 6 by price (rank 1 = highest price, no ties). The following are known:\n(1) Apex's bid is lower-priced than Boric's but higher-priced than Crane's.\n(2) Exactly two bids are higher-priced than Delos's.\n(3) Evtech's bid is higher-priced than Apex's, and Forge's bid is lower-priced than Apex's.\n(4) The price ranks of Evtech and Forge are not adjacent (their rank numbers differ by at least two).","stem":"Which supplier holds the 4th-highest-priced bid (rank 4)?","options":["Crane","Apex","Boric","Evtech","Forge"],"answerIndex":1,"reasoning":"Translate 'higher-priced' as a SMALLER rank number, then chain the clues. The full order is NOT unique, but rank 4 is forced.\n\nStep 1 — anchor Delos. (2) 'exactly two bids are higher-priced than Delos' means two suppliers sit above Delos, so Delos = rank 3.\n\nStep 2 — read clue (1) carefully. 'Apex lower-priced than Boric' ⇒ Apex has a larger rank number than Boric ⇒ Boric_rank < Apex_rank. 'Apex higher-priced than Crane' ⇒ Apex has a smaller rank number than Crane ⇒ Apex_rank < Crane_rank. So the rank chain is Boric < Apex < Crane (Boric the smallest rank number of the three, Crane the largest).\n\nStep 3 — read clue (3). 'Evtech higher-priced than Apex' ⇒ Evtech_rank < Apex_rank. 'Forge lower-priced than Apex' ⇒ Forge_rank > Apex_rank. Combine with Step 2: the suppliers with a smaller rank than Apex are Boric and Evtech (two of them), and the suppliers with a larger rank than Apex are Crane and Forge (two of them). Delos is fixed at rank 3. With exactly two suppliers above Apex and exactly two below, and Delos pinned at 3, Apex cannot be at 3 (that is Delos); it must sit just below the two that beat it. Concretely: Boric and Evtech occupy ranks 1 and 2 (in some order), Delos occupies 3, Apex occupies 4, and Crane and Forge occupy ranks 5 and 6 (in some order).\n\nStep 4 — verify against clue (4). Evtech is at rank 1 or 2; Forge is at rank 5 or 6; the gap is at least three, so |Evtech − Forge| ≥ 2 is automatically satisfied in every arrangement.\n\nAn exhaustive permutation search confirms exactly four valid orderings — Boric/Evtech swap across {1,2} and Crane/Forge swap across {5,6} — and in all four, rank 4 is APEX. So the answer is APEX, option (B).\n\nWhy the distractors fail: across the four orderings Crane is always 5 or 6, Boric always 1 or 2, Evtech always 1 or 2, and Forge always 5 or 6 — none of them ever lands at rank 4. (A) comes from reversing clue (1) and reading Crane as the highest-priced of its trio; (C) from sliding Boric down the chain; (D) Evtech and (E) Forge from mis-seating the bounded pair. Only Apex is forced to rank 4 — the position is fixed even though the rest of the board is not."},{"type":"logicalPuzzle","topic":"Partial-information ranking where the order is under-determined; isolating the single forced relation via chained dominance","context":"Five candidates — Nadia, Omar, Priti, Quill and Rhys — sat a panel interview and received distinct overall scores, ranked 1 to 5 (rank 1 = highest score, no ties). Only the following are known:\n(1) Nadia scored higher than Omar.\n(2) Priti scored higher than Quill.\n(3) Rhys scored higher than Omar.\n(4) Quill scored higher than Omar.","stem":"Which one of the following MUST be true?","options":["Omar is ranked 5th (lowest).","Nadia is ranked 1st.","Priti is ranked higher than Nadia.","Rhys is ranked higher than Quill.","Quill is ranked 4th."],"answerIndex":0,"reasoning":"The full order is not determined, so test each option for whether it holds in EVERY consistent ranking.\n\nStep 1 — count who must beat Omar. (1) Nadia > Omar; (3) Rhys > Omar; (4) Quill > Omar; and (2) Priti > Quill combined with (4) Quill > Omar gives Priti > Omar by transitivity. So all four other candidates — Nadia, Rhys, Quill, Priti — score higher than Omar. With five candidates and Omar below all four, Omar must occupy rank 5. Option (A) is forced.\n\nStep 2 — confirm the others are not forced. The only fixed facts are Omar last and Priti above Quill; Nadia and Rhys are otherwise unconstrained relative to Priti, Quill and each other. An exhaustive enumeration yields exactly twelve valid rankings. Among them:\n• (B) 'Nadia 1st' fails — e.g. Priti, Nadia, Quill, Rhys, Omar is valid with Priti first.\n• (C) 'Priti higher than Nadia' fails — e.g. Nadia, Priti, Quill, Rhys, Omar has Nadia above Priti.\n• (D) 'Rhys higher than Quill' fails — e.g. Nadia, Priti, Quill, Rhys, Omar has Quill above Rhys.\n• (E) 'Quill 4th' fails — e.g. Priti, Quill, Nadia, Rhys, Omar puts Quill at rank 2.\n\nEach of these is true in some rankings and false in others, so none 'must' hold. Only (A), which follows from stacking all four dominance relations above Omar, is guaranteed. The trap is treating a relation that is merely possible (or true in the most 'natural' ordering) as if it were necessary."},{"type":"conditional","topic":"Two-group assignment under capacity plus a conditional chain; unique partition via contrapositive cascade","context":"Six workstreams — Auth, Bill, Cache, Data, Edge and Flux — are each assigned to exactly one of two release trains, R1 or R2. Each train carries at most three workstreams. All of the following hold:\n(1) If Auth is on R1, then Bill is on R2.\n(2) Cache and Data are on the same train.\n(3) If Edge is on R2, then Flux is on R2.\n(4) Auth and Flux are on different trains.\n(5) Bill is on R1.","stem":"Which one of the following MUST be true?","options":["Auth and Data are on the same train.","Edge is on R2.","Flux is on the same train as Cache.","Bill and Auth are on the same train.","Data is on R1."],"answerIndex":0,"reasoning":"With at most three per train and six workstreams, each train carries exactly three. Cascade the conditionals.\n\nStep 1 — Auth. (5) Bill is on R1. Rule (1) says Auth on R1 ⇒ Bill on R2; its contrapositive is: Bill NOT on R2 ⇒ Auth NOT on R1. Since Bill is on R1 (not R2), Auth is NOT on R1, so Auth is on R2.\n\nStep 2 — Flux. (4) Auth and Flux differ; Auth is R2, so Flux is on R1.\n\nStep 3 — Edge. Rule (3) says Edge on R2 ⇒ Flux on R2; contrapositive: Flux NOT on R2 ⇒ Edge NOT on R2. Flux is R1 (not R2), so Edge is NOT on R2, i.e. Edge is on R1.\n\nStep 4 — capacity closes it. R1 now holds Bill, Flux, Edge — three, the maximum. The remaining workstreams Cache and Data must therefore go to R2, which also satisfies rule (2) (Cache = Data, both R2). Final partition: R1 = {Bill, Edge, Flux}; R2 = {Auth, Cache, Data}. An exhaustive search confirms this is the unique assignment.\n\nOption (A): Auth (R2) and Data (R2) are on the same train — TRUE.\n\nWhy the others fail in the unique solution: (B) Edge is on R1, not R2 (asserting it is the affirming-the-consequent misreading of rule 3). (C) Flux is R1 but Cache is R2 — different trains. (D) Bill is R1 but Auth is R2 — different (the contrapositive of rule 1 forces them apart). (E) Data is on R2, not R1. Because the solution is unique, exactly one option is true."},{"type":"dataSufficiency","topic":"Ordering sufficiency — pairwise rank comparison resolved only by combining two partial chains via transitivity","context":"Five regional offices — Gamma, Helix, Ion, Jolt and Kilo — are ranked 1 to 5 by annual revenue (rank 1 = highest, no ties). You must determine the answer to a yes/no question using two statements.\nQuestion: Is Helix ranked higher (a smaller rank number) than Jolt?\nStatement (1): Gamma is ranked higher than Helix, and Helix is ranked higher than Ion.\nStatement (2): Jolt is ranked lower than Ion, and Kilo is ranked higher than Gamma.","stem":"Which of the following is the correct sufficiency verdict?","options":["Statement (1) ALONE is sufficient, but statement (2) alone is not.","Statement (2) ALONE is sufficient, but statement (1) alone is not.","Each statement ALONE is sufficient.","BOTH statements TOGETHER are sufficient, but neither alone is.","The two statements TOGETHER are still NOT sufficient."],"answerIndex":3,"reasoning":"Evaluate each statement separately for whether it forces a definite YES or NO to 'Helix higher than Jolt'.\n\nStatement (1) alone gives Gamma < Helix < Ion (in rank numbers) but says nothing about where Jolt sits. Both answers occur: order Gamma, Helix, Ion, Jolt, Kilo has Helix (2) above Jolt (4) — YES; order Jolt, Gamma, Helix, Ion, Kilo has Jolt (1) above Helix (3) — NO. So (1) yields both YES and NO — NOT sufficient.\n\nStatement (2) alone gives Ion < Jolt and Kilo < Gamma, but pins neither Helix nor any Helix-Jolt link. Both answers occur (e.g. Kilo, Gamma, Helix, Ion, Jolt → Helix above Jolt = YES; Kilo, Gamma, Ion, Jolt, Helix → Helix below Jolt = NO). NOT sufficient.\n\nTogether: (1) gives Helix < Ion; (2) gives Ion < Jolt. By transitivity Helix < Ion < Jolt, so Helix < Jolt — a definite YES in every world consistent with both statements. (An exhaustive check shows the two statements jointly leave a unique ordering, Kilo, Gamma, Helix, Ion, Jolt, in which Helix beats Jolt.) Neither statement alone settles the Helix-Jolt comparison, but combined they force it via the shared term Ion.\n\nTherefore the answer is (D). (A)/(B)/(C) all fail because each statement alone leaves the comparison open; (E) fails because the chain through Ion does resolve it once both are used."},{"type":"dataSufficiency","topic":"Group-assignment sufficiency — a fully constraining count statement vs an uninformative relative statement","context":"Four directors — Lara, Mira, Noor and Otto — are each appointed to exactly one of two board committees, Audit or Risk. You must determine the answer to a yes/no question using two statements.\nQuestion: Is Noor on the Audit committee?\nStatement (1): Each committee has exactly two members; Lara and Otto are both on Audit, and Mira is on Risk.\nStatement (2): Noor is on the same committee as Mira.","stem":"Which of the following is the correct sufficiency verdict?","options":["Statement (1) ALONE is sufficient, but statement (2) alone is not.","Statement (2) ALONE is sufficient, but statement (1) alone is not.","Each statement ALONE is sufficient.","BOTH statements TOGETHER are sufficient, but neither alone is.","The two statements TOGETHER are still NOT sufficient."],"answerIndex":0,"reasoning":"Test each statement separately against 'Is Noor on Audit?'.\n\nStatement (1) alone: Audit has exactly two members and they are named — Lara and Otto. That fills Audit completely, so the remaining directors, Mira and Noor, must both be on Risk. Hence Noor is on Risk — a definite NO. A sufficiency verdict counts a firm 'no' as sufficient, so (1) is SUFFICIENT. There is exactly one assignment consistent with (1): Audit = {Lara, Otto}, Risk = {Mira, Noor}.\n\nStatement (2) alone: Noor shares a committee with Mira, but nothing fixes which committee Mira is on. If Mira is on Audit, Noor is on Audit (answer YES); if Mira is on Risk, Noor is on Risk (answer NO). Both occur, so (2) is NOT sufficient.\n\nSince (1) alone settles the question and (2) alone does not, the answer is (A). The two statements are mutually consistent — in (1)'s unique world Mira and Noor are both on Risk, which satisfies (2) — so there is no contradiction; the point is simply that (2) carries no independent power to fix Noor. (B)/(C) fail because (2) leaves Noor open; (D) fails because (1) already suffices alone; (E) fails because a sufficient statement exists. The classic trap is reading (2)'s 'same committee' as if it located Noor, when it only ties Noor to an unplaced Mira."},{"type":"dataSufficiency","topic":"Sequencing sufficiency — two partial constraints that, even combined, leave the target position open","context":"Five projects — Pax, Qophi, Rune, Sail and Tide — are scheduled in five distinct slots numbered 1 to 5 (slot 1 = first, one project per slot). You must determine the answer to a yes/no question using two statements.\nQuestion: Is Pax scheduled first (slot 1)?\nStatement (1): Qophi is scheduled immediately before Rune, and Sail is scheduled somewhere after Rune.\nStatement (2): Tide is scheduled neither first nor last.","stem":"Which of the following is the correct sufficiency verdict?","options":["Statement (1) ALONE is sufficient, but statement (2) alone is not.","Statement (2) ALONE is sufficient, but statement (1) alone is not.","Each statement ALONE is sufficient.","BOTH statements TOGETHER are sufficient, but neither alone is.","The two statements TOGETHER are still NOT sufficient to answer."],"answerIndex":4,"reasoning":"Test whether 'Pax is in slot 1' is forced to a definite yes/no by each statement, then by both.\n\nStatement (1) alone constrains Qophi-Rune-Sail but never mentions Pax. Pax can be slot 1 (e.g. Pax, Qophi, Rune, Sail, Tide → YES) or not (e.g. Qophi, Rune, Pax, Tide, Sail → NO). Both answers occur — NOT sufficient.\n\nStatement (2) alone only keeps Tide off slots 1 and 5; Pax is unconstrained, so Pax may or may not be first. Both answers occur — NOT sufficient.\n\nBoth together: we still have not constrained Pax's slot. Concrete witnesses, each satisfying (1) Qophi immediately before Rune with Sail after Rune AND (2) Tide not first/last:\n• Pax, Qophi, Rune, Tide, Sail — Pax IS first (YES).\n• Qophi, Rune, Pax, Tide, Sail — Pax is NOT first (NO).\nBoth are fully valid, so even combined the statements do not settle the question. (An exhaustive search finds six schedules consistent with both; Pax occupies slot 1 in some and other slots in others.)\n\nTherefore the answer is (E). The trap is assuming that two non-trivial ordering constraints must jointly pin down a five-slot sequence; here they leave Pax — the only project the question cares about — entirely free, because neither statement ever references Pax."},{"type":"arrangement","topic":"Capstone 6-entity puzzle interlocking slot ordering, two-track assignment, a consecutive-block rule and an adjacency rule; unique full layout","context":"Six speakers — Vale, Wren, Xeno, Yara, Zinn and Ogun — fill a six-slot conference agenda numbered 1 to 6 (slot 1 = first, one speaker per slot). Each speaker is also assigned to exactly one of two tracks, Strategy or Tech, with exactly three speakers on each track. All of the following hold:\n(1) Vale speaks in slot 1.\n(2) Wren speaks in the slot immediately after Xeno.\n(3) Yara speaks in an earlier slot than Zinn.\n(4) The three Tech-track speakers occupy three consecutive slots.\n(5) Vale is on the Tech track.\n(6) Zinn is on the Strategy track.\n(7) Xeno and Wren are on different tracks.\n(8) Yara is on the Strategy track.","stem":"Which one of the following MUST be true?","options":["Xeno speaks in slot 3 and is on the Tech track.","Wren is on the Tech track.","Ogun speaks in slot 6.","Yara speaks in an earlier slot than Wren.","Zinn is on the Tech track."],"answerIndex":0,"reasoning":"Combine the track and slot rules into a single layout.\n\nStep 1 — locate the Tech block. (5) Vale is Tech and (1) Vale is in slot 1. (4) the three Tech speakers occupy three consecutive slots; since Vale (Tech) is in slot 1, that block must start at slot 1 — it is slots 1-2-3. So the Tech speakers sit in slots 1, 2, 3 and the Strategy speakers in slots 4, 5, 6.\n\nStep 2 — fix the tracks. (6) Zinn = Strategy and (8) Yara = Strategy, so Zinn and Yara are among slots 4-6. (7) Xeno and Wren are on different tracks, so one of them is Tech (slots 1-3) and the other Strategy (slots 4-6). The Strategy trio (slots 4-6) is therefore Yara, Zinn and whichever of Xeno/Wren is Strategy; the Tech trio (slots 1-3) is Vale plus the other of Xeno/Wren plus Ogun.\n\nStep 3 — apply the immediate-adjacency rule (2): Wren = Xeno + 1, so Xeno and Wren occupy consecutive slots. But (7) puts them on different tracks, and the only track boundary is between slot 3 (Tech) and slot 4 (Strategy). The single consecutive cross-boundary pair is slots 3 and 4. Hence Xeno = slot 3 (Tech) and Wren = slot 4 (Strategy).\n\nStep 4 — fill the rest. The Tech trio (slots 1,2,3) is now Vale(1), Xeno(3) and one more in slot 2; since Yara and Zinn are Strategy and Wren is in slot 4, the remaining Tech speaker is Ogun, so Ogun = slot 2. The Strategy trio (slots 4,5,6) is Wren(4), Yara, Zinn; (3) Yara before Zinn ⇒ Yara = 5, Zinn = 6. Final unique layout: slot 1 Vale (Tech), 2 Ogun (Tech), 3 Xeno (Tech), 4 Wren (Strategy), 5 Yara (Strategy), 6 Zinn (Strategy). An exhaustive search over all slot permutations and track assignments confirms exactly one solution.\n\nOption (A) 'Xeno speaks in slot 3 and is on the Tech track' is true in that unique layout — the answer.\n\nWhy the others fail: (B) Wren is Strategy, not Tech (forced by the cross-boundary adjacency). (C) Ogun is in slot 2, not 6. (D) Yara (slot 5) speaks later than Wren (slot 4), not earlier. (E) Zinn is Strategy by (6), not Tech. Because the layout is unique, exactly one option holds."}]; /* @INJECT:deductive2 */

function normNum(q,i,t){return {id:'T'+t+'-NUM-'+(i+1),section:'numerical',number:i+1,type:'numerical',stem:q.stem,
  visual:{kind:'chart',chart:q},options:q.options.map(x=>({text:x})),answerIndex:q.answerIndex,reasoning:q.reasoning,topic:q.topic||''};}
function normVerb(q,i,t){return {id:'T'+t+'-VER-'+(i+1),section:'verbal',number:i+1,type:q.type||'tfc',passage:q.passage,passageId:t+'-'+(q.passageId||(''+i)),
  stem:q.statement,options:q.options.map(x=>({text:x})),answerIndex:q.answerIndex,reasoning:q.reasoning,topic:q.topic||''};}
function normDed(q,i,t){return {id:'T'+t+'-DED-'+(i+1),section:'deductive',number:i+1,type:q.type||'logic',context:q.context||'',stem:q.stem,
  options:q.options.map(x=>({text:x})),answerIndex:q.answerIndex,reasoning:q.reasoning,topic:q.topic||''};}

let TESTS={}, BANK={};
function normSet(t){
  const numSrc=t===2?NUMERICAL_DATA_2:NUMERICAL_DATA;
  const verSrc=t===2?VERBAL_DATA_2:VERBAL_DATA;
  const dedSrc=t===2?DEDUCTIVE_DATA_2:DEDUCTIVE_DATA;
  return {
    numerical:numSrc.map((q,i)=>normNum(q,i,t)),
    verbal:verSrc.map((q,i)=>normVerb(q,i,t)),
    inductive:buildInductive(t),
    deductive:dedSrc.map((q,i)=>normDed(q,i,t))
  };
}
function buildBank(){ TESTS={1:normSet(1),2:normSet(2)}; BANK=TESTS[store.test||1]; }
function setTest(t){ store.test=t; BANK=TESTS[t]||BANK; save(); }
function selectTest(t){ if(store.test===t)return; setTest(t); render(); }
function testSwitch(){ return '<div class="testswitch"><span class="tslabel">Test</span>'+[1,2].map(t=>'<button class="'+(store.test===t?'on':'')+'" onclick="selectTest('+t+')" aria-label="Test '+t+'">'+t+'</button>').join('')+'</div>'; }

const LETTERS=['A','B','C','D','E'];
const LS_KEY='aptitude-room-v1';
let state={view:'home',mode:'study',section:null,idx:0};
let store={theme:'light',test:1,answers:{},revealed:{},flags:{}};
let quiz=null; // {section, ids, answers, flags, idx, start, limit, endsAt, timer, submitted}

function load(){try{const s=JSON.parse(localStorage.getItem(LS_KEY));if(s)store=Object.assign(store,s);}catch(e){}}
function save(){try{localStorage.setItem(LS_KEY,JSON.stringify(store));}catch(e){}}
function esc(s){return (''+(s==null?'':s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1900);}

function setTheme(th){document.documentElement.setAttribute('data-theme',th);store.theme=th;save();
  document.getElementById('themeBtn').innerHTML = th==='dark'
   ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19" stroke-linecap="round"/></svg>'
   : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5Z" stroke-linejoin="round"/></svg>';}
function toggleTheme(){setTheme(store.theme==='dark'?'light':'dark');}

function go(view,opts){state=Object.assign(state,{view},opts||{});window.scrollTo({top:0,behavior:'smooth'});render();}

function renderNav(){
  const items=[['home','Overview'],['study','Study'],['quiz','Mock Test'],['key','Answer Key']];
  document.getElementById('nav').innerHTML=items.map(([v,l])=>{
    const on=(v===state.view||(v==='study'&&state.view==='studyQ')||(v==='quiz'&&(state.view==='quizSetup'||state.view==='quizQ'||state.view==='results')))?'on':'';
    return '<button class="'+on+'" onclick="navTo(\''+v+'\')">'+l+'</button>';
  }).join('');
}
function navTo(v){
  if(v==='study')return go('study');
  if(v==='quiz')return go('quizSetup');
  if(v==='key')return go('key');
  go('home');
}

/* ------------------------------------------------ VIEWS */
function render(){
  renderNav();
  const app=document.getElementById('app');
  let html='';
  if(state.view==='home')html=viewHome();
  else if(state.view==='study')html=viewStudyPicker();
  else if(state.view==='studyQ')html=viewQuestion('study');
  else if(state.view==='quizSetup')html=viewQuizSetup();
  else if(state.view==='quizQ')html=viewQuestion('quiz');
  else if(state.view==='results')html=viewResults();
  else if(state.view==='key')html=viewKey();
  app.innerHTML=html;
}

function secCount(k){return (BANK[k]||[]).length;}
function totalCount(){return SECTIONS.reduce((a,s)=>a+secCount(s.key),0);}

    const n=secCount(s.key); const avail=n>0;

      '<h3>'+s.name+'</h3><div class="tag">'+s.tag+'</div>'+
      '<p>'+s.blurb+'</p>'+
      '<div class="meta"><span><b>'+(avail?n:'—')+'</b> questions</span><span>~<b>'+(avail?Math.round(n*1.1):'—')+'</b> min</span><span>Level <b>Managerial</b></span></div>'+
      '<div class="acts">'+
        '<button class="btn" '+(avail?'':'disabled')+' onclick="startStudy(\''+s.key+'\')">Study</button>'+
        '<button class="btn ghost" '+(avail?'':'disabled')+' onclick="startQuiz(\''+s.key+'\')">Timed test</button>'+

  const t2desc = store.test===2 ? 'Test 2 — all-new scenarios, a notch harder.' : 'Test 1 — the core managerial set.';
  return ''+
  '<section class="hero">'+
    '<div><div class="kicker">Original practice · worked solutions</div>'+

    '<p>Two full mock tests — 160 questions across the four classic aptitude families, each pitched at the senior-professional band and explained in full. Study at your own pace, then sit a timed mock under exam conditions.</p></div>'+
    '<div class="hero-stats">'+
      '<div class="hstat"><div class="n">'+(grand||160)+'</div><div class="l">Questions</div></div>'+
      '<div class="hstat"><div class="n">2</div><div class="l">Full tests</div></div>'+
    '</div>'+
  '</section>'+

  '<div class="testbar">'+testSwitch()+'<span class="testdesc">'+t2desc+'</span></div>'+
  '<div class="sec-grid">'+cards+'</div>'+
  '<div class="banner"><div><h4>Sit the full mock</h4><p>All four sections back-to-back under a single clock — the closest thing to the real assessment. Get a per-section breakdown and review every answer.</p></div>'+
    '<div class="acts"><button class="btn accent lg" '+(ready?'':'disabled')+' onclick="startQuiz(\'all\')">Begin full mock</button></div></div>'+
  '<div class="tips"><h4>How to get the most from this</h4>'+
    '<ul>'+

function viewStudyPicker(){
  let cards=SECTIONS.map(s=>{
    const n=secCount(s.key),avail=n>0;
    let done=0;(BANK[s.key]||[]).forEach(q=>{if(store.revealed[q.id])done++;});
    return '<article class="sec-card"><div class="glyph">'+s.glyph+'</div><h3>'+s.name+'</h3>'+
      '<div class="tag">'+s.tag+'</div><p>'+s.blurb+'</p>'+
      '<div class="meta"><span><b>'+(avail?n:'—')+'</b> questions</span><span><b>'+done+'</b> reviewed</span></div>'+
      '<div class="acts"><button class="btn" '+(avail?'':'disabled')+' onclick="startStudy(\''+s.key+'\')">'+(done?'Continue':'Start')+'</button></div></article>';
  }).join('');
  return '<div class="qhead" style="margin-top:18px"><span class="crumb">Study mode · <b>untimed</b></span></div>'+
    '<p style="color:var(--ink-soft);max-width:60ch;margin-bottom:16px">Work through a section at your own pace. Select an answer to check it, then reveal a full worked solution. Your progress is remembered on this device.</p>'+
    '<div class="testbar">'+testSwitch()+'<span class="testdesc">'+(store.test===2?'Test 2 — harder set':'Test 1 — core set')+'</span></div>'+
    '<div class="sec-grid">'+cards+'</div>';
}

function startStudy(key){if(!secCount(key))return;state.mode='study';state.section=key;state.idx=0;go('studyQ');}

function curList(){return state.view==='quizQ'? quiz.questions : (BANK[state.section]||[]);}

function viewQuestion(mode){
  const list=curList(); if(!list.length)return '<p>Section not available yet.</p>';
  const q=list[state.idx];
  const isQuiz=mode==='quiz';
  const chosen = isQuiz? (quiz.answers[q.id]) : (store.answers[q.id]);
  const revealed = isQuiz? false : (store.revealed[q.id] || chosen!=null);
  const sec=SECTIONS.find(s=>s.key===q.section);

  const tn=(q.id&&q.id[1])||store.test;
  let head='<div class="qhead">'+
    '<span class="crumb">Test '+tn+' · <b>'+sec.name+'</b></span>'+
    '<span class="mode-pill">'+(isQuiz?'Mock test':'Study')+'</span>';
  if(isQuiz)head+='<span class="timer" id="timer">--:--</span>';
  head+='</div>';

  let body='<div class="paper"><div class="qbody">';
  body+='<div class="qnum">Question '+(state.idx+1)+' <span style="color:var(--ink-faint)">/ '+list.length+'</span>'+(q.topic?'<span class="qtopic">'+esc(q.topic)+'</span>':'')+'</div>';

  if(q.passage)body+='<div class="passage">'+esc(q.passage).replace(/\n/g,'<br>')+'</div>';
  if(q.context)body+='<div class="context-box"><span class="lbl">The setup</span>'+esc(q.context).replace(/\n/g,'<br>')+'</div>';

  // visual
  if(q.visual&&q.visual.kind==='chart')body+=renderChart(q.visual.chart);
  if(q.visual&&q.visual.kind==='inductive')body+=renderInductiveVisual(q.visual);

  body+='<div class="stem q">'+q.stem+'</div>';

  // options
  const isFig=q.visual&&q.visual.kind==='inductive';
  body+='<div class="opts'+(isFig?' grid':'')+'">';
  q.options.forEach((o,i)=>{
    let cls='opt'+(isFig?' fig-opt':'');
    if(revealed){ if(i===q.answerIndex)cls+=' correct'; else if(i===chosen)cls+=' wrong'; }
    else if(i===chosen)cls+=' sel';
    const mark = revealed? (i===q.answerIndex?'<span class="mark">Correct</span>':(i===chosen?'<span class="mark">Your pick</span>':'')) :'';
    body+='<button class="'+cls+'" '+(revealed?'disabled':'')+' onclick="pick(\''+q.id+'\','+i+')">'+
      '<span class="bub">'+LETTERS[i]+'</span>'+
      (o.svg? '<span class="figbox">'+o.svg+'</span>' : '<span>'+esc(o.text)+'</span>')+
      mark+'</button>';
  });
  body+='</div>';

  // footer / reveal
  if(!isQuiz){
    body+='<div class="qfoot">'+
      '<button class="btn ghost" onclick="toggleReveal(\''+q.id+'\')">'+(revealed?'Hide solution':'Reveal solution')+'</button>'+
      (chosen!=null&&!revealed?'<span style="color:var(--ink-soft);font-size:.85rem">Answer recorded — reveal to check.</span>':'')+
      '</div>';
    body+='<div class="reveal'+(revealed?' show':'')+'" id="rev-'+q.id+'">'+revealBlock(q,chosen)+'</div>';
  } else {
    body+='<div class="qfoot"><button class="btn ghost" onclick="toggleFlag(\''+q.id+'\')">'+(quiz.flags[q.id]?'★ Flagged':'☆ Flag for review')+'</button></div>';
  }
  body+='</div></div>';

  // pager + rail
  let pager='<div class="pager">'+
    '<button class="btn ghost" '+(state.idx===0?'disabled':'')+' onclick="navQ(-1)">← Prev</button>'+
    '<span class="pinfo">'+(state.idx+1)+' of '+list.length+'</span>';
  if(state.idx<list.length-1)pager+='<button class="btn" onclick="navQ(1)">Next →</button>';
  else if(isQuiz)pager+='<button class="btn accent" onclick="submitQuiz()">Submit test ✓</button>';
  else pager+='<button class="btn" onclick="navTo(\'study\')">Finish ✓</button>';
  pager+='</div>';

  // OMR rail
  let bubbles=list.map((qq,i)=>{
    let c='';
    if(i===state.idx)c+=' cur';
    if(isQuiz){ if(quiz.answers[qq.id]!=null)c+=' done'; if(quiz.flags[qq.id])c+=' flag'; }
    else { if(store.revealed[qq.id]||store.answers[qq.id]!=null){ c+= store.answers[qq.id]===qq.answerIndex?' right':(store.answers[qq.id]!=null?' wrong':' done'); } }
    return '<button class="'+c.trim()+'" onclick="jumpQ('+i+')">'+(i+1)+'</button>';
  }).join('');
  let rail='<div class="rail"><div class="rhead"><span>'+(isQuiz?'Answer sheet':'Progress')+'</span><span>'+(isQuiz?'Filled-in '+Object.keys(quiz.answers).length+'/'+list.length:'')+'</span></div><div class="omr">'+bubbles+'</div></div>';

  return head+body+pager+rail;
}

function renderInductiveVisual(v){
  if(v.layout==='series'){
    let f=v.frames.map(s=>'<div class="frame">'+s+'</div>').join('');
    return '<div class="viz"><div class="frames">'+f+'<div class="arrow-sep">→</div><div class="frame q">?</div></div></div>';
  }
  if(v.layout==='matrix'){
    let cells=v.cells.map(c=> c==null? '<div class="mcell q">?</div>' : '<div class="mcell">'+c+'</div>').join('');
    return '<div class="viz matrix-wrap"><div class="matrix">'+cells+'</div></div>';
  }
  if(v.layout==='analogy'){
    return '<div class="viz"><div class="analogy">'+
      '<div class="pair"><div class="frame sm">'+v.a+'</div><span class="op">:</span><div class="frame sm">'+v.b+'</div></div>'+
      '<span class="op">::</span>'+
      '<div class="pair"><div class="frame sm">'+v.c+'</div><span class="op">:</span><div class="frame q sm">?</div></div>'+
      '</div></div>';
  }
  return ''; // oddoneout: no visual, options carry the figures
}

function revealBlock(q,chosen){
  const correct = chosen===q.answerIndex;
  const got = chosen!=null;
  let v = got
    ? '<div class="verdict '+(correct?'ok':'no')+'"><span class="pin">'+(correct?'CORRECT':'NOT QUITE')+'</span>You chose '+LETTERS[chosen]+' · answer is '+LETTERS[q.answerIndex]+'</div>'
    : '<div class="verdict ok"><span class="pin">ANSWER</span>The answer is '+LETTERS[q.answerIndex]+'</div>';
  return v+'<div class="reasoning"><span class="lbl">Worked solution</span>'+q.reasoning+'</div>';
}

function pick(id,i){
  const list=curList(); const q=list.find(x=>x.id===id);
  if(state.view==='quizQ'){ quiz.answers[id]=i; }
  else { store.answers[id]=i; store.revealed[id]=true; save(); }
  render();
}
function toggleReveal(id){store.revealed[id]=!store.revealed[id];save();render();}
function toggleFlag(id){quiz.flags[id]=!quiz.flags[id];render();}
function navQ(d){const list=curList();state.idx=Math.max(0,Math.min(list.length-1,state.idx+d));go(state.view);}
function jumpQ(i){state.idx=i;go(state.view);}

/* ------------------------------------------------ QUIZ */
function viewQuizSetup(){
  let opts=SECTIONS.map(s=>{const n=secCount(s.key);return '<button class="opt" '+(n?'':'disabled')+' onclick="startQuiz(\''+s.key+'\')"><span class="bub">'+s.name[0]+'</span><span><b>'+s.name+'</b> — '+(n||'—')+' questions · ~'+Math.round(n*1.1)+' min</span></button>';}).join('');
  const tot=totalCount();
  return '<div class="qhead" style="margin-top:18px"><span class="crumb">Mock test · <b>timed</b></span></div>'+
    '<div class="testbar" style="margin-bottom:14px">'+testSwitch()+'<span class="testdesc">'+(store.test===2?'Test 2 — harder set':'Test 1 — core set')+'</span></div>'+
    '<div class="paper"><div class="qbody">'+
    '<div class="stem">Choose your mock — Test '+store.test+'</div>'+
    '<p style="color:var(--ink-soft);margin-bottom:18px">Timed at roughly a minute per question — the managerial pace. No solutions until you submit; flag anything you want to revisit.</p>'+
    '<div class="opts" style="margin-bottom:16px"><button class="opt sel" onclick="startQuiz(\'all\')"><span class="bub">★</span><span><b>Full mock</b> — all '+tot+' questions across four sections · ~'+Math.round(tot*1.1)+' min</span></button></div>'+
    '<div class="stem" style="font-size:1rem">…or a single section</div>'+
    '<div class="opts">'+opts+'</div>'+
    '</div></div>';
}

function startQuiz(key){
  let qs=[];
  if(key==='all')SECTIONS.forEach(s=>qs=qs.concat(BANK[s.key]||[]));
  else qs=(BANK[key]||[]).slice();
  if(!qs.length){toast('That section is still being finalised.');return;}
  const limit=Math.round(qs.length*60); // 60s/question
  quiz={key,questions:qs,answers:{},flags:{},start:Date.now(),limit,endsAt:Date.now()+limit*1000,submitted:false,timer:null};
  state.view='quizQ';state.idx=0;
  render();startTimer();
}
function startTimer(){
  if(quiz.timer)clearInterval(quiz.timer);
  const tick=()=>{
    const el=document.getElementById('timer'); if(!el){return;}
    let left=Math.max(0,Math.round((quiz.endsAt-Date.now())/1000));
    const m=Math.floor(left/60),s=left%60;
    el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
    el.classList.toggle('warn',left<=60);
    if(left<=0){clearInterval(quiz.timer);submitQuiz(true);}
  };
  tick();quiz.timer=setInterval(tick,1000);
}
function submitQuiz(auto){
  if(quiz.timer)clearInterval(quiz.timer);
  quiz.submitted=true;quiz.elapsed=Math.round((Date.now()-quiz.start)/1000);
  if(auto)toast("Time's up — test submitted.");
  go('results');
}

function viewResults(){
  const qs=quiz.questions; let correct=0;
  const bySec={};
  qs.forEach(q=>{const ok=quiz.answers[q.id]===q.answerIndex;if(ok)correct++;
    (bySec[q.section]=bySec[q.section]||{c:0,t:0}); bySec[q.section].t++; if(ok)bySec[q.section].c++;});
  const pct=Math.round(correct/qs.length*100);
  const band = pct>=85?'Outstanding':pct>=70?'Strong':pct>=55?'Solid — keep pushing':pct>=40?'Developing':'Early days';
  const mm=Math.floor(quiz.elapsed/60),ss=quiz.elapsed%60;

  let cards=Object.keys(bySec).map(k=>{const b=bySec[k],p=Math.round(b.c/b.t*100);
    const name=SECTIONS.find(s=>s.key===k).name;
    return '<div class="rcard"><div class="rt">'+name+'</div><div class="rv">'+b.c+'/'+b.t+'</div>'+
      '<div class="bar"><i style="width:'+p+'%;background:'+(p>=70?'var(--good)':p>=50?'var(--accent)':'var(--bad)')+'"></i></div></div>';
  }).join('');

  // review chart (reuse bar renderer)
  const chart={chartType:'bar',dataTitle:'Accuracy by section',unit:'%',labels:Object.keys(bySec).map(k=>SECTIONS.find(s=>s.key===k).name.split(' ')[0]),
    series:[{name:'Accuracy',values:Object.keys(bySec).map(k=>Math.round(bySec[k].c/bySec[k].t*100))}]};

  return '<div class="result-hero"><div class="score"><em>'+correct+'</em> / '+qs.length+'</div>'+
    '<div class="band">'+pct+'% · '+band+' · '+ (mm? mm+'m ':'')+ss+'s</div></div>'+
    '<div class="result-grid">'+cards+'</div>'+
    (Object.keys(bySec).length>1? renderChart(chart):'')+
    '<div class="qfoot" style="justify-content:center;margin-top:24px">'+
      '<button class="btn accent" onclick="reviewQuiz()">Review answers</button>'+
      '<button class="btn ghost" onclick="go(\'quizSetup\')">Another test</button>'+
      '<button class="btn ghost" onclick="go(\'home\')">Home</button>'+
    '</div>';
}
function reviewQuiz(){
  // turn quiz answers into study-style reveal: copy into store and open as study list
  quiz.questions.forEach(q=>{if(quiz.answers[q.id]!=null){store.answers[q.id]=quiz.answers[q.id];store.revealed[q.id]=true;}else{store.revealed[q.id]=true;}});
  save();
  // build a transient review by reusing studyQ over the quiz section(s)
  state.reviewList=quiz.questions; state.section=quiz.key==='all'?'numerical':quiz.key;
  // use a dedicated review view via studyQ but on quiz.questions
  state.view='reviewQ';state.idx=0;render();
}

/* review reuses question view over quiz.questions */
const _origCur=curList;
curList=function(){ if(state.view==='reviewQ')return quiz.questions; return _origCur(); };
const _origRender=render;
render=function(){ if(state.view==='reviewQ'){renderNav();document.getElementById('app').innerHTML=viewQuestion('study');return;} _origRender(); };

/* ------------------------------------------------ ANSWER KEY */
let keyFilter='all';
function viewKey(){
  let segs=[['all','All']].concat(SECTIONS.map(s=>[s.key,s.name.split(' ')[0]]));
  let controls='<div class="key-controls">'+testSwitch()+'<div class="seg">'+segs.map(([k,l])=>'<button class="'+(keyFilter===k?'on':'')+'" onclick="setKeyFilter(\''+k+'\')">'+l+'</button>').join('')+'</div>'+
    '<button class="btn ghost" onclick="window.print()">Print / Save PDF</button></div>';
  let body='';
  const secs = keyFilter==='all'? SECTIONS.map(s=>s.key) : [keyFilter];
  secs.forEach(k=>{
    const list=BANK[k]||[]; if(!list.length)return;
    body+='<div class="key-sec-title">'+SECTIONS.find(s=>s.key===k).name+'</div>';
    list.forEach((q,i)=>{
      body+='<div class="key-item"><div class="kh"><span class="kid">'+q.id+'</span>'+
        '<span class="kans">Answer: '+LETTERS[q.answerIndex]+(q.options[q.answerIndex]&&q.options[q.answerIndex].text?' · '+esc(q.options[q.answerIndex].text):'')+'</span></div>'+
        (q.passage?'<div style="font-size:.85rem;color:var(--ink-faint);margin-bottom:6px;font-style:italic">Passage '+esc(q.passageId||'')+'</div>':'')+
        '<div class="kstem">'+ (q.context? '<i style="color:var(--ink-soft)">'+esc(q.context).slice(0,160)+(q.context.length>160?'…':'')+'</i><br>':'') + q.stem+'</div>'+
        '<div class="kreason"><b style="color:var(--accent)">Why:</b> '+q.reasoning+'</div></div>';
    });
  });
  return '<div class="qhead" style="margin-top:18px"><span class="crumb">Answer key · Test '+store.test+' · <b>all worked solutions</b></span></div>'+controls+(body||'<p style="color:var(--ink-soft)">Questions are still being finalised — check back in a moment.</p>');
}
function setKeyFilter(k){keyFilter=k;render();}

/* ------------------------------------------------ BOOT */
function boot(){
  load();
  setTheme(store.theme||'light');
  buildBank();
  render();
}
boot();
</script>
</body>
</html>
