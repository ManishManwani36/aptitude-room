ning":"Contribution margin per unit = 42.50 − 27.80 = £14.70. Break-even = fixed costs / contribution = 388,000 / 14.70 = 26,394.56 units; rounding up gives 26,395. Distractor 26,394 rounds down rather than up — at 26,394 units contribution is 26,394 × 14.70 = £387,991.80, still short of £388,000, so it does not break even. Distractor 9,129 divides fixed cost by price (388,000/42.50 = 9,129.4), ignoring variable cost. Distractor 13,957 divides by the variable cost instead of the contribution margin (388,000/27.80 = 13,956.8)."},{"stem":"BluePeak Telecom routes customer calls through three service tiers, each with its own per-call cost, as shown. What is the blended cost per call across all calls handled (to the nearest penny)?","topic":"Blended rates","unit":"£/call","dataTitle":"BluePeak Telecom — calls and cost by tier","chartType":"table","tableHeaders":["Tier","Calls handled","Cost per call (£)"],"tableRows":[["Tier 1","12400","3.20"],["Tier 2","7800","5.75"],["Tier 3","3100","9.40"]],"options":["£4.88","£6.12","£5.43","£4.65"],"answerIndex":0,"reasoning":"A blended rate must be weighted by volume. Total cost = 12,400×3.20 + 7,800×5.75 + 3,100×9.40 = 39,680 + 44,850 + 29,140 = £113,670. Total calls = 12,400 + 7,800 + 3,100 = 23,300. Blended = 113,670 / 23,300 = £4.878 ≈ £4.88. Distractor £6.12 is the simple unweighted mean of the three rates (3.20+5.75+9.40)/3 = 6.117 — the classic planted error that ignores the very different call volumes. Distractors £5.43 and £4.65 are near-miss values that no consistent method produces."},{"stem":"Vantage Software competes in a market that grew over the year shown. Using the figures in the table, by how many percentage points did Vantage's market share change from 2022 to 2023?","topic":"Market-share shift / percentage points","unit":"pp","dataTitle":"Vantage Software — revenue vs. total market (£m)","chartType":"groupedBar","labels":["2022","2023"],"series":[{"name":"Vantage revenue (£m)","values":[96,128]},{"name":"Total market (£m)","values":[640,710]}],"options":["+3.03 pp","+20.19 pp","+33.33 pp","+2.00 pp"],"answerIndex":0,"reasoning":"Share 2022 = 96/640 = 15.00%. Share 2023 = 128/710 = 18.03%. The change in percentage points is 18.03 − 15.00 = +3.03 pp. Distractor +20.19 pp is the relative percentage change in the share itself ((18.03−15.00)/15.00 = 20.19%) mislabelled as percentage points — the headline percentage-point versus percentage trap. Distractor +33.33 pp is Vantage's own revenue growth ((128−96)/96 = 33.33%), ignoring that the market also grew. Distractor +2.00 pp is a plausible-looking near-miss that no consistent method produces (note that even rounding both shares to whole numbers before differencing still gives 18 − 15 = 3 pp, not 2)."},{"stem":"The chart shows the year-on-year change applied to Northwind Media's subscriber base in three successive years. The base stood at 250,000 subscribers at the end of 2021. What was the subscriber base at the end of 2024 (to the nearest thousand)?","topic":"Compound growth (multi-period)","unit":"subscribers","dataTitle":"Northwind Media — year-on-year change in subscriber base","chartType":"bar","labels":["2021→2022","2022→2023","2023→2024"],"series":[{"name":"Change (%)","values":[12,8,-5]}],"options":["287,000","288,000","302,000","263,000"],"answerIndex":0,"reasoning":"Compound the factors sequentially on 250,000: ×1.12 = 280,000; ×1.08 = 302,400; ×0.95 = 287,280, which rounds to 287,000. Distractor 288,000 comes from adding the percentages (12 + 8 − 5 = +15%) and applying once: 250,000 × 1.15 = 287,500 → 288,000 — the additive-instead-of-compound error landing one option away. Distractor 302,000 forgets the final year's 5% churn (250,000 × 1.12 × 1.08 = 302,400). Distractor 263,000 (≈ 250,000 × 1.12 × 1.08 × 0.95 mishandled, or netting +5% then a 12% drop) reflects applying one step's change in the wrong direction."},{"stem":"For each product in Saxon Foods' range, gross margin % = (revenue − direct cost) / revenue. Considering only the products whose gross margin exceeds 40%, what is the combined gross margin percentage of that group taken together (to the nearest 0.1 percentage point)?","topic":"Conditional / threshold-filtered margin","unit":"%","dataTitle":"Saxon Foods — revenue and direct cost by product (£000)","chartType":"table","tableHeaders":["Product","Revenue (£000)","Direct cost (£000)"],"tableRows":[["Nimbus","1240","706.8"],["Orbit","980","539.0"],["Pulse","1560","998.4"],["Quartz","720","381.6"],["Strata","1100","704.0"]],"options":["40.5%","44.7%","45.0%","43.0%"],"answerIndex":1,"reasoning":"First compute each margin: Nimbus (1240−706.8)/1240 = 43.0%, Orbit (980−539.0)/980 = 45.0%, Pulse (1560−998.4)/1560 = 36.0%, Quartz (720−381.6)/720 = 47.0%, Strata (1100−704.0)/1100 = 36.0%. Only Nimbus, Orbit and Quartz exceed 40%. Combine those three in aggregate: revenue = 1240+980+720 = 2,940; direct cost = 706.8+539.0+381.6 = 1,627.4; combined gross margin = (2,940 − 1,627.4)/2,940 = 1,312.6/2,940 = 44.65% → 44.7%. Distractor 45.0% is the simple average of the three selected margins (43+45+47)/3, which ignores their different revenue weights. Distractor 40.5% aggregates over all five products ((5,600 − 3,329.8)/5,600 = 40.5%), ignoring the >40% filter. Distractor 43.0% is a single product's margin (Nimbus), an adjacent-value pick."}]; /* @INJECT:numerical */
const VERBAL_DATA = [{"passageId":"p1","type":"tfc","topic":"Competition regulation / corporate strategy","passage":"In its provisional findings, the competition authority concluded that the proposed merger between Meridian Logistics and Calderon Freight would substantially lessen competition in the overnight parcel segment, where the combined entity would control an estimated 58 percent of national capacity. The authority noted that two smaller carriers had entered the segment in the preceding three years, but judged that neither possessed the depot network required to constrain the merged firm's pricing in the near term. Meridian's representatives argued that efficiency gains from consolidating sortation hubs would be passed to customers as lower tariffs; the authority acknowledged that such gains were plausible but said it had received no verifiable evidence that they would materialise at the scale claimed. The authority indicated that it would consider remedies, including the divestiture of selected depots, before issuing a final decision. It made no determination regarding the same-day courier segment, in which both firms also operate.","statement":"The competition authority found that the two smaller carriers that recently entered the overnight parcel segment would be unable to constrain the merged firm's pricing in the near term.","options":["True","False","Cannot Say"],"answerIndex":0,"reasoning":"The passage states the authority 'judged that neither possessed the depot network required to constrain the merged firm's pricing in the near term.' Lacking the depot network that is required to constrain pricing entails being unable to constrain it, and 'neither' covers both entrants, so the statement is entailed in full, including the 'near term' qualifier — TRUE. It is not Cannot Say because the authority's judgement on precisely this point is explicitly recorded; it is not False because nothing in the passage contradicts it."},{"passageId":"p1","type":"tfc","topic":"Competition regulation / corporate strategy","passage":"In its provisional findings, the competition authority concluded that the proposed merger between Meridian Logistics and Calderon Freight would substantially lessen competition in the overnight parcel segment, where the combined entity would control an estimated 58 percent of national capacity. The authority noted that two smaller carriers had entered the segment in the preceding three years, but judged that neither possessed the depot network required to constrain the merged firm's pricing in the near term. Meridian's representatives argued that efficiency gains from consolidating sortation hubs would be passed to customers as lower tariffs; the authority acknowledged that such gains were plausible but said it had received no verifiable evidence that they would materialise at the scale claimed. The authority indicated that it would consider remedies, including the divestiture of selected depots, before issuing a final decision. It made no determination regarding the same-day courier segment, in which both firms also operate.","statement":"The merger would give the combined entity a dominant position in the same-day courier segment.","options":["True","False","Cannot Say"],"answerIndex":2,"reasoning":"The final sentence states the authority 'made no determination regarding the same-day courier segment,' and the passage supplies no capacity figure or competitive assessment for that segment. Whether the entity would be dominant there is therefore undeterminable from the passage — CANNOT SAY. It is not True (the 58 percent figure is scoped explicitly to overnight parcels) and not False (the passage does not assert the entity would be non-dominant there; it is simply silent). This is the silence-versus-contradiction trap."},{"passageId":"p1","type":"tfc","topic":"Competition regulation / corporate strategy","passage":"In its provisional findings, the competition authority concluded that the proposed merger between Meridian Logistics and Calderon Freight would substantially lessen competition in the overnight parcel segment, where the combined entity would control an estimated 58 percent of national capacity. The authority noted that two smaller carriers had entered the segment in the preceding three years, but judged that neither possessed the depot network required to constrain the merged firm's pricing in the near term. Meridian's representatives argued that efficiency gains from consolidating sortation hubs would be passed to customers as lower tariffs; the authority acknowledged that such gains were plausible but said it had received no verifiable evidence that they would materialise at the scale claimed. The authority indicated that it would consider remedies, including the divestiture of selected depots, before issuing a final decision. It made no determination regarding the same-day courier segment, in which both firms also operate.","statement":"The authority concluded that consolidating Meridian's sortation hubs would produce no efficiency gains.","options":["True","False","Cannot Say"],"answerIndex":1,"reasoning":"The passage says the authority 'acknowledged that such gains were plausible' — it accepted the gains might exist, doubting only that they would materialise 'at the scale claimed.' A statement that the authority concluded there would be NO gains directly contradicts 'acknowledged that such gains were plausible,' so FALSE. The distractor conflates 'no verifiable evidence of the claimed scale' with 'concluded there are none'; the passage does the former, not the latter."},{"passageId":"p1","type":"tfc","topic":"Competition regulation / corporate strategy","passage":"In its provisional findings, the competition authority concluded that the proposed merger between Meridian Logistics and Calderon Freight would substantially lessen competition in the overnight parcel segment, where the combined entity would control an estimated 58 percent of national capacity. The authority noted that two smaller carriers had entered the segment in the preceding three years, but judged that neither possessed the depot network required to constrain the merged firm's pricing in the near term. Meridian's representatives argued that efficiency gains from consolidating sortation hubs would be passed to customers as lower tariffs; the authority acknowledged that such gains were plausible but said it had received no verifiable evidence that they would materialise at the scale claimed. The authority indicated that it would consider remedies, including the divestiture of selected depots, before issuing a final decision. It made no determination regarding the same-day courier segment, in which both firms also operate.","statement":"Divestiture of selected depots will be required as a condition of approving the merger.","options":["True","False","Cannot Say"],"answerIndex":2,"reasoning":"The passage says the authority 'indicated that it would consider remedies, including the divestiture of selected depots, before issuing a final decision.' Considering a remedy is not imposing it, and the passage states the final decision has not yet been made. Whether divestiture WILL be required is therefore undetermined — CANNOT SAY. Marking True over-reads 'consider' as 'will require' (modal drift); marking False is wrong because the passage does not rule divestiture out either."},{"passageId":"p1","type":"mcq","topic":"Critical reasoning — assumption","passage":"In its provisional findings, the competition authority concluded that the proposed merger between Meridian Logistics and Calderon Freight would substantially lessen competition in the overnight parcel segment, where the combined entity would control an estimated 58 percent of national capacity. The authority noted that two smaller carriers had entered the segment in the preceding three years, but judged that neither possessed the depot network required to constrain the merged firm's pricing in the near term. Meridian's representatives argued that efficiency gains from consolidating sortation hubs would be passed to customers as lower tariffs; the authority acknowledged that such gains were plausible but said it had received no verifiable evidence that they would materialise at the scale claimed. The authority indicated that it would consider remedies, including the divestiture of selected depots, before issuing a final decision. It made no determination regarding the same-day courier segment, in which both firms also operate.","statement":"Which of the following is an assumption REQUIRED by Meridian's argument that the merger would benefit customers?","options":["The two smaller carriers will exit the overnight parcel segment within three years.","Consolidating the sortation hubs would not raise the merged firm's costs by more than the efficiency savings it generates.","The authority will decline to impose any divestiture remedy.","Same-day courier customers would also receive lower tariffs after the merger.","Calderon Freight currently charges higher tariffs than Meridian."],"answerIndex":1,"reasoning":"Meridian's argument is that efficiency gains from consolidation will be passed on as LOWER tariffs. For there to be net savings to pass on, consolidation must not cost more than it saves — option 2 is a necessary suppressed premise. Apply the negation test: if consolidation costs exceed the savings, there is no net gain to pass through and the conclusion collapses, so the assumption is required. Option 1 concerns rivals, not pass-through. Option 3 is about the authority's remedy, irrelevant to whether customers benefit from the gains. Option 4 extends to a segment the argument never addresses. Option 5 (relative tariffs) is neither stated nor needed for the pass-through logic."},{"passageId":"p2","type":"tfc","topic":"Macroeconomics / monetary policy","passage":"The central bank's quarterly bulletin reported that headline inflation had fallen to 3.1 percent, down from 4.4 percent in the previous quarter, while core inflation, which excludes energy and food prices, remained elevated at 4.0 percent. The bulletin attributed the decline in the headline figure primarily to a sharp fall in wholesale gas prices rather than to any broad easing of domestic demand. The Monetary Policy Committee voted by a margin of six to three to hold the policy rate at its current level, with the dissenting members favouring a further increase on the grounds that wage growth, at 5.6 percent, continued to outpace productivity gains. The bulletin cautioned that the disinflationary effect of energy prices was likely to prove temporary and that services inflation, a closer proxy for underlying price pressure, had not yet shown a sustained downward trend. It offered no forecast for the policy rate beyond the current quarter.","statement":"Core inflation, which excludes energy and food prices, was higher than headline inflation in the quarter reported.","options":["True","False","Cannot Say"],"answerIndex":0,"reasoning":"For the reported quarter the passage gives headline inflation as 3.1 percent and core inflation as 4.0 percent. 4.0 > 3.1, so the statement follows directly — TRUE. The base must be tracked carefully (the 4.4 percent figure is the prior quarter's headline, not a comparator here); no extra assumption is needed, so it is not Cannot Say, and the figures do not contradict the claim, so it is not False."},{"passageId":"p2","type":"tfc","topic":"Macroeconomics / monetary policy","passage":"The central bank's quarterly bulletin reported that headline inflation had fallen to 3.1 percent, down from 4.4 percent in the previous quarter, while core inflation, which excludes energy and food prices, remained elevated at 4.0 percent. The bulletin attributed the decline in the headline figure primarily to a sharp fall in wholesale gas prices rather than to any broad easing of domestic demand. The Monetary Policy Committee voted by a margin of six to three to hold the policy rate at its current level, with the dissenting members favouring a further increase on the grounds that wage growth, at 5.6 percent, continued to outpace productivity gains. The bulletin cautioned that the disinflationary effect of energy prices was likely to prove temporary and that services inflation, a closer proxy for underlying price pressure, had not yet shown a sustained downward trend. It offered no forecast for the policy rate beyond the current quarter.","statement":"The bulletin attributed the decline in headline inflation primarily to the fall in wholesale gas prices.","options":["True","False","Cannot Say"],"answerIndex":0,"reasoning":"The passage states verbatim that the bulletin 'attributed the decline in the headline figure primarily to a sharp fall in wholesale gas prices rather than to any broad easing of domestic demand,' and the statement restates that attribution — TRUE. The statement is deliberately scoped to what the bulletin attributed (a reported claim) rather than to free-standing causal fact, so the passage establishes it directly: it is not Cannot Say, and nothing contradicts it, so it is not False."},{"passageId":"p2","type":"tfc","topic":"Macroeconomics / monetary policy","passage":"The central bank's quarterly bulletin reported that headline inflation had fallen to 3.1 percent, down from 4.4 percent in the previous quarter, while core inflation, which excludes energy and food prices, remained elevated at 4.0 percent. The bulletin attributed the decline in the headline figure primarily to a sharp fall in wholesale gas prices rather than to any broad easing of domestic demand. The Monetary Policy Committee voted by a margin of six to three to hold the policy rate at its current level, with the dissenting members favouring a further increase on the grounds that wage growth, at 5.6 percent, continued to outpace productivity gains. The bulletin cautioned that the disinflationary effect of energy prices was likely to prove temporary and that services inflation, a closer proxy for underlying price pressure, had not yet shown a sustained downward trend. It offered no forecast for the policy rate beyond the current quarter.","statement":"The Monetary Policy Committee will raise the policy rate at its next meeting.","options":["True","False","Cannot Say"],"answerIndex":2,"reasoning":"The Committee voted six to three to HOLD the rate this quarter, and the passage states it 'offered no forecast for the policy rate beyond the current quarter.' What it will do at the next meeting is therefore undetermined — CANNOT SAY. Marking True imports the three dissenters' preference as a future outcome though the minority did not carry the vote; marking False wrongly treats 'no forecast' as a commitment not to raise. The explicit refusal to forecast is the load-bearing clause."},{"passageId":"p3","type":"tfc","topic":"Corporate strategy / climate-risk modelling","passage":"A consultancy's report on physical climate risk to industrial assets modelled flood exposure for 1,200 manufacturing sites operated by its client across four regions. Using a high-emissions scenario, the model projected that the proportion of sites facing a one-in-twenty-year flood event would rise from 14 percent today to 31 percent by 2050. The report stressed that the model captured only riverine and coastal flooding and excluded surface-water flooding from intense rainfall, which it described as a material but poorly quantified additional hazard. It recommended that the client prioritise adaptation spending at the 96 sites already classified as high-exposure, noting that retrofitting flood defences at these sites would cost less than the expected value of the losses they would otherwise incur. The report did not assess the cost-effectiveness of adaptation at sites in the lower exposure bands, and it assumed, for tractability, that the client's asset footprint would remain unchanged through 2050.","statement":"Under the high-emissions scenario, the model projected that the number of the client's sites exposed to a one-in-twenty-year flood event would more than double between today and 2050.","options":["True","False","Cannot Say"],"answerIndex":0,"reasoning":"The footprint is held constant at 1,200 sites through 2050 (stated as the report's tractability assumption), and the exposed proportion rises from 14 percent to 31 percent. Against a fixed base the count scales with the proportion, and 31/14 = 2.21x — equivalently 168 sites today versus 372 by 2050 — which exceeds doubling, so TRUE. The constant-footprint assumption is what licenses converting a proportion change into a count change; without it the count claim would be Cannot Say, which is the discriminator being tested. Nothing contradicts the claim, so it is not False."},{"passageId":"p3","type":"mcq","topic":"Critical reasoning — weaken","passage":"A consultancy's report on physical climate risk to industrial assets modelled flood exposure for 1,200 manufacturing sites operated by its client across four regions. Using a high-emissions scenario, the model projected that the proportion of sites facing a one-in-twenty-year flood event would rise from 14 percent today to 31 percent by 2050. The report stressed that the model captured only riverine and coastal flooding and excluded surface-water flooding from intense rainfall, which it described as a material but poorly quantified additional hazard. It recommended that the client prioritise adaptation spending at the 96 sites already classified as high-exposure, noting that retrofitting flood defences at these sites would cost less than the expected value of the losses they would otherwise incur. The report did not assess the cost-effectiveness of adaptation at sites in the lower exposure bands, and it assumed, for tractability, that the client's asset footprint would remain unchanged through 2050.","statement":"The report concludes that the client should concentrate adaptation spending on the 96 currently high-exposure sites. Which of the following, if true, would MOST weaken the case for that recommendation as a strategy for minimising the client's total expected flood losses?","options":["Retrofitting the 96 high-exposure sites would take several years to complete.","The majority of the client's expected flood losses arise at lower-exposure sites because surface-water flooding, which the model omitted, is concentrated there.","Some of the 96 high-exposure sites are located in only two of the four regions studied.","The high-emissions scenario is more severe than the scenario the client considers most likely.","Flood-defence retrofitting costs have risen since the report was published.","A competitor adopted a similar site-prioritisation approach."],"answerIndex":1,"reasoning":"The recommendation aims to reduce TOTAL expected flood losses by spending on the 96 modelled high-exposure sites. Option 2 attacks the foundation: if most expected losses actually sit at lower-exposure sites via the surface-water hazard the model explicitly excluded, then concentrating spend on the 96 misallocates resources against the stated objective — the strongest weakener, exploiting the passage's own acknowledged limitation. Option 1 (timing) does not show the 96 are the wrong targets. Option 3 (geographic spread) is irrelevant to loss minimisation. Option 4 makes the scenario conservative but leaves the 96 as valid priorities. Option 5 raises cost levels but not the relative prioritisation between bands. Option 6 (competitor behaviour) is irrelevant to whether the strategy minimises this client's losses."},{"passage":"The fabrication of leading-edge logic semiconductors—those at process nodes of five nanometres and below—remains overwhelmingly concentrated in a small number of foundries located in East Asia. Constructing a single advanced fabrication plant now requires capital outlays exceeding twenty billion dollars and a lead time of three to four years before commercial output begins. To diversify supply, several governments have introduced subsidy programmes that defray a portion of construction costs for plants built within their borders. Industry analysts caution, however, that capital alone does not guarantee competitive production. A newly commissioned plant typically suffers low manufacturing yields—the proportion of usable chips per silicon wafer—during its initial ramp, and reaching the yields achieved by an established facility can take many quarters of iterative process tuning. Moreover, the specialised lithography equipment essential to the most advanced nodes is supplied by a single firm, whose annual output is finite. Consequently, even a fully funded plant may be constrained by its place in the equipment-delivery queue. The subsidy programmes have unquestionably accelerated announcements of new capacity, but whether they will materially reduce geographic concentration at the leading edge depends on factors that public funding does not directly address.","passageId":"p4","type":"tfc","statement":"The government subsidy programmes fully cover the construction costs of the new fabrication plants they support.","options":["True","False","Cannot Say"],"answerIndex":1,"reasoning":"The passage says the programmes 'defray a portion of construction costs,' which directly contradicts the claim that they 'fully cover' those costs. Because the statement conflicts with an explicit assertion in the text, it is False rather than Cannot Say; 'a portion' necessarily excludes 'fully.'","topic":"semiconductors"},{"passage":"The fabrication of leading-edge logic semiconductors—those at process nodes of five nanometres and below—remains overwhelmingly concentrated in a small number of foundries located in East Asia. Constructing a single advanced fabrication plant now requires capital outlays exceeding twenty billion dollars and a lead time of three to four years before commercial output begins. To diversify supply, several governments have introduced subsidy programmes that defray a portion of construction costs for plants built within their borders. Industry analysts caution, however, that capital alone does not guarantee competitive production. A newly commissioned plant typically suffers low manufacturing yields—the proportion of usable chips per silicon wafer—during its initial ramp, and reaching the yields achieved by an established facility can take many quarters of iterative process tuning. Moreover, the specialised lithography equipment essential to the most advanced nodes is supplied by a single firm, whose annual output is finite. Consequently, even a fully funded plant may be constrained by its place in the equipment-delivery queue. The subsidy programmes have unquestionably accelerated announcements of new capacity, but whether they will materially reduce geographic concentration at the leading edge depends on factors that public funding does not directly address.","passageId":"p4","type":"tfc","statement":"The single firm that supplies the specialised lithography equipment is located in East Asia.","options":["True","False","Cannot Say"],"answerIndex":2,"reasoning":"The passage states that the most advanced foundries are concentrated in East Asia and that the lithography equipment comes from a single firm, but it never states where that supplier is located. The geographic location of the equipment firm is not given, so the passage provides insufficient information—Cannot Say. It is not True (no location stated) and not False (nothing contradicts an East Asian location either); the real-world fact that this supplier is European is a deliberate trap, since the answer must rest on the passage alone.","topic":"semiconductors"},{"passage":"The fabrication of leading-edge logic semiconductors—those at process nodes of five nanometres and below—remains overwhelmingly concentrated in a small number of foundries located in East Asia. Constructing a single advanced fabrication plant now requires capital outlays exceeding twenty billion dollars and a lead time of three to four years before commercial output begins. To diversify supply, several governments have introduced subsidy programmes that defray a portion of construction costs for plants built within their borders. Industry analysts caution, however, that capital alone does not guarantee competitive production. A newly commissioned plant typically suffers low manufacturing yields—the proportion of usable chips per silicon wafer—during its initial ramp, and reaching the yields achieved by an established facility can take many quarters of iterative process tuning. Moreover, the specialised lithography equipment essential to the most advanced nodes is supplied by a single firm, whose annual output is finite. Consequently, even a fully funded plant may be constrained by its place in the equipment-delivery queue. The subsidy programmes have unquestionably accelerated announcements of new capacity, but whether they will materially reduce geographic concentration at the leading edge depends on factors that public funding does not directly address.","passageId":"p4","type":"mcq","statement":"Which of the following is an assumption required by the analysts' caution that 'capital alone does not guarantee competitive production'?","options":["Subsidy programmes will eventually be discontinued by governments.","Factors other than available funding, such as yield ramps and equipment access, materially affect whether a plant becomes competitive.","Leading-edge nodes will remain at five nanometres for the foreseeable future.","East Asian foundries receive no government support of any kind.","Demand for leading-edge chips will continue to grow indefinitely."],"answerIndex":1,"reasoning":"The caution that money alone is insufficient only makes sense if something besides money determines competitiveness; the passage supplies exactly these factors (yield ramps that 'can take many quarters' and a constrained 'equipment-delivery queue'). Option B states that required assumption. The other options introduce claims (discontinuation of subsidies, frozen node sizes, no East Asian support, indefinite demand growth) that the argument neither requires nor mentions.","topic":"semiconductors"},{"passage":"A gene drive is a genetic engineering technique that biases inheritance so that a chosen DNA sequence is passed to nearly all of an organism's offspring, rather than to the roughly half predicted by ordinary Mendelian inheritance. Using CRISPR-based constructs, researchers have built drives in laboratory populations of the Anopheles mosquito, the principal vector of malaria, that spread a gene impairing female fertility. In contained cage trials, such drives have driven the engineered sequence to high frequency within several generations and, in some experiments, caused the population to collapse. Proponents argue that a self-propagating drive could suppress vector populations across a region without the recurrent application of insecticides. Critics raise two distinct concerns. First, because a drive is designed to spread autonomously, an accidental release could affect wild populations beyond any intended boundary, and once established a drive may be difficult to recall. Second, suppressing a vector species could have ecological consequences that cage trials cannot fully reveal. In response, some laboratories have developed 'reversal drives' intended to overwrite an earlier construct and restore the original sequence. Several scientific bodies have called for a moratorium on any open release until containment and reversibility have been more thoroughly demonstrated. No open-field release of a mosquito gene drive has yet been authorised.","passageId":"p5","type":"tfc","statement":"A gene drive causes a chosen DNA sequence to be inherited by a substantially greater proportion of offspring than ordinary Mendelian inheritance would predict.","options":["True","False","Cannot Say"],"answerIndex":0,"reasoning":"The opening sentence defines a gene drive as biasing inheritance 'so that a chosen DNA sequence is passed to nearly all of an organism's offspring, rather than to the roughly half predicted by ordinary Mendelian inheritance.' 'Nearly all' versus 'roughly half' is substantially greater, so the statement follows necessarily and is True. It is not False (it restates the definition) and not Cannot Say (the comparison is explicit).","topic":"biotechnology"},{"passage":"A gene drive is a genetic engineering technique that biases inheritance so that a chosen DNA sequence is passed to nearly all of an organism's offspring, rather than to the roughly half predicted by ordinary Mendelian inheritance. Using CRISPR-based constructs, researchers have built drives in laboratory populations of the Anopheles mosquito, the principal vector of malaria, that spread a gene impairing female fertility. In contained cage trials, such drives have driven the engineered sequence to high frequency within several generations and, in some experiments, caused the population to collapse. Proponents argue that a self-propagating drive could suppress vector populations across a region without the recurrent application of insecticides. Critics raise two distinct concerns. First, because a drive is designed to spread autonomously, an accidental release could affect wild populations beyond any intended boundary, and once established a drive may be difficult to recall. Second, suppressing a vector species could have ecological consequences that cage trials cannot fully reveal. In response, some laboratories have developed 'reversal drives' intended to overwrite an earlier construct and restore the original sequence. Several scientific bodies have called for a moratorium on any open release until containment and reversibility have been more thoroughly demonstrated. No open-field release of a mosquito gene drive has yet been authorised.","passageId":"p5","type":"tfc","statement":"Deploying a gene drive in wild mosquito populations would eradicate malaria as a human disease.","options":["True","False","Cannot Say"],"answerIndex":2,"reasoning":"The passage says drives could 'suppress vector populations' and impair fertility, and that cage trials sometimes caused population collapse, but it never claims that deploying a drive in the wild would eradicate the disease malaria in humans—indeed no open release has been authorised. Disease eradication is a stronger, separate outcome the passage does not establish, so Cannot Say. It is not True (never asserted) and not False (the passage does not deny it either); the plausibility of the claim in popular discussion is the trap.","topic":"biotechnology"},{"passage":"A gene drive is a genetic engineering technique that biases inheritance so that a chosen DNA sequence is passed to nearly all of an organism's offspring, rather than to the roughly half predicted by ordinary Mendelian inheritance. Using CRISPR-based constructs, researchers have built drives in laboratory populations of the Anopheles mosquito, the principal vector of malaria, that spread a gene impairing female fertility. In contained cage trials, such drives have driven the engineered sequence to high frequency within several generations and, in some experiments, caused the population to collapse. Proponents argue that a self-propagating drive could suppress vector populations across a region without the recurrent application of insecticides. Critics raise two distinct concerns. First, because a drive is designed to spread autonomously, an accidental release could affect wild populations beyond any intended boundary, and once established a drive may be difficult to recall. Second, suppressing a vector species could have ecological consequences that cage trials cannot fully reveal. In response, some laboratories have developed 'reversal drives' intended to overwrite an earlier construct and restore the original sequence. Several scientific bodies have called for a moratorium on any open release until containment and reversibility have been more thoroughly demonstrated. No open-field release of a mosquito gene drive has yet been authorised.","passageId":"p5","type":"tfc","statement":"Every gene drive built by researchers to date has caused the laboratory mosquito population to collapse.","options":["True","False","Cannot Say"],"answerIndex":1,"reasoning":"The passage states that population collapse occurred 'in some experiments,' which entails that not all experiments produced collapse; the universal claim 'every... has caused' therefore contradicts the text and is False. It is not Cannot Say because the qualifier 'in some experiments' provides definite information that refutes the universal statement; it is not True for the same reason.","topic":"biotechnology"},{"passage":"A gene drive is a genetic engineering technique that biases inheritance so that a chosen DNA sequence is passed to nearly all of an organism's offspring, rather than to the roughly half predicted by ordinary Mendelian inheritance. Using CRISPR-based constructs, researchers have built drives in laboratory populations of the Anopheles mosquito, the principal vector of malaria, that spread a gene impairing female fertility. In contained cage trials, such drives have driven the engineered sequence to high frequency within several generations and, in some experiments, caused the population to collapse. Proponents argue that a self-propagating drive could suppress vector populations across a region without the recurrent application of insecticides. Critics raise two distinct concerns. First, because a drive is designed to spread autonomously, an accidental release could affect wild populations beyond any intended boundary, and once established a drive may be difficult to recall. Second, suppressing a vector species could have ecological consequences that cage trials cannot fully reveal. In response, some laboratories have developed 'reversal drives' intended to overwrite an earlier construct and restore the original sequence. Several scientific bodies have called for a moratorium on any open release until containment and reversibility have been more thoroughly demonstrated. No open-field release of a mosquito gene drive has yet been authorised.","passageId":"p5","type":"mcq","statement":"Which option, if true, would most strengthen the proponents' case for deploying a self-propagating gene drive?","options":["Insecticide-based vector control is expensive to administer repeatedly.","Field studies confirm that reversal drives reliably and completely undo an established drive and restore the original population.","The Anopheles mosquito is the principal vector of malaria.","CRISPR constructs are increasingly inexpensive to design in the laboratory.","Some cage trials did not result in population collapse."],"answerIndex":1,"reasoning":"The critics' strongest objection is that a drive may spread beyond intended boundaries and 'may be difficult to recall.' Evidence that reversal drives reliably and completely undo an established drive directly neutralises that objection and thus most strengthens the case for deployment (option B). Option A and D add minor cost considerations, option C merely restates a passage fact, and option E actually undercuts the proponents. Only B addresses the central recallability concern.","topic":"biotechnology"},{"passage":"Small modular reactors, or SMRs, are nuclear fission plants with a generating capacity typically below three hundred megawatts, designed to be assembled largely from factory-built components rather than constructed entirely on site. Advocates contend that standardised, factory production could reduce the cost overruns and schedule delays that have long afflicted large conventional reactors, and that an SMR's smaller output makes it suitable for grids or industrial sites that cannot absorb a gigawatt-scale unit. Several designs incorporate passive safety systems that rely on natural circulation to remove residual heat without external power or operator intervention. Critics note that, because few SMRs have been built and operated commercially, claims about their delivered cost per unit of electricity remain largely projections rather than demonstrated results, and that smaller reactors forgo some of the economies of scale enjoyed by larger plants. SMRs still produce radioactive waste, though proponents argue that certain designs generate less per unit of energy and that the waste can be managed with existing approaches. Regulatory frameworks in many jurisdictions were written for large light-water reactors, and adapting licensing procedures to novel SMR designs has in several cases proved slower than developers anticipated. No consensus yet exists on whether SMRs will achieve the cost reductions their advocates project.","passageId":"p6","type":"tfc","statement":"Small modular reactors produce no radioactive waste.","options":["True","False","Cannot Say"],"answerIndex":1,"reasoning":"The passage states explicitly that 'SMRs still produce radioactive waste,' which directly contradicts the claim that they produce none. This is a flat contradiction of the text, so the statement is False, not Cannot Say; the passage settles the question definitively (it only adds that some designs may produce less per unit, not zero).","topic":"energy"},{"passage":"Small modular reactors, or SMRs, are nuclear fission plants with a generating capacity typically below three hundred megawatts, designed to be assembled largely from factory-built components rather than constructed entirely on site. Advocates contend that standardised, factory production could reduce the cost overruns and schedule delays that have long afflicted large conventional reactors, and that an SMR's smaller output makes it suitable for grids or industrial sites that cannot absorb a gigawatt-scale unit. Several designs incorporate passive safety systems that rely on natural circulation to remove residual heat without external power or operator intervention. Critics note that, because few SMRs have been built and operated commercially, claims about their delivered cost per unit of electricity remain largely projections rather than demonstrated results, and that smaller reactors forgo some of the economies of scale enjoyed by larger plants. SMRs still produce radioactive waste, though proponents argue that certain designs generate less per unit of energy and that the waste can be managed with existing approaches. Regulatory frameworks in many jurisdictions were written for large light-water reactors, and adapting licensing procedures to novel SMR designs has in several cases proved slower than developers anticipated. No consensus yet exists on whether SMRs will achieve the cost reductions their advocates project.","passageId":"p6","type":"tfc","statement":"It has been commercially demonstrated that electricity from SMRs costs less per unit than electricity from large conventional reactors.","options":["True","False","Cannot Say"],"answerIndex":1,"reasoning":"The passage states that 'because few SMRs have been built and operated commercially, claims about their delivered cost per unit of electricity remain largely projections rather than demonstrated results,' and that no consensus exists on whether the projected cost reductions will be achieved. Asserting that lower cost has been 'commercially demonstrated' directly contradicts the statement that such claims are projections, not demonstrated results, so it is False. It is not Cannot Say because the passage expressly characterises the cost claims as undemonstrated, which refutes the statement rather than merely leaving it open.","topic":"energy"},{"passage":"Small modular reactors, or SMRs, are nuclear fission plants with a generating capacity typically below three hundred megawatts, designed to be assembled largely from factory-built components rather than constructed entirely on site. Advocates contend that standardised, factory production could reduce the cost overruns and schedule delays that have long afflicted large conventional reactors, and that an SMR's smaller output makes it suitable for grids or industrial sites that cannot absorb a gigawatt-scale unit. Several designs incorporate passive safety systems that rely on natural circulation to remove residual heat without external power or operator intervention. Critics note that, because few SMRs have been built and operated commercially, claims about their delivered cost per unit of electricity remain largely projections rather than demonstrated results, and that smaller reactors forgo some of the economies of scale enjoyed by larger plants. SMRs still produce radioactive waste, though proponents argue that certain designs generate less per unit of energy and that the waste can be managed with existing approaches. Regulatory frameworks in many jurisdictions were written for large light-water reactors, and adapting licensing procedures to novel SMR designs has in several cases proved slower than developers anticipated. No consensus yet exists on whether SMRs will achieve the cost reductions their advocates project.","passageId":"p6","type":"tfc","statement":"In some jurisdictions, adapting existing licensing procedures to novel SMR designs has taken longer than developers expected.","options":["True","False","Cannot Say"],"answerIndex":0,"reasoning":"The passage states that regulatory frameworks were written for large light-water reactors and that 'adapting licensing procedures to novel SMR designs has in several cases proved slower than developers anticipated.' 'In several cases' supports 'in some jurisdictions,' and 'slower than anticipated' supports 'taken longer than developers expected,' so the statement follows necessarily and is True. It is not False (it restates the text) and not Cannot Say (the information is explicitly provided).","topic":"energy"}]; /* @INJECT:verbal */
const DEDUCTIVE_DATA = [{"type":"syllogism","topic":"Categorical syllogism with mixed quantifiers; illicit converse and existential traps","stem":"Which one of the following conclusions MUST be true given both premises?","context":"In a professional-services firm, the following two statements are known to be true:\nPremise 1: All certified auditors are licensed practitioners.\nPremise 2: Some licensed practitioners are not bonded.","options":["Some certified auditors are not bonded.","All licensed practitioners are certified auditors.","Some bonded staff are licensed practitioners.","No valid conclusion linking certified auditors to bonding can be drawn from these premises.","No bonded staff are certified auditors."],"answerIndex":3,"reasoning":"Premise 1 gives Auditors ⊆ Licensed. Premise 2 guarantees at least one licensed practitioner who is not bonded, but says nothing about WHICH licensed practitioners those are. The middle term (Licensed) is undistributed in Premise 1 — Auditors are only a subset of Licensed, not the whole of it — so nothing transfers from the 'not bonded' licensed people to the auditors.\n\nRefuting (A) 'Some certified auditors are not bonded': the unbonded licensed people could all be non-auditors. Counter-model: auditor a1 is licensed and bonded; a separate licensed person l1 is not an auditor and not bonded (satisfies P2). Here every auditor is bonded, so (A) is false — hence not entailed. This is the classic trap of illicitly distributing the middle term.\n\nRefuting (B) 'All licensed practitioners are certified auditors': this is the illicit converse of Premise 1. In the model above, l1 is licensed but not an auditor, so (B) is false.\n\nRefuting (C) 'Some bonded staff are licensed practitioners': the premises never assert any bonded person exists. Counter-model: auditor a1 is licensed but NOT bonded; l1 is licensed and not bonded; nobody is bonded. P1 (Auditors ⊆ Licensed) and P2 (l1 is licensed and unbonded) both hold, yet there are no bonded staff, so (C) is false — not entailed.\n\nRefuting (E) 'No bonded staff are certified auditors': the first model has a bonded auditor (a1), so (E) is false.\n\nSince every candidate linking auditors to bonding can be made false while the premises stay true, the only certain statement is (D): no valid conclusion about auditors and bonding follows. Exactly one option survives."},{"type":"conditional","topic":"If-then chain plus contrapositive (modus tollens through two links)","stem":"Which conclusion is logically guaranteed?","context":"A procurement workflow obeys these rules:\nRule 1: If a vendor is onboarded, then the contract has been countersigned.\nRule 2: If the contract has been countersigned, then a budget code has been issued.\nFact: For vendor Helix, no budget code has been issued.","options":["Helix has been onboarded.","Helix's contract has been countersigned.","If a budget code is issued for Helix, then Helix has been onboarded.","Helix has not been onboarded.","Helix's contract has not been countersigned, but Helix may still have been onboarded."],"answerIndex":3,"reasoning":"Let V = onboarded, C = countersigned, B = budget code issued. Rule 1: V → C. Rule 2: C → B. Fact: ¬B.\n\nApply modus tollens to Rule 2: from C → B and ¬B infer ¬C — the contract was NOT countersigned. Apply modus tollens to Rule 1: from V → C and ¬C infer ¬V — the vendor was NOT onboarded. Therefore (D) is forced. An exhaustive truth-table check confirms every world satisfying V→C, C→B and ¬B has both V false and C false.\n\nRefuting (A): it asserts onboarding, the opposite of what the chain forces.\nRefuting (B): ¬B forces ¬C by contrapositive, so the contract was NOT countersigned.\nRefuting (C): this reverses the chain (B → V), an illicit converse; the rules only run V → C → B, never backward, so the converse is not entailed.\nRefuting (E): it correctly derives ¬C but then claims onboarding is still open. In fact ¬C chains forward via Rule 1's contrapositive to ¬V, so onboarding is definitively ruled out, not left undetermined. Exactly one option (D) is forced."},{"type":"conditional","topic":"Necessary vs sufficient conditions (separating the two directions)","stem":"Operations confirms that the demand forecast WAS submitted for Project Atlas, but does not say whether the project was approved. What, if anything, can be concluded with certainty?","context":"Two governance rules apply to every project:\nRule A: A budget review is necessary for project approval.\nRule B: Submitting the demand forecast is sufficient for a budget review to take place.","options":["Project Atlas has been approved.","A budget review has taken place for Project Atlas.","Project Atlas has not been approved.","A budget review has taken place, and therefore Project Atlas has been approved.","Nothing can be concluded; the forecast tells us nothing about the review."],"answerIndex":1,"reasoning":"Translate each rule precisely. Rule A 'a budget review is necessary for approval' means Approval → Review (the review is a necessary condition; no review ⇒ no approval). Rule B 'submitting the forecast is sufficient for a review' means Forecast → Review.\n\nGiven: Forecast is true. By Rule B (Forecast → Review, modus ponens), a budget review HAS taken place. So (B) is guaranteed.\n\nWhat about approval? Rule A only gives Approval → Review, i.e. the review is necessary, not sufficient, for approval. Knowing the review happened does NOT let us infer approval — that would be affirming the consequent of Rule A. A truth-table over {Approval, Review, Forecast} constrained by Approval→Review and Forecast→Review, with Forecast = true, contains both a world where Approval is true (Review true) and a world where Approval is false (Review true) — so approval is undetermined.\n\nRefuting (A): asserts approval, not forced (affirming the consequent of Rule A).\nRefuting (C): asserts non-approval, equally undetermined — approval can be either value.\nRefuting (D): correctly derives the review but then leaps to approval, treating the necessary condition as if it were sufficient — the central trap.\nRefuting (E): false because the forecast IS sufficient for the review (Rule B), a firm conclusion. Only (B) is both forced and not overreaching."},{"type":"dataSufficiency","topic":"Sufficiency of single statements against a directional conditional","stem":"Question: Was the proposal approved? Using the rule above, evaluate the two statements and select the correct sufficiency verdict.","context":"A committee approves a proposal ONLY IF both the Chair and the Treasurer vote in favour. You must decide whether the proposal was approved.\nStatement (1): The Treasurer voted in favour.\nStatement (2): The Chair voted against.","options":["Statement (1) ALONE is sufficient, but statement (2) alone is not.","Statement (2) ALONE is sufficient, but statement (1) alone is not.","Each statement ALONE is sufficient.","BOTH statements TOGETHER are sufficient, but neither alone is.","Both statements together are still NOT sufficient."],"answerIndex":1,"reasoning":"'Approves only if both Chair and Treasurer vote in favour' yields Approve → (Chair ∧ Treasurer). Equivalently, by contrapositive, ¬(Chair ∧ Treasurer) → ¬Approve.\n\nStatement (2): Chair voted against ⇒ ¬Chair ⇒ ¬(Chair ∧ Treasurer) ⇒ by contrapositive ¬Approve. So (2) ALONE settles the question: the proposal was NOT approved. Sufficient (it yields a definite answer — 'no' — to 'was it approved?').\n\nStatement (1): Treasurer in favour, Chair unknown. Enumerating valid worlds under Approve → (Chair ∧ Treasurer) with Treasurer = yes gives both an approved world (Chair yes, Approve yes) and unapproved worlds (Chair no, Approve no). Approval is undetermined. NOT sufficient.\n\nTherefore statement (2) alone is sufficient while (1) alone is not — answer (B).\n\nRefuting (A): reverses which statement works; (1) leaves the Chair open and so cannot decide approval.\nRefuting (C): (1) is not sufficient, so 'each alone' fails.\nRefuting (D): (2) already suffices alone, so 'neither alone' is false.\nRefuting (E): (2) makes the pair (and (2) by itself) sufficient, so 'still not sufficient' is false. Note the rule is only a one-directional conditional, so 'both vote yes' would NOT by itself prove approval — but neither statement asserts that, so it does not affect the verdict."},{"type":"arrangement","topic":"Linear arrangement under adjacency, anchor and ordering constraints","stem":"Reading left to right, which manager occupies office 3 (the middle office)?","context":"Five managers — Adler, Brandt, Cho, Diaz and Eriksen — occupy a single row of five offices numbered 1 to 5 from left to right, one manager per office. The following all hold:\n• Diaz is in office 4.\n• Adler is in office 1.\n• Brandt sits immediately to the right of Eriksen.\n• Eriksen sits somewhere to the left of Cho.","options":["Adler","Brandt","Cho","Diaz","Eriksen"],"answerIndex":1,"reasoning":"Place the absolutes first: Adler = office 1, Diaz = office 4. The remaining managers Brandt, Cho, Eriksen fill offices 2, 3, 5.\n\n'Brandt immediately to the right of Eriksen' means Brandt = Eriksen + 1, i.e. they occupy consecutive offices. Within the open offices {2, 3, 5}, the only consecutive pair available is (2, 3) — office 5 cannot pair, since the office to its left (4) is taken by Diaz and there is no office 6. So Eriksen = 2 and Brandt = 3. That leaves Cho = office 5.\n\nCheck 'Eriksen left of Cho': Eriksen = 2 < Cho = 5. Satisfied.\n\nFull layout: 1 Adler, 2 Eriksen, 3 Brandt, 4 Diaz, 5 Cho. An exhaustive permutation search confirms this is the UNIQUE arrangement satisfying all four constraints. Office 3 is therefore Brandt — answer (B).\n\nThe distractors correspond to misreadings: swapping the Brandt/Eriksen order (E), forgetting Cho must be right of Eriksen and sliding Cho to the middle (C), or ignoring the fixed anchors (A, D)."},{"type":"logicalPuzzle","topic":"Conditional selection constraints; finding the forced exclusion","stem":"Exactly three of the six candidates will form the team. Which candidate can NEVER be on a valid team?","context":"A project team of exactly three people must be chosen from six candidates: P, Q, R, S, T and U. All of the following selection rules must hold:\n• If P is selected, then Q is not selected.\n• R is selected only if S is selected.\n• At least one of T and U is selected.\n• Q and S cannot both be selected.\n• If U is selected, then P is selected.","options":["P","Q","R","S","U"],"answerIndex":1,"reasoning":"Test whether Q can be on any valid team. Suppose Q is selected. Rule 'Q and S cannot both be selected' forces ¬S. Rule 'R only if S' (R → S) with ¬S forces ¬R. Rule 'if P then ¬Q' has contrapositive Q → ¬P, which forces ¬P. Rule 'if U then P' (U → P) with ¬P forces ¬U. So with Q in, we have excluded S, R, P and U — the only remaining candidates are Q and T, just two people. A team needs three, so a valid team containing Q cannot be completed. Hence Q can NEVER be selected.\n\nExhaustive enumeration of all C(6,3) = 20 triples confirms exactly four valid teams exist — {P,S,T}, {P,S,U}, {P,T,U}, {R,S,T} — and Q appears in none of them, while P, S and T each appear in three and U in two.\n\nRefuting (A) P, (C) R, (D) S, (E) U: each is present in at least one valid team listed above, so none of them is impossible. Only Q is forced out of every team."},{"type":"sequence","topic":"Relative ranking from ordering and fixed-gap clues","stem":"In the final performance ranking (1 = highest), who is ranked 3rd?","context":"Five sales managers — Tan, Udeh, Vega, Walsh and Xiu — are placed in a strict performance ranking from 1st (highest) to 5th (lowest), no ties. The following are known:\n• Tan is ranked higher than Udeh.\n• Vega is ranked exactly two places below Walsh (e.g. if Walsh is 1st, Vega is 3rd).\n• Xiu is ranked 1st.\n• Udeh is ranked 5th.","options":["Tan","Udeh","Vega","Walsh","Xiu"],"answerIndex":0,"reasoning":"Fix the anchors: Xiu = rank 1, Udeh = rank 5. The remaining ranks 2, 3, 4 go to Tan, Vega and Walsh in some order.\n\nApply 'Vega is exactly two places below Walsh' (rank(Vega) = rank(Walsh) + 2). Within the open ranks {2, 3, 4}, the only pair with a gap of two is Walsh = 2 and Vega = 4. (Walsh = 3 would need Vega = 5, taken by Udeh; Walsh = 4 would need Vega = 6, which does not exist.) That leaves Tan = rank 3.\n\nCheck 'Tan higher than Udeh': Tan = 3 is higher (smaller number) than Udeh = 5. Satisfied.\n\nFinal ranking: 1 Xiu, 2 Walsh, 3 Tan, 4 Vega, 5 Udeh. An exhaustive permutation search confirms this is the UNIQUE ordering meeting all four clues. The manager in 3rd place is Tan — answer (A).\n\nDistractors arise from misplacing the Walsh–Vega gap (putting Vega or Walsh in the middle) or from ignoring the fixed 1st/5th anchors."},{"type":"conditional","topic":"Biconditional (necessary AND sufficient) with modus tollens","stem":"It is confirmed that the service was NOT deployed. What follows with certainty?","context":"An engineering policy states: 'A passing security scan is both necessary and sufficient for a service to be deployed.'","options":["The security scan passed.","The security scan did not pass.","The scan may or may not have passed; deployment status does not determine it.","The service will be deployed once the scan is rerun.","The scan passed but deployment was blocked for another reason."],"answerIndex":1,"reasoning":"'Necessary and sufficient' makes this a biconditional: Deploy ↔ ScanPass. The two are logically equivalent — each holds exactly when the other does.\n\nGiven ¬Deploy. By the biconditional, Deploy and ScanPass share the same truth value, so ¬Deploy entails ¬ScanPass — the scan did NOT pass. A two-row check of the biconditional (the only consistent rows are Deploy=ScanPass=true and Deploy=ScanPass=false) shows the world with Deploy false also has ScanPass false. Hence (B) is forced.\n\nRefuting (A): a passing scan is sufficient for deployment (ScanPass → Deploy), so ScanPass would have produced Deploy — contradicting the given ¬Deploy. The scan could not have passed.\nRefuting (C): with a mere one-directional conditional this 'undetermined' answer would be tempting, but the stem specifies necessary AND sufficient, i.e. a biconditional, which fully determines the scan result from the deployment status. This is the key trap — treating a biconditional as a one-way implication.\nRefuting (D): introduces a future rerun the premise never licenses.\nRefuting (E): claims the scan passed yet deployment was blocked, which violates sufficiency (passing guarantees deployment). Impossible under the biconditional. Exactly one option (B) follows."},{"type":"logicalPuzzle","topic":"Schedule/availability intersection under a duration constraint","stem":"For a one-hour review that all four managers must attend in full, which single start time works?","context":"Four managers must all attend a one-hour review that occupies a single one-hour slot starting on the hour. The candidate start times are 09:00, 10:00, 11:00, 12:00, 13:00, 14:00 and 15:00. Each manager is available only at the start times listed:\n• Aisha: 10:00, 11:00, 12:00, 15:00\n• Ben: 09:00, 11:00, 12:00, 13:00, 14:00\n• Chen: 11:00, 12:00, 14:00, 15:00\n• Diego: 09:00, 11:00, 13:00, 14:00, 15:00","options":["10:00","11:00","12:00","14:00","No single start time works for all four."],"answerIndex":1,"reasoning":"A valid slot must lie in every manager's availability set simultaneously (the review is a single one-hour block, so all four must share the same start hour). Intersect the four sets step by step:\n\nAisha ∩ Ben = {11:00, 12:00}. Intersect with Chen {11:00, 12:00, 14:00, 15:00} = {11:00, 12:00}. Intersect with Diego {09:00, 11:00, 13:00, 14:00, 15:00} = {11:00} (Diego has no 12:00).\n\nThe unique common start time is 11:00 — answer (B).\n\nRefuting (A) 10:00: Ben, Chen and Diego are all unavailable at 10:00.\nRefuting (C) 12:00: Diego is not available at 12:00, so it drops out at the final intersection.\nRefuting (D) 14:00: Aisha is not available at 14:00.\nRefuting (E): a common slot does exist (11:00), so 'no slot works' is false. Because exactly one shared hour exists and the review fits in a single block, the duration constraint is met precisely at 11:00."},{"type":"conditional","topic":"Argument evaluation: underlying assumption vs entailed conclusion (business wrapping)","stem":"The argument's conclusion follows ONLY IF which unstated assumption holds?","context":"A divisional head argues: 'Since we introduced the new CRM last quarter, recorded sales rose by 12%. Therefore the CRM caused the increase, so we should roll it out to every region.'","options":["No other material change (pricing, headcount, market demand, seasonality) occurred last quarter that could account for the sales rise.","Sales rose by exactly 12% and not more.","The CRM is cheaper to operate than the previous system.","Every region currently uses a different CRM.","Recorded sales are a more reliable metric than booked revenue."],"answerIndex":0,"reasoning":"The argument moves from a correlation (CRM introduced, then sales rose) to a causal claim (the CRM caused the rise) and then to a recommendation (roll it out everywhere). For the causal step to hold, the rise must not be attributable to some other coincident factor — otherwise it is correlation mistaken for causation. The load-bearing hidden premise is that no other material change could explain the increase.\n\nApply the negation test: assume the negation of (A) — 'some other change (a price cut, more salespeople, a demand surge, seasonality) DID occur and could account for the rise.' Then the CRM is no longer established as the cause and the conclusion collapses. Because negating (A) breaks the argument, (A) is exactly the assumption the argument depends on.\n\nRefuting (B): the precise magnitude (exactly 12%) is irrelevant to whether the CRM, rather than something else, caused the change. Negating it (say the rise was 13%) leaves the causal inference intact.\nRefuting (C): cost of operation is a separate business consideration; the argument is about causation of the sales rise, not affordability. Negating it does not touch the causal claim.\nRefuting (D): the argument never relies on regions using different systems; negating it leaves the causal inference untouched.\nRefuting (E): the choice of sales metric is not what the causal leap depends on; negating it does not break the conclusion. Only (A) is the assumption whose falsity destroys the inference — the classic correlation-as-causation gap."},{"type":"syllogism","topic":"Categorical logic - quantifiers, illicit conversion","stem":"Which conclusion MUST be true on the basis of the two statements alone?","context":"At Meridian Consulting, the following two statements are known to be true:\n(1) All partners are equity holders.\n(2) Some equity holders are based in the Singapore office.\nNo other information is given. Treat only these statements as true, and do not assume any group is non-empty unless a statement says so.","options":["Some partners are based in the Singapore office.","Some equity holders are partners.","All equity holders based in Singapore are partners.","No conclusion about partners' locations is entailed by the statements.","All Singapore-based staff are equity holders."],"answerIndex":3,"reasoning":"Statement (1) gives Partners is a subset of Equity holders. Statement (2) makes the set 'equity holders based in Singapore' non-empty, but says nothing about whether any of those particular equity holders are also partners; the Singapore equity holders could be entirely the non-partner equity holders. Therefore nothing about where partners are based is forced, and option (3) [index 3, 'No conclusion about partners' locations is entailed'] is the correct, defensible answer. Refuting distractors: 'Some partners are based in Singapore' commits the fallacy of assuming the overlap in (2) lands inside the Partner subset - not entailed, since the partner subset and the Singapore-based subset of equity holders need not intersect. 'Some equity holders are partners' requires at least one partner to EXIST; under modern logic 'All partners are equity holders' carries no existential import and is vacuously true even with zero partners (and the context explicitly bars assuming any group is non-empty), so this is not necessitated. 'All Singapore equity holders are partners' is an illicit conversion of (1) plus an unsupported leap. 'All Singapore-based staff are equity holders' illicitly converts (2) (a some-statement does not convert to an all-statement, and the direction is reversed). Hence only the 'no conclusion' option must hold.","reasoningPlanRef":""},{"type":"syllogism","topic":"Only-statements and must/some quantifiers","stem":"Given the two premises, which statement is guaranteed to be true?","context":"Two facts are established about a regional sales division:\n(1) Only managers may approve discounts above 15%.\n(2) Priya approved a discount of 20%.\nAssume both facts are true and complete.","options":["Every manager has approved a discount above 15%.","Priya is a manager.","Some managers are not able to approve discounts.","If Priya is a manager, then she may approve discounts above 30%.","All people who approve any discount are managers."],"answerIndex":1,"reasoning":"'Only managers may approve discounts above 15%' translates to: if a person approves a discount above 15%, that person is a manager (the set of approvers-above-15% is a subset of Managers). Priya approved 20%, which is above 15%, so she falls in the antecedent class and must be a manager. Option (2) [index 1, 'Priya is a manager'] is therefore forced and is the answer. Refuting distractors: 'Every manager has approved a discount above 15%' is the illicit converse of an only-statement - the rule makes manager-status NECESSARY for such approval, it does not assert every manager exercised it. 'Some managers are not able to approve discounts' is consistent with the premises but not entailed; nothing restricts managers' abilities downward. 'If Priya is a manager, then she may approve discounts above 30%' is NOT guaranteed: an only-statement grants no blanket upward permission, so being a manager does not entail permission for a 30% discount, and no fact about 30% is given - so this conditional can fail and is not a certainty. 'All people who approve any discount are managers' overreaches the rule, which constrains only discounts ABOVE 15%, not every discount. Thus (2) is the single defensible certainty.","reasoningPlanRef":""},{"type":"arrangement","topic":"Linear seating with adjacency and ordering constraints","stem":"Which director MUST occupy seat 1?","context":"Five directors - Acharya, Bell, Chen, Diaz and Evans - sit in a single row of five seats numbered 1 to 5 from left to right. Each director takes exactly one seat. The following constraints all apply:\n(1) Acharya sits somewhere to the left of Bell.\n(2) Chen sits in seat 3.\n(3) Diaz and Evans sit in adjacent seats.\n(4) Bell does not sit in seat 5.","options":["Acharya","Bell","Chen","Diaz","Cannot be determined from the constraints"],"answerIndex":0,"reasoning":"Place the absolutes first. Chen is fixed in seat 3 (rule 2), so seats 1,2,4,5 hold Acharya, Bell, Diaz, Evans. Rule 3 requires Diaz and Evans adjacent; among the remaining seats {1,2,4,5} the only adjacent pairs are {1,2} and {4,5} (2 and 4 are separated by Chen in seat 3). So the Diaz/Evans block sits in {1,2} or in {4,5}. Case A - Diaz/Evans in {4,5}: then Acharya and Bell take seats 1 and 2; rule 1 (Acharya left of Bell) forces Acharya=1, Bell=2; rule 4 (Bell not in 5) is satisfied. Valid layouts: A,B,C,D,E and A,B,C,E,D. Case B - Diaz/Evans in {1,2}: then Acharya and Bell take seats 4 and 5; rule 1 forces Acharya=4, Bell=5 - but rule 4 forbids Bell in seat 5, a contradiction, so Case B is impossible. Only Case A survives, and in every surviving layout seat 1 is Acharya. Exhaustive enumeration confirms the only valid permutations are (A,B,C,D,E) and (A,B,C,E,D), both with Acharya in seat 1. Distractors: Bell is fixed at seat 2, Chen at 3, Diaz varies between seats 4 and 5, and 'cannot be determined' is wrong because the constraints pin seat 1 uniquely.","reasoningPlanRef":""},{"type":"logicalPuzzle","topic":"Grouping / room assignment with capacity and compatibility","stem":"Which staff members must BOTH be assigned to Room X?","context":"Six staff - Adeyemi, Brooks, Costa, Dunn, Engel and Farr - are divided between two rooms, Room X and Room Y. Each room holds at most three people and everyone is assigned to exactly one room. The constraints are:\n(1) Adeyemi and Brooks must be in the same room.\n(2) Costa and Dunn must be in different rooms.\n(3) Engel must be in Room X.\n(4) Adeyemi is assigned to Room Y.","options":["Engel and Costa","Engel and Farr","Engel and Dunn","Brooks and Farr","Costa and Farr"],"answerIndex":1,"reasoning":"By rule 4, Adeyemi is in Room Y; by rule 1, Brooks is therefore in Room Y too. By rule 3, Engel is in Room X. That leaves Costa, Dunn and Farr to place. Room Y already holds Adeyemi and Brooks, so it can take at most one more person (cap 3); Room X holds Engel, so it can take at most two more. Three people (Costa, Dunn, Farr) remain and Y can absorb only one of them, so exactly two of them go to Room X. Rule 2 forces Costa and Dunn into different rooms, so exactly one of {Costa, Dunn} is in Y and the other in X - that single Y slot is consumed by one of Costa/Dunn. Therefore Farr cannot go to Y and must be in Room X. So Room X always contains Engel and Farr. Exhaustive check confirms only two valid assignments: X={Engel, Dunn, Farr}, Y={Adeyemi, Brooks, Costa}; and X={Engel, Costa, Farr}, Y={Adeyemi, Brooks, Dunn}. In both, Engel and Farr are in X, so option (2) [index 1] is the unique answer. Distractors: 'Engel and Costa' and 'Engel and Dunn' each name a person who is in X in only one of the two valid worlds (Costa and Dunn swap), so neither pair is guaranteed. 'Brooks and Farr' fails because Brooks is in Y. 'Costa and Farr' fails because Costa is not always in X.","reasoningPlanRef":""},{"type":"conditional","topic":"Propositional logic - contrapositive and mutual exclusion","stem":"If the firm does NOT open the Berlin office, which of the following must be true?","context":"A strategy committee has adopted these binding rules for next year's expansion:\n(1) If the firm hires a new CFO, then it will open the Berlin office.\n(2) The firm will launch the mobile product only if it hires a new CFO.\n(3) The firm will either launch the mobile product or expand the support team (or both).","options":["The firm will hire a new CFO.","The firm will expand the support team.","The firm will not expand the support team.","The firm will launch the mobile product.","The firm will open the Berlin office."],"answerIndex":1,"reasoning":"Assume the Berlin office is NOT opened. Rule 1 says CFO-hire implies Berlin-open; by contrapositive, not-Berlin implies not-CFO, so the firm does NOT hire a new CFO. Rule 2 ('launch mobile only if CFO-hire') means launch-mobile implies CFO-hire; by contrapositive, not-CFO implies not-launch-mobile, so the firm does NOT launch the mobile product. Rule 3 is an inclusive disjunction launch-mobile OR expand-support; with launch-mobile false, the disjunction is satisfiable only if expand-support is true. Therefore the firm must expand the support team - option (2) [index 1]. Refuting distractors: 'The firm will hire a new CFO' is contradicted (we derived not-CFO). 'The firm will not expand the support team' is the exact opposite of the forced conclusion. 'The firm will launch the mobile product' was shown false by the contrapositive of rule 2. 'The firm will open the Berlin office' contradicts the question's premise. Only expanding the support team is forced.","reasoningPlanRef":""},{"type":"sequence","topic":"Task sequencing with precedence and adjacency","stem":"Across all valid schedules, which statement MUST be true?","context":"Five project tasks - P, Q, R, S and T - are each scheduled in exactly one of five consecutive slots numbered 1 to 5 (1 = earliest). The dependencies are:\n(1) P is scheduled before R.\n(2) Q is scheduled in the slot immediately before S.\n(3) T is scheduled in slot 5.\n(4) R is not scheduled in slot 1.","options":["P is always in slot 1.","R is always before S.","Q is always before R.","S is never in slot 5.","R is always in slot 4."],"answerIndex":3,"reasoning":"T is fixed in slot 5 (rule 3). The Q-then-S block (rule 2) must occupy two consecutive slots among 1-4; P must precede R (rule 1) and R cannot be slot 1 (rule 4). Exhaustive enumeration yields exactly three valid orderings: (P,Q,S,R,T), (P,R,Q,S,T), and (Q,S,P,R,T). Test the candidates against all three. 'S is never in slot 5': S sits in slot 3, slot 4, slot 2 respectively - never slot 5, since T owns slot 5. This holds in every case, so option (4) [index 3] is the answer. Refuting the others: 'P is always in slot 1' fails on (Q,S,P,R,T) where P is in slot 3. 'R is always before S' fails on (P,Q,S,R,T) where S precedes R. 'Q is always before R' fails on (P,R,Q,S,T) where R precedes Q. 'R is always in slot 4' fails on (P,R,Q,S,T) where R is in slot 2. Only 'S is never in slot 5' is true across all valid schedules.","reasoningPlanRef":""},{"type":"conditional","topic":"Argument evaluation - correlation vs causation","stem":"Which option identifies the central logical flaw in the manager's conclusion?","context":"A division manager argues: 'In the last two quarters we moved the team to a four-day work week. Over the same period, customer-satisfaction scores rose by eight points. Therefore the four-day work week caused the rise in customer satisfaction, and we should roll it out company-wide.'","options":["The argument assumes a change that coincided with the satisfaction rise was its cause, without ruling out other explanations.","The argument relies on customer-satisfaction scores, which are inherently unreliable.","The argument fails because two quarters is mathematically too short to compute an average.","The argument commits the fallacy of denying the antecedent.","The argument over-generalises from a sample that is too small to be statistically valid."],"answerIndex":0,"reasoning":"The conclusion leaps from co-occurrence (the four-day week and the satisfaction rise happened in the same period) to causation (the four-day week caused the rise). This is the classic correlation-as-causation error: the passage never excludes alternative causes such as a new product, seasonal demand, a pricing change, or a different support tool. Option (1) [index 0] names exactly this flaw and is the defensible answer. Refuting distractors: 'satisfaction scores are inherently unreliable' imports an outside assumption not in the passage - we reason only from what is given, and nothing says the metric is unreliable. 'Two quarters is too short to compute an average' is a fabricated objection; an average over any non-empty period is computable. 'Denying the antecedent' is a conditional fallacy of the form 'if A then B; not A; therefore not B' - the argument has no such conditional structure, so the label does not fit. 'Sample too small to be statistically valid' is a sampling-adequacy objection; the decisive defect is the unjustified causal jump from a single coincidence, not sample size. Hence (1).","reasoningPlanRef":""},{"type":"dataSufficiency","topic":"Schedule-clash / availability sufficiency","stem":"Question: Can a one-hour meeting requiring all three managers be held from 14:00 to 15:00? Using the two statements, determine which is sufficient.","context":"Three managers - A, B and C - must all attend a single continuous one-hour meeting during office hours (09:00-17:00). Evaluate the two numbered statements as a data-sufficiency problem.\nState
