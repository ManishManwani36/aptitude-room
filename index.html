ment (1): Manager A is busy 09:00-12:00 and 15:00-17:00; Manager B is free for the entire afternoon (12:00-17:00).\nStatement (2): Manager C is busy 13:00-14:00 and 16:00-17:00.","options":["Statement (1) alone is sufficient, but statement (2) alone is not.","Statement (2) alone is sufficient, but statement (1) alone is not.","Both statements together are sufficient, but neither alone is sufficient.","Each statement alone is sufficient.","The two statements together are still not sufficient."],"answerIndex":2,"reasoning":"The question asks whether all three are simultaneously free for 14:00-15:00, so we need the availability of A, B and C in that window. Statement (1) alone: A is busy 09:00-12:00 and 15:00-17:00, so A is free 12:00-15:00 - A's next busy block starts exactly at 15:00 (the slot's end boundary), leaving the full hour 14:00-15:00 clear; B is free all afternoon, so B is free 14:00-15:00. But (1) says nothing about C, so the meeting cannot be confirmed - insufficient. Statement (2) alone: C is busy 13:00-14:00 and 16:00-17:00, so C is free 14:00-15:00 (the busy block ends exactly at 14:00); but (2) says nothing about A or B - insufficient. Both together: A free (12:00-15:00 covers it), B free (entire afternoon), C free (14:00-15:00 lies between C's busy blocks). All three are free, so the meeting CAN be held - a definite YES. Neither statement alone fixes all three attendees, but together they do, so option (3) [index 2] is correct. 'Each alone sufficient' fails because each omits at least one manager; 'together still not sufficient' fails because together they fully determine a YES.","reasoningPlanRef":""},{"type":"sequence","topic":"Comparative ranking from relative clues","stem":"Which conclusion MUST be true about the final ranking?","context":"Six analysts - F, G, H, J, K and L - are ranked by quarterly sales, with rank 1 the highest and rank 6 the lowest, no ties. The known relationships are:\n(1) G is ranked higher than H.\n(2) There are exactly two analysts ranked between F and K.\n(3) J is ranked 1st (highest).\n(4) L is ranked lower than H.\n(5) F is ranked higher than G.","options":["L is ranked 6th (lowest).","K is ranked higher than F.","H is ranked 3rd.","G is ranked higher than F.","F is ranked 2nd and K is ranked 5th, necessarily in that orientation only by coincidence."],"answerIndex":0,"reasoning":"J is rank 1 (rule 3). Chaining rules 5, 1 and 4 gives F > G > H > L (where 'higher' = smaller rank number) - four analysts in strict order, all below J. With J at rank 1, this chain occupies four of ranks 2-6 in order, and K takes the remaining slot. Rule 2 requires exactly two analysts strictly between F and K, so their rank positions differ by exactly 3. Since F heads the F>G>H>L chain and J holds rank 1, F is at rank 2 at the earliest. If F=2 then K=5; G,H,L then fill ranks 3,4,6 in order: G=3, H=4, L=6; the two between F(2) and K(5) are ranks 3 and 4 (G and H) - correct. Exhaustive enumeration returns exactly one solution: J=1, F=2, G=3, H=4, K=5, L=6. Therefore L is ranked 6th - option (1) [index 0] is forced. Refuting distractors: 'K higher than F' is false (K=5, F=2). 'H is ranked 3rd' is false (H=4; G is 3rd). 'G higher than F' reverses rule 5. The last option calls the F/K orientation coincidental, but it is in fact forced by the chain plus the gap constraint, so it mischaracterises the deduction.","reasoningPlanRef":""},{"type":"dataSufficiency","topic":"Ordering sufficiency - finishing positions","stem":"Question: Did W finish ahead of Z? Treat the two statements as a data-sufficiency problem and choose the correct option.","context":"Four runners - W, X, Y and Z - finished a race in positions 1 to 4 with no ties (position 1 = first to finish). Evaluate sufficiency.\nStatement (1): X finished immediately ahead of Y, and Y finished ahead of Z.\nStatement (2): W finished ahead of X.","options":["Statement (1) alone is sufficient, but statement (2) alone is not.","Statement (2) alone is sufficient, but statement (1) alone is not.","Each statement alone is sufficient.","Both statements together are sufficient, but neither alone is sufficient.","The two statements together are still not sufficient to answer."],"answerIndex":3,"reasoning":"We must decide whether W finished ahead of Z (W's position number smaller than Z's). Statement (1) alone gives X immediately ahead of Y and Y ahead of Z, i.e. X > Y > Z in finishing order with X,Y adjacent, but W is unconstrained: X=1,Y=2,Z=3,W=4 puts W behind Z, while W=1,X=2,Y=3,Z=4 puts W ahead of Z - both consistent with (1), so it does not settle the question - insufficient. Statement (2) alone (W ahead of X) says nothing about Z relative to W; Z could finish ahead of or behind W - insufficient. Together: from (1), X is ahead of Y which is ahead of Z, so X is ahead of Z; from (2), W is ahead of X; by transitivity W is ahead of X which is ahead of Z, so W is ahead of Z - a definite YES. Exhaustive enumeration confirms that under both statements the only valid ordering is W,X,Y,Z, with W ahead of Z in every case. Neither statement alone settles it, but the two together force the answer, so option (4) [index 3] is correct. The single-statement options fail because each leaves W-vs-Z open; 'together still not sufficient' fails because transitivity nails it.","reasoningPlanRef":""}]; /* @INJECT:deductive */

const NUMERICAL_DATA_2 = [{"stem":"Helvetia Pharma's Oncology division reported the nominal revenues shown. To assess underlying performance, management deflates revenue using the sector price index (2015 = 100) also shown. What was the division's REAL revenue CAGR over the three years from FY2021 to FY2024 (i.e. the compound annual growth rate after removing price-index effects)?","dataTitle":"Helvetia Pharma — Oncology division: nominal revenue (EUR m) and sector price index (2015=100)","chartType":"table","tableHeaders":["Metric","FY2021","FY2024"],"tableRows":[["Nominal revenue (EUR m)","820","1012"],["Sector price index (2015=100)","104.0","125.0"]],"options":["0.9% per year","2.7% per year","7.3% per year","23.4% per year"],"answerIndex":0,"unit":"% per year","topic":"Real vs nominal growth (deflating by a price index)","reasoning":"Deflate each year to real terms on a common base: real FY2021 = 820/104.0 x 100 = 788.46; real FY2024 = 1012/125.0 x 100 = 809.60. Real growth ratio over 3 years = 809.60/788.46 = 1.02681. CAGR = 1.02681^(1/3) - 1 = 0.00886 = 0.9% per year. Distractor 23.4% is total NOMINAL growth (1012/820 - 1 = 23.41%) with no deflation and no annualisation. Distractor 7.3% is the NOMINAL CAGR ((1012/820)^(1/3) - 1 = 7.26%), forgetting to deflate. Distractor 2.7% is the total REAL growth (2.68%) not annualised into a CAGR.","labels":[],"series":[]},{"stem":"Northwind Appliances sold a flagship dishwasher across two consecutive years. Using the figures shown, decompose the total revenue change into a VOLUME effect and a PRICE effect such that the two effects sum exactly to the total change (apply the volume effect at the OLD price and the price effect at the NEW volume). What is the VOLUME effect on revenue?","dataTitle":"Northwind Appliances — flagship dishwasher: units sold and average selling price","chartType":"table","tableHeaders":["Metric","Year 0","Year 1"],"tableRows":[["Units sold","240000","262000"],["Average selling price (USD)","18.50","17.90"]],"options":["+$393,800","+$407,000","+$249,800","-$157,200"],"answerIndex":1,"unit":"USD","topic":"Price effect vs volume effect decomposition","reasoning":"Volume effect at the OLD price = (262,000 - 240,000) x 18.50 = 22,000 x 18.50 = +$407,000. Internal check: price effect at the NEW volume = (17.90 - 18.50) x 262,000 = -0.60 x 262,000 = -$157,200; the two sum to 407,000 - 157,200 = +$249,800, which equals the total change (rev1 = 262,000 x 17.90 = 4,689,800; rev0 = 240,000 x 18.50 = 4,440,000; difference = 249,800), so the split is exact. Distractor +$393,800 applies the volume change at the NEW price (22,000 x 17.90), which double-counts price and would not reconcile. Distractor +$249,800 is the TOTAL revenue change, not the volume component. Distractor -$157,200 is the price effect, not the volume effect.","labels":[],"series":[]},{"stem":"MeridianFreight's operating cost base changed year-on-year as shown: +8.0% in Year 1, then -5.0% in Year 2, then +12.5% in Year 3. The cost base at the END of Year 3 was exactly 1,197,000. What was the cost base at the START of Year 1 (i.e. before any of these movements)?","dataTitle":"MeridianFreight — year-on-year change in operating cost base","chartType":"table","tableHeaders":["Year","Year-on-year change"],"tableRows":[["Year 1","+8.0%"],["Year 2","-5.0%"],["Year 3","+12.5%"],["Cost base at end of Year 3","1,197,000"]],"options":["1,037,037","1,036,364","1,029,105","1,357,000"],"answerIndex":0,"unit":"currency units","topic":"Reverse-engineering a base figure from a final value","reasoning":"The compound factor over the three years is 1.08 x 0.95 x 1.125 = 1.15425. The base = final / factor = 1,197,000 / 1.15425 = 1,037,037 (check: 1,037,037 x 1.15425 = 1,197,000). Distractor 1,036,364 divides by (1 + 0.155), naively SUMMING the percentages (8 - 5 + 12.5 = 15.5%) instead of compounding them. Distractor 1,029,105 divides by the simple AVERAGE percentage (15.5/3 = 5.167%) compounded over three years, i.e. 1,197,000 / 1.05167^3. Distractor 1,357,000 MULTIPLIES the final figure by the factor instead of dividing (1,197,000 x 1.15425 = 1,381,637, shown rounded) - the wrong direction.","labels":[],"series":[]},{"stem":"Forgeworks Ltd is constrained by finishing-machine hours, which are fully booked. Using the per-unit economics shown, which product should the firm prioritise to MAXIMISE total contribution from the scarce finishing-machine capacity?","dataTitle":"Forgeworks Ltd — per-unit price, variable cost and finishing-machine hours by product","chartType":"table","tableHeaders":["Product","Selling price (GBP)","Variable cost (GBP)","Machine hours per unit"],"tableRows":[["Alloy-X","145","97","1.5"],["Beta-Y","92","56","0.8"],["Gamma-Z","210","150","2.4"],["Delta-W","68","38","0.6"]],"options":["Alloy-X","Beta-Y","Gamma-Z","Delta-W"],"answerIndex":3,"unit":"product","topic":"Contribution per unit of a constrained resource","reasoning":"With a binding resource constraint, rank by contribution per MACHINE HOUR, not per unit. Contribution per hour = (price - variable cost) / hours: Alloy-X = (145-97)/1.5 = 48/1.5 = 32.0; Beta-Y = (92-56)/0.8 = 36/0.8 = 45.0; Gamma-Z = (210-150)/2.4 = 60/2.4 = 25.0; Delta-W = (68-38)/0.6 = 30/0.6 = 50.0. Delta-W yields the highest contribution per scarce hour (50.0) and should be prioritised. Distractor Gamma-Z has the highest contribution PER UNIT (60) but the worst per hour (25.0) because it is hour-hungry - the classic trap. Distractor Beta-Y is second-best per hour (45.0) but still below Delta-W. Alloy-X is third at 32.0.","labels":[],"series":[]},{"stem":"Cascade Beverages sold a sparkling-water line at a different average selling price (ASP) in each quarter, with the quarterly unit volumes shown. What was the volume-weighted average selling price across the full year (rounded to the nearest cent)?","dataTitle":"Cascade Beverages — quarterly units sold and average selling price (USD)","chartType":"table","tableHeaders":["Quarter","Units sold","Average selling price (USD)"],"tableRows":[["Q1","120000","3.20"],["Q2","180000","3.05"],["Q3","260000","2.85"],["Q4","140000","3.40"]],"options":["$3.07","$3.13","$3.20","$2.85"],"answerIndex":0,"unit":"USD","topic":"Weighted multi-period averages","reasoning":"Weight each ASP by its quarter's volume. Total revenue = 120,000x3.20 + 180,000x3.05 + 260,000x2.85 + 140,000x3.40 = 384,000 + 549,000 + 741,000 + 476,000 = 2,150,000. Total units = 120,000 + 180,000 + 260,000 + 140,000 = 700,000. Weighted ASP = 2,150,000 / 700,000 = 3.0714 = $3.07. Distractor $3.13 is the SIMPLE arithmetic mean of the four ASPs ((3.20+3.05+2.85+3.40)/4 = 3.125), ignoring that Q3 carried the most volume at the lowest price, which pulls the true average down. Distractor $3.20 (Q1) and $2.85 (Q3) are individual quarterly prices, not a yearly average.","labels":[],"series":[]},{"stem":"Lumira Systems sells a hardware-plus-software bundle. For FY2024 the finance team budgets revenue of 1,500 (GBP 000s) and COGS of 880 (GBP 000s), as shown. The board has set a target FY2024 gross margin of 44%. By how much (GBP 000s) must budgeted COGS be REDUCED to hit the target margin, assuming revenue is unchanged?","dataTitle":"Lumira Systems — FY2024 budget vs gross-margin target (GBP 000s)","chartType":"table","tableHeaders":["Item","Value"],"tableRows":[["Budgeted revenue","1500"],["Budgeted COGS","880"],["Current budgeted gross margin","41.3%"],["Board target gross margin","44.0%"]],"options":["40","47","50","387"],"answerIndex":0,"unit":"GBP 000s","topic":"Margin & sales-mix bridges (reverse margin)","reasoning":"At a 44% gross margin with revenue held at 1,500, allowable COGS = (1 - 0.44) x revenue = 0.56 x 1,500 = 840. Required reduction = 880 - 840 = 40. (Check current margin: (1,500 - 880)/1,500 = 41.3%, consistent with the table.) Distractor 50 corresponds to targeting a 38% margin instead of 44% (allowable COGS 0.62 x 1,500 = 930 implies INCREASING COGS by 50, i.e. wrong target and wrong direction). Distractor 387 applies the 44% rate to COGS (0.44 x 880 = 387.2) instead of deriving allowable COGS from revenue - a misuse of the margin rate. Distractor 47 is a rounding-based near-miss with no valid derivation.","labels":[],"series":[]},{"stem":"Atlas Treasury must convert GBP 250,000 into Japanese yen via US dollars. The exchange rates shown apply, and the bank deducts a 0.35% conversion fee from the PROCEEDS of EACH leg (i.e. on the USD output, then again on the JPY output). What is the final amount received, in JPY (to the nearest yen)?","dataTitle":"Atlas Treasury — two-leg FX conversion (GBP to USD to JPY)","chartType":"table","tableHeaders":["Parameter","Value"],"tableRows":[["Amount to convert (GBP)","250000"],["GBP/USD (USD per 1 GBP)","1.2720"],["USD/JPY (JPY per 1 USD)","154.80"],["Conversion fee per leg","0.35%"]],"options":["48,882,418","49,054,108","49,226,400","49,571,588"],"answerIndex":0,"unit":"JPY","topic":"Multi-leg FX conversion with fees","reasoning":"Leg 1: 250,000 x 1.2720 = 318,000 USD, less 0.35% fee = 318,000 x 0.9965 = 316,887.00 USD. Leg 2: 316,887.00 x 154.80 = 49,054,107.6 JPY, less 0.35% fee = 49,054,107.6 x 0.9965 = 48,882,418 JPY. Distractor 49,054,108 applies the fee only ONCE (on the first leg) and rounds the leg-2 gross. Distractor 49,226,400 omits the fee entirely (250,000 x 1.2720 x 154.80). Distractor 49,571,588 ADDS 0.35% on each leg (x 1.0035 twice) instead of deducting it - wrong sign on the fee.","labels":[],"series":[]},{"stem":"Brightline Retail's nominal sales and a consumer price index (2018 = 100) are shown for FY2020 and FY2023. To rebase, management resets the index to FY2020 = 100 and deflates sales accordingly. What was the REAL (inflation-adjusted) TOTAL growth in sales from FY2020 to FY2023?","dataTitle":"Brightline Retail — nominal sales (GBP m) and CPI (2018=100)","chartType":"table","tableHeaders":["Metric","FY2020","FY2023"],"tableRows":[["Nominal sales (GBP m)","560","742"],["CPI (2018=100)","112.5","131.6"]],"options":["13.3%","15.5%","17.0%","32.5%"],"answerIndex":0,"unit":"%","topic":"Real vs nominal growth (rebasing an index then deflating)","reasoning":"Rebase the index to FY2020 = 100: FY2023 rebased = 131.6/112.5 x 100 = 116.98. Real FY2023 sales in FY2020 prices = 742 / 1.1698 = 634.31. Real total growth = 634.31/560 - 1 = 0.1327 = 13.3%. (Equivalently (742/131.6)/(560/112.5) - 1.) Distractor 32.5% is NOMINAL total growth (742/560 - 1) with no deflation. Distractor 15.5% wrongly SUBTRACTS the inflation rate from nominal growth (32.5% - 17.0% = 15.5%), which is not how real growth compounds (the correct adjustment divides, not subtracts). Distractor 17.0% is the inflation rate itself (131.6/112.5 - 1 = 16.98%), not the real growth.","labels":[],"series":[]},{"stem":"Cobalt Industrial earns different gross margins in its two segments, as shown, and its unit sales mix shifted between FY1 and FY2. Holding each segment's margin CONSTANT at the rates shown, what is the effect of the MIX SHIFT alone on the blended gross margin, in percentage points (pp)?","dataTitle":"Cobalt Industrial — segment margins and unit sales mix","chartType":"table","tableHeaders":["Segment","Gross margin","FY1 mix (% of units)","FY2 mix (% of units)"],"tableRows":[["Segment A","30%","70%","45%"],["Segment B","55%","30%","55%"]],"options":["+6.25 pp","+13.75 pp","+12.50 pp","+25.00 pp"],"answerIndex":0,"unit":"percentage points","topic":"Margin & sales-mix bridges (mix effect)","reasoning":"Blended margin with fixed segment rates: FY1 = 0.70x30% + 0.30x55% = 21.0 + 16.5 = 37.5%. FY2 = 0.45x30% + 0.55x55% = 13.5 + 30.25 = 43.75%. Mix effect = 43.75 - 37.5 = +6.25 pp. Distractor +13.75 pp multiplies the change in Segment B's weight (+25 pp) by B's margin (55%) only, ignoring the offsetting drop in the lower-margin A weight. Distractor +25.00 pp is just the change in the mix weighting itself (B's share rising 30%->55%), not a margin effect. Distractor +12.50 pp doubles 6.25 / mis-scales the weight change - not a valid bridge.","labels":[],"series":[]},{"stem":"Keystone Distribution sells one SKU across three channels, each at a different discount off a single common LIST price, with the unit volumes shown. Total NET revenue for the SKU was 4,010,400. What is the common list price per unit?","dataTitle":"Keystone Distribution — channel units, discount off list, and total net revenue","chartType":"table","tableHeaders":["Channel","Units sold","Discount off list"],"tableRows":[["Retail","50000","10%"],["Wholesale","120000","22%"],["Online","30000","5%"],["Total net revenue","4010400","—"]],"options":["24.00","22.87","20.05","26.42"],"answerIndex":0,"unit":"currency units","topic":"Reverse-engineering a base figure with weighted discounts","reasoning":"Net revenue = L x (sum of discount-adjusted units), where each channel contributes units x (1 - discount). Effective units = 50,000x0.90 + 120,000x0.78 + 30,000x0.95 = 45,000 + 93,600 + 28,500 = 167,100. List price L = 4,010,400 / 167,100 = 24.00 (check: 24.00 x 167,100 = 4,010,400). Distractor 20.05 divides net revenue by RAW units (200,000), ignoring discounts - that gives the average NET price, not list. Distractor 22.87 applies the SIMPLE average discount (12.33%) to raw units: 4,010,400 / (200,000 x 0.87667), which mis-weights the channels. Distractor 26.42 over-grosses by applying the largest single discount (22%) to the whole base (4,010,400 / (200,000 x 0.78)) - not a valid method.","labels":[],"series":[]},{"stem":"A corporate treasury desk converts GBP 250,000 into Singapore dollars (SGD) via US dollars. The first leg converts GBP to USD; a 1.2% transaction fee is then deducted from the USD proceeds; the remaining USD is converted to SGD on the second leg. Using the rates shown, what are the final SGD proceeds (to the nearest SGD)?","dataTitle":"Two-leg conversion: rates and fee","chartType":"table","tableHeaders":["Item","Value"],"tableRows":[["Amount to convert (GBP)","250000"],["Leg 1 rate (USD per 1 GBP)","1.27"],["Fee on USD proceeds (%)","1.2"],["Leg 2 rate (SGD per 1 USD)","1.34"]],"unit":"SGD","options":["SGD 420,345","SGD 425,450","SGD 430,555","SGD 417,250"],"answerIndex":0,"reasoning":"Leg 1: 250,000 x 1.27 = USD 317,500. Apply the 1.2% fee to the USD: 317,500 x (1 - 0.012) = 317,500 x 0.988 = USD 313,690. Leg 2: 313,690 x 1.34 = SGD 420,344.6, which rounds to SGD 420,345 (option A). Distractor SGD 425,450 omits the fee entirely (317,500 x 1.34). Distractor SGD 430,555 wrongly adds the fee instead of deducting it (317,500 x 1.012 x 1.34 = 430,555). The fee is taken on the USD leg, so it must reduce the amount before the second conversion.","topic":"Two-leg currency conversion with fee"},{"stem":"A boutique fund reports AUM of $200m at the END of 2020 and $331m at the end of 2025. During 2023 the fund received a one-off external injection of $40m that simply sat in cash and itself generated no growth thereafter. What is the compound annual growth rate (CAGR) of the fund's ORGANIC AUM over the full end-2020 to end-2025 period (to the nearest 0.1%)?","dataTitle":"AUM: endpoints and one-off injection","chartType":"table","tableHeaders":["Item","Value ($m)"],"tableRows":[["AUM end of 2020","200"],["One-off injection in 2023","40"],["Reported AUM end of 2025","331"],["Compounding intervals (years)","5"]],"unit":"%","options":["7.8%","10.6%","9.8%","9.1%"],"answerIndex":0,"reasoning":"Step 1 - strip the non-growing injection from the end value, since the $40m sat in cash and produced no growth: organic end AUM = 331 - 40 = 291. Step 2 - count the periods: end-2020 to end-2025 is exactly 5 annual intervals. Step 3 - CAGR = (291/200)^(1/5) - 1 = (1.455)^0.2 - 1 = 1.0779 - 1 = 0.0779, i.e. 7.8% (option A). Distractor 10.6% fails to remove the $40m injection (331/200)^(1/5) - 1. Distractor 9.1% uses simple average growth ((291-200)/200/5 = 0.091) rather than compounding. Distractor 9.8% miscounts the periods as 4 ((291/200)^(1/4) - 1 = 9.83%).","topic":"CAGR with an intervening step-change"},{"stem":"A commodity price index is published on a 2018 base (2018 = 100). For internal reporting the analyst must re-base the series so that 2021 = 100. On the NEW (2021-based) index, what is the index value for 2024?","dataTitle":"Price index (2018 = 100)","chartType":"line","labels":["2018","2021","2024"],"series":[{"name":"Index (2018 = 100)","values":[100,128,147.2]}],"unit":"index points","options":["115.0","119.2","86.96","147.2"],"answerIndex":0,"reasoning":"Re-basing divides each value by the new base-year value and multiplies by 100. 2024 on the 2021 base = 147.2 / 128 x 100 = 1.15 x 100 = 115.0 (option A). Distractor 119.2 subtracts the index points (147.2 - 128 = 19.2) and adds them to 100, which is not how re-basing works. Distractor 86.96 inverts the ratio (128/147.2 x 100 = 86.96). Distractor 147.2 simply carries over the old-base value without re-basing.","topic":"Index re-basing combined with a percentage"},{"stem":"A commercial site is billed under the three-tier electricity tariff shown, where each tier rate applies only to consumption within that band. For a billing period of 9,500 kWh, what is the AVERAGE (effective) price per kWh across the whole bill (to the nearest $0.0001)?","dataTitle":"Tiered electricity tariff","chartType":"table","tableHeaders":["Tier (kWh band)","Rate ($/kWh)"],"tableRows":[["0 - 2,000","0.18"],["2,001 - 6,000","0.24"],["6,001 and above","0.31"]],"unit":"$/kWh","options":["$0.2532","$0.3100","$0.2433","$0.2400"],"answerIndex":0,"reasoning":"Charge each band at its own rate: first 2,000 kWh x 0.18 = $360; next 4,000 kWh (2,001-6,000) x 0.24 = $960; final 3,500 kWh (9,500 - 6,000) x 0.31 = $1,085. Total bill = 360 + 960 + 1,085 = $2,405. Average rate = 2,405 / 9,500 = $0.2532/kWh (option A). Distractor $0.3100 is the MARGINAL (top-tier) rate, not the average. Distractor $0.2433 is the unweighted mean of the three posted rates ((0.18+0.24+0.31)/3), ignoring how many kWh fall in each band. Distractor $0.2400 is the middle-tier rate.","topic":"Marginal vs average rate"},{"stem":"A product team surveyed 12,000 customers. Of these, 35% qualify as 'frequent users'. Of the frequent users, 60% hold a premium subscription. Of those premium-holding frequent users, 25% churned during the year. How many customers were premium-holding frequent users who churned?","dataTitle":"Survey funnel","chartType":"bar","labels":["Total surveyed","Frequent users (35%)","of which Premium (60%)","of which Churned (25%)"],"series":[{"name":"Customers","values":[12000,4200,2520,630]}],"unit":"customers","options":["630","3,000","1,050","2,520"],"answerIndex":0,"reasoning":"Apply each percentage to the prior subgroup, not the total. Frequent users = 12,000 x 0.35 = 4,200. Premium among them = 4,200 x 0.60 = 2,520. Churned among those = 2,520 x 0.25 = 630 (option A). Distractor 3,000 applies 25% to the whole base (12,000 x 0.25), ignoring the nesting. Distractor 2,520 stops at the premium count and forgets the churn step. Distractor 1,050 applies the 25% churn to all frequent users (4,200 x 0.25) rather than to the premium subset.","topic":"Percentage of a percentage"},{"stem":"A logistics division has a total budget of $4,200,000. Before any operational split, a fixed compliance reserve of $350,000 is taken off the top. The remaining amount is then divided between Fuel, Labour and Maintenance in the ratio 5 : 7 : 4. What is Labour's allocation?","dataTitle":"Budget split (after reserve)","chartType":"table","tableHeaders":["Item","Value ($)"],"tableRows":[["Total budget","4200000"],["Compliance reserve (off the top)","350000"],["Fuel : Labour : Maintenance","5 : 7 : 4"]],"unit":"$","options":["$1,684,375","$1,837,500","$1,487,500","$1,203,125"],"answerIndex":0,"reasoning":"Deduct the reserve first: 4,200,000 - 350,000 = 3,850,000 to be split. Ratio parts total 5+7+4 = 16, so one part = 3,850,000 / 16 = 240,625. Labour takes 7 parts: 7 x 240,625 = $1,684,375 (option A). Distractor $1,837,500 applies the 7/16 share to the full $4,200,000, ignoring the reserve. Distractor $1,487,500 splits the full budget (4,200,000 x 7/16 = 1,837,500) then subtracts the whole reserve from Labour's share (1,837,500 - 350,000). Distractor $1,203,125 uses Fuel's 5 parts (5 x 240,625) instead of Labour's 7.","topic":"Ratio shares with a remainder"},{"stem":"A division's nominal revenue and the relevant cost/price deflator are shown (deflator base 2020 = 100). What was the REAL revenue growth from 2021 to 2024 (to the nearest 0.1%)?","dataTitle":"Nominal revenue and deflator","chartType":"groupedBar","labels":["2021","2024"],"series":[{"name":"Nominal revenue ($m)","values":[540,612]},{"name":"Deflator (2020 = 100)","values":[104,119]}],"unit":"%","options":["-1.0%","+13.3%","-4.8%","+0.9%"],"answerIndex":0,"reasoning":"Deflate each year to real (2020-dollar) terms: real 2021 = 540/104 x 100 = 519.23; real 2024 = 612/119 x 100 = 514.29. Real growth = (514.29/519.23) - 1 = -0.0095 = -0.95%, i.e. -1.0% (option A). Despite revenue rising in cash terms, prices rose faster (deflator up 14.4% vs revenue up 13.3%), so real revenue slightly fell. Distractor +13.3% is the NOMINAL growth (612/540 - 1) with no deflation. Distractor -4.8% deflates only the end year and compares it to the un-deflated 2021 figure (514.29/540 - 1), a base mismatch. Distractor +0.9% has the sign reversed.","topic":"Real growth via deflation"},{"stem":"A product line's units and average selling price are shown for two years. Decomposing the revenue change into a volume effect (change in units valued at the OLD price) and a price effect (change in price valued at the NEW volume), what is the VOLUME effect on revenue?","dataTitle":"Units and average price","chartType":"groupedBar","labels":["2023","2024"],"series":[{"name":"Units sold","values":[18000,20400]},{"name":"Avg price ($)","values":[42,39]}],"unit":"$","options":["+$100,800","+$93,600","+$39,600","-$54,000"],"answerIndex":0,"reasoning":"Volume effect holds price at the old level: (20,400 - 18,000) x $42 = 2,400 x 42 = +$100,800 (option A). Consistency check: price effect at new volume = (39 - 42) x 20,400 = -$61,200; volume + price = 100,800 - 61,200 = +$39,600, which equals the total revenue change (20,400 x 39 - 18,000 x 42 = 795,600 - 756,000 = 39,600). Distractor +$93,600 values the extra volume at the NEW price (2,400 x 39) instead of the old price. Distractor +$39,600 is the TOTAL revenue change, not the volume component alone. Distractor -$54,000 is the price effect taken at the OLD volume ((39-42) x 18,000).","topic":"Price effect vs volume effect"},{"stem":"A multi-year service contract was settled at $275,600. The settlement was reached by taking the original base contract value and applying two successive annual uplifts: 6% in the first year and a further 4% in the second year (each applied to the running total). What was the original base contract value?","dataTitle":"Settlement build-up","chartType":"table","tableHeaders":["Item","Value"],"tableRows":[["Year 1 uplift (%)","6"],["Year 2 uplift (%)","4"],["Final settlement ($)","275600"]],"unit":"$","options":["$250,000","$260,000","$250,545","$249,977"],"answerIndex":0,"reasoning":"The final value equals base x 1.06 x 1.04 = base x 1.1024. Reverse it: base = 275,600 / 1.1024 = $250,000 (option A). Check: 250,000 x 1.06 = 265,000; 265,000 x 1.04 = 275,600. Distractor $260,000 applies only the first uplift (275,600/1.06), missing year 2. Distractor $250,545 treats the two uplifts as a single 10% step (275,600/1.10). Distractor $249,977 uses an averaged 5% compounded twice (275,600/1.05^2) instead of the actual 6% then 4%.","topic":"Reverse-engineer a base from a final value"},{"stem":"A procurement team funds a euro (EUR) purchase from a yen (JPY) account, routing JPY -> USD -> EUR. The JPY converts to USD on the first leg; that USD converts to EUR on the second leg; then a 1.5% spread is deducted from the EUR proceeds. With the resulting EUR, how many WHOLE replacement modules priced at EUR 9,800 each can the team buy?","dataTitle":"FX chain and module price","chartType":"table","tableHeaders":["Item","Value"],"tableRows":[["Funds available (JPY)","9600000"],["Leg 1 rate (JPY per 1 USD)","150"],["Leg 2 rate (USD per 1 EUR)","1.08"],["Spread on EUR proceeds (%)","1.5"],["Module price (EUR each)","9800"]],"unit":"modules","options":["5","6","7","4"],"answerIndex":0,"reasoning":"Leg 1: 9,600,000 / 150 = USD 64,000 (the rate is JPY per USD, so divide). Leg 2: convert USD to EUR by dividing by 1.08, since 1 EUR = 1.08 USD: 64,000 / 1.08 = EUR 59,259.26. Apply the 1.5% spread: 59,259.26 x (1 - 0.015) = EUR 58,370.37. Modules: 58,370.37 / 9,800 = 5.96, so 5 whole modules (option A); 6 would cost 6 x 9,800 = EUR 58,800, which exceeds the EUR 58,370 available. Distractor 6 ignores the 1.5% spread (gross EUR 59,259 / 9,800 = 6.05, rounds down to 6). Distractor 7 results from multiplying USD by 1.08 on the second leg (wrong direction: 64,000 x 1.08 = EUR 69,120, /9,800 = 7.05). Distractor 4 over-applies costs.","topic":"Two-leg currency conversion with fee"}]; /* @INJECT:numerical2 */
const VERBAL_DATA_2 = [{"passage":"A sovereign debt restructuring succeeds only when a qualified majority of creditors accepts the proposed terms. The bonds issued by the Republic of Astoria after 2014 contain a single-limb collective action clause: if holders of seventy-five percent of the aggregate principal across all affected series vote in favour, the new terms bind every holder, including dissenters. Earlier bonds, issued before 2014, carry a series-by-series clause requiring a separate seventy-five percent threshold within each individual series. In its current operation, Astoria seeks to restructure both the post-2014 and the pre-2014 bonds together. The Finance Ministry has stated that aggregate support across the post-2014 series already exceeds the single-limb threshold. A litigation fund has acquired a blocking position in one pre-2014 series, holding twenty-eight percent of that series alone. Analysts note that the fund's position, while decisive within its own series, represents under four percent of the total principal being restructured. The Ministry has not disclosed whether it will exclude the contested pre-2014 series from the operation or proceed under the series-by-series mechanism for the older bonds. Counsel for the fund argues that any attempt to aggregate the pre-2014 series with the post-2014 series would exceed the contractual terms governing the older instruments and would be challenged in the courts of the governing-law jurisdiction.","passageId":"p1","type":"tfc","topic":"Sovereign debt restructuring / collective action clauses","statement":"Every holder of the post-2014 bonds, including any who voted against the proposal, will be bound by the new terms.","options":["True","False","Cannot Say"],"answerIndex":0,"reasoning":"TRUE. The single-limb clause governs the post-2014 bonds and provides that if holders of 75% of the aggregate principal across all affected series vote in favour, 'the new terms bind every holder, including dissenters.' Because this clause is a feature of the post-2014 instruments, 'all affected series' within it refers to the post-2014 series it governs, and the Ministry's statement maps onto exactly that quantity: aggregate support across the post-2014 series 'already exceeds the single-limb threshold.' With the precondition reported as satisfied, the stated contractual consequence (binding every post-2014 holder, dissenters included) necessarily follows. Not Cannot Say: the binding effect is stated as a definite consequence and its trigger is reported as already met. Not False: nothing contradicts it. This is TRUE specifically of the post-2014 cohort; the corresponding question for the pre-2014 series is undetermined, which is the intended party-by-party discrimination."},{"passage":"A sovereign debt restructuring succeeds only when a qualified majority of creditors accepts the proposed terms. The bonds issued by the Republic of Astoria after 2014 contain a single-limb collective action clause: if holders of seventy-five percent of the aggregate principal across all affected series vote in favour, the new terms bind every holder, including dissenters. Earlier bonds, issued before 2014, carry a series-by-series clause requiring a separate seventy-five percent threshold within each individual series. In its current operation, Astoria seeks to restructure both the post-2014 and the pre-2014 bonds together. The Finance Ministry has stated that aggregate support across the post-2014 series already exceeds the single-limb threshold. A litigation fund has acquired a blocking position in one pre-2014 series, holding twenty-eight percent of that series alone. Analysts note that the fund's position, while decisive within its own series, represents under four percent of the total principal being restructured. The Ministry has not disclosed whether it will exclude the contested pre-2014 series from the operation or proceed under the series-by-series mechanism for the older bonds. Counsel for the fund argues that any attempt to aggregate the pre-2014 series with the post-2014 series would exceed the contractual terms governing the older instruments and would be challenged in the courts of the governing-law jurisdiction.","passageId":"p1","type":"tfc","topic":"Sovereign debt restructuring / collective action clauses","statement":"Astoria will exclude the contested pre-2014 series from the restructuring operation.","options":["True","False","Cannot Say"],"answerIndex":2,"reasoning":"CANNOT SAY. The passage states explicitly that 'the Ministry has not disclosed whether it will exclude the contested pre-2014 series from the operation or proceed under the series-by-series mechanism for the older bonds.' The two courses are presented as open alternatives. Not True: the passage does not assert exclusion will occur. Not False: it does not rule it out either. The trap is to infer from the fund's blocking position that exclusion is inevitable; the passage deliberately leaves the Ministry's choice undisclosed, so neither outcome necessarily follows. Paired with the post-2014 item, this is the intended split: definite for the post-2014 cohort, undetermined for the pre-2014 series."},{"passage":"A sovereign debt restructuring succeeds only when a qualified majority of creditors accepts the proposed terms. The bonds issued by the Republic of Astoria after 2014 contain a single-limb collective action clause: if holders of seventy-five percent of the aggregate principal across all affected series vote in favour, the new terms bind every holder, including dissenters. Earlier bonds, issued before 2014, carry a series-by-series clause requiring a separate seventy-five percent threshold within each individual series. In its current operation, Astoria seeks to restructure both the post-2014 and the pre-2014 bonds together. The Finance Ministry has stated that aggregate support across the post-2014 series already exceeds the single-limb threshold. A litigation fund has acquired a blocking position in one pre-2014 series, holding twenty-eight percent of that series alone. Analysts note that the fund's position, while decisive within its own series, represents under four percent of the total principal being restructured. The Ministry has not disclosed whether it will exclude the contested pre-2014 series from the operation or proceed under the series-by-series mechanism for the older bonds. Counsel for the fund argues that any attempt to aggregate the pre-2014 series with the post-2014 series would exceed the contractual terms governing the older instruments and would be challenged in the courts of the governing-law jurisdiction.","passageId":"p1","type":"tfc","topic":"Sovereign debt restructuring / collective action clauses","statement":"The litigation fund's holding is sufficient to block the entire restructuring operation.","options":["True","False","Cannot Say"],"answerIndex":1,"reasoning":"FALSE. The fund holds 28% of one pre-2014 series. Under the series-by-series clause (a separate 75% threshold per series), 28% defeats the vote within that single series only. The passage states the position is 'decisive within its own series' but 'represents under four percent of the total principal being restructured,' and that aggregate support across the post-2014 series 'already exceeds the single-limb threshold.' The post-2014 cohort therefore binds regardless of the fund, and the fund's stake touches just one of the older series. A sub-4% holding confined to one series cannot block the whole operation, so the claim is contradicted. Not Cannot Say: the supplied figures (28% of one series; under 4% of the total; post-2014 threshold already met) are sufficient to rule it out. Not True for the same reason. The fund could block its own pre-2014 series under the series-by-series mechanism, but that is a narrower and different proposition."},{"passage":"A sovereign debt restructuring succeeds only when a qualified majority of creditors accepts the proposed terms. The bonds issued by the Republic of Astoria after 2014 contain a single-limb collective action clause: if holders of seventy-five percent of the aggregate principal across all affected series vote in favour, the new terms bind every holder, including dissenters. Earlier bonds, issued before 2014, carry a series-by-series clause requiring a separate seventy-five percent threshold within each individual series. In its current operation, Astoria seeks to restructure both the post-2014 and the pre-2014 bonds together. The Finance Ministry has stated that aggregate support across the post-2014 series already exceeds the single-limb threshold. A litigation fund has acquired a blocking position in one pre-2014 series, holding twenty-eight percent of that series alone. Analysts note that the fund's position, while decisive within its own series, represents under four percent of the total principal being restructured. The Ministry has not disclosed whether it will exclude the contested pre-2014 series from the operation or proceed under the series-by-series mechanism for the older bonds. Counsel for the fund argues that any attempt to aggregate the pre-2014 series with the post-2014 series would exceed the contractual terms governing the older instruments and would be challenged in the courts of the governing-law jurisdiction.","passageId":"p1","type":"mcq","topic":"Sovereign debt restructuring / argument analysis","statement":"Counsel for the fund argues that aggregating the pre-2014 series with the post-2014 series 'would exceed the contractual terms governing the older instruments.' Which of the following is an assumption on which this argument most directly depends?","options":["That the contractual terms of the pre-2014 instruments do not themselves authorise single-limb aggregation across series.","That the litigation fund holds enough of the total principal to defeat the single-limb threshold.","That a court in the governing-law jurisdiction would necessarily rule in the fund's favour.","That the Finance Ministry has already decided to proceed under the series-by-series mechanism.","That the post-2014 bonds and the pre-2014 bonds are governed by different bodies of law."],"answerIndex":0,"reasoning":"The argument is that combining the older series with the newer ones would 'exceed the contractual terms governing the older instruments.' This presupposes that those older terms do not themselves permit such combination, i.e. do not authorise single-limb aggregation across series. The passage supports the premise (pre-2014 bonds 'carry a series-by-series clause requiring a separate seventy-five percent threshold within each individual series'), and the argument collapses if the older terms did allow aggregation; hence (A) is the load-bearing assumption. (B) is false on the figures (the fund is 'under four percent of the total principal') and is not what the contractual-overreach argument rests on. (C) overstates: counsel says the matter 'would be challenged in the courts,' not that the fund would necessarily win; the overreach argument does not require a guaranteed verdict. (D) concerns the Ministry's undisclosed choice, which the argument does not assume. (E) introduces a difference in governing law that the passage never raises (it refers to a single 'governing-law jurisdiction') and the argument does not need."},{"passage":"Under the Cross-Border Data Framework adopted by the Union, the transfer of personal data to a third country is lawful only if one of three conditions is met. First, the Commission may issue an adequacy finding, certifying that the recipient country affords protection essentially equivalent to the Union's own. Second, in the absence of such a finding, the exporting entity may rely on approved standard contractual clauses, provided it also conducts a transfer impact assessment confirming that local law does not undermine those clauses in practice. Third, narrow derogations permit occasional transfers necessary for the performance of a contract with the data subject. The Framework provides that an adequacy finding, once issued, must be reviewed every four years and may be suspended if the recipient country's protections deteriorate. Meridian Corp, established in the Union, transfers employee data to its parent in the country of Calderia. Calderia received an adequacy finding three years ago. A recent statute in Calderia granted its security services expanded access to commercially held data. The Union's supervisory board has opened a review but has issued no suspension. Meridian's counsel has advised the board that continued reliance on the adequacy finding remains lawful pending any formal suspension, while privacy advocates contend the new statute already renders the finding indefensible.","passageId":"p2","type":"tfc","topic":"Cross-border data transfer / data-protection law","statement":"The adequacy finding for Calderia has been suspended.","options":["True","False","Cannot Say"],"answerIndex":1,"reasoning":"FALSE. The passage states the supervisory board 'has opened a review but has issued no suspension,' and that counsel advises reliance 'remains lawful pending any formal suspension.' Both indicate no suspension has occurred. The statement directly contradicts this, so it is FALSE. Not Cannot Say: the suspension question is expressly answered in the negative. Not True for the same reason. The trap is to treat the opened review, or the advocates' view that the finding is 'indefensible,' as if it amounted to a suspension; the passage distinguishes an opened review from a 'formal suspension,' which has not been issued."},{"passage":"Under the Cross-Border Data Framework adopted by the Union, the transfer of personal data to a third country is lawful only if one of three conditions is met. First, the Commission may issue an adequacy finding, certifying that the recipient country affords protection essentially equivalent to the Union's own. Second, in the absence of such a finding, the exporting entity may rely on approved standard contractual clauses, provided it also conducts a transfer impact assessment confirming that local law does not undermine those clauses in practice. Third, narrow derogations permit occasional transfers necessary for the performance of a contract with the data subject. The Framework provides that an adequacy finding, once issued, must be reviewed every four years and may be suspended if the recipient country's protections deteriorate. Meridian Corp, established in the Union, transfers employee data to its parent in the country of Calderia. Calderia received an adequacy finding three years ago. A recent statute in Calderia granted its security services expanded access to commercially held data. The Union's supervisory board has opened a review but has issued no suspension. Meridian's counsel has advised the board that continued reliance on the adequacy finding remains lawful pending any formal suspension, while privacy advocates contend the new statute already renders the finding indefensible.","passageId":"p2","type":"tfc","topic":"Cross-border data transfer / data-protection law","statement":"As a matter of established fact, Meridian's transfers of employee data to Calderia are no longer lawful.","options":["True","False","Cannot Say"],"answerIndex":2,"reasoning":"CANNOT SAY. Lawfulness turns on a question the passage leaves unresolved: whether an adequacy finding ceases to provide a lawful basis the moment the recipient's protections deteriorate, or only upon formal suspension. The Framework says a finding 'may be suspended if the recipient country's protections deteriorate' but does not state that deterioration automatically voids it. The passage then presents two opposed positions (counsel: 'remains lawful pending any formal suspension'; advocates: the statute 'already renders the finding indefensible') without endorsing either. Not True: continuing unlawfulness does not necessarily follow, since no suspension has issued and the passage does not say deterioration is self-executing. Not False: the passage equally does not assert as fact that the transfers remain lawful. The discrimination is that the dispute is reported, not adjudicated, so lawfulness 'as a matter of established fact' is not determinable from the text."},{"passage":"Under the Cross-Border Data Framework adopted by the Union, the transfer of personal data to a third country is lawful only if one of three conditions is met. First, the Commission may issue an adequacy finding, certifying that the recipient country affords protection essentially equivalent to the Union's own. Second, in the absence of such a finding, the exporting entity may rely on approved standard contractual clauses, provided it also conducts a transfer impact assessment confirming that local law does not undermine those clauses in practice. Third, narrow derogations permit occasional transfers necessary for the performance of a contract with the data subject. The Framework provides that an adequacy finding, once issued, must be reviewed every four years and may be suspended if the recipient country's protections deteriorate. Meridian Corp, established in the Union, transfers employee data to its parent in the country of Calderia. Calderia received an adequacy finding three years ago. A recent statute in Calderia granted its security services expanded access to commercially held data. The Union's supervisory board has opened a review but has issued no suspension. Meridian's counsel has advised the board that continued reliance on the adequacy finding remains lawful pending any formal suspension, while privacy advocates contend the new statute already renders the finding indefensible.","passageId":"p2","type":"mcq","topic":"Cross-border data transfer / locating the crux of a disagreement","statement":"Meridian's counsel and the privacy advocates reach opposite conclusions about the lawfulness of the transfers while agreeing on the underlying facts. Their disagreement depends most directly on which of the following questions?","options":["Whether an adequacy finding ceases to provide a lawful basis upon deterioration of the recipient's protections, or only upon a formal suspension.","Whether Calderia in fact enacted a statute expanding its security services' access to commercially held data.","Whether Meridian could instead transfer the data under approved standard contractual clauses.","Whether the adequacy finding for Calderia is now more than four years old.","Whether the employee data being transferred constitutes personal data within the Framework."],"answerIndex":0,"reasoning":"Both sides accept the same facts (the statute, the opened review, the absence of a suspension). They differ on legal effect: counsel treats the finding as a valid basis 'pending any formal suspension,' whereas advocates say the statute 'already renders the finding indefensible.' The crux is therefore whether deterioration of protections itself removes the lawful basis, or whether a formal suspension is required first; resolving that question settles the dispute, so (A) is correct. (B) is common ground, not in dispute, since the passage states the statute as fact. (C) concerns an alternative transfer route, not the validity of the adequacy basis the two sides are actually arguing about. (D) is factually settled and on the wrong side of the line: the finding is 'three years ago,' inside the four-year review cycle, so age is not the issue. (E) is never contested and would, if anything, be assumed by both parties."},{"passage":"When a company approaches insolvency, the duties of its directors undergo a recognised shift. In ordinary solvent trading, directors owe their duties to the company, understood principally as the interests of its shareholders. Once a company is insolvent, or in the zone where insolvency is probable, the prevailing view in many common-law jurisdictions is that directors must have regard to the interests of creditors, whose capital is now effectively at risk. This is sometimes called the creditor duty. It does not transfer to creditors any direct right to sue the directors; the duty remains owed to the company and is enforced, typically, by a liquidator after collapse. The duty is engaged not merely by insolvency in fact but by the directors' knowledge, actual or constructive, that insolvency is probable. Directors who continue to incur debts after that point, with no reasonable prospect of avoiding insolvent liquidation, may face personal liability for wrongful trading. The board of Holloway Industries continued to draw down a credit facility for four months after its auditors flagged a material uncertainty regarding the company's ability to continue as a going concern. The company entered liquidation shortly afterwards, and the liquidator is now examining the conduct of the directors during that final period.","passageId":"p3","type":"tfc","topic":"Corporate insolvency / directors' duties","statement":"The creditor duty does not give individual creditors a direct right of action against the directors.","options":["True","False","Cannot Say"],"answerIndex":0,"reasoning":"TRUE. The passage states the creditor duty 'does not transfer to creditors any direct right to sue the directors; the duty remains owed to the company and is enforced, typically, by a liquidator after collapse.' The denial of a direct creditor right of action follows directly. Not False: it is affirmatively stated. The fine True-vs-Cannot-Say point is the word 'typically' attaching to enforcement by a liquidator; a careless reader may treat that qualifier as injecting uncertainty about whether creditors might sue directly. But 'typically' qualifies only the usual enforcer (the liquidator); the denial of a direct creditor right is stated without qualification ('does not transfer to creditors any direct right to sue'). The statement tracks the unqualified clause, so it is TRUE rather than Cannot Say."},{"passage":"When a company approaches insolvency, the duties of its directors undergo a recognised shift. In ordinary solvent trading, directors owe their duties to the company, understood principally as the interests of its shareholders. Once a company is insolvent, or in the zone where insolvency is probable, the prevailing view in many common-law jurisdictions is that directors must have regard to the interests of creditors, whose capital is now effectively at risk. This is sometimes called the creditor duty. It does not transfer to creditors any direct right to sue the directors; the duty remains owed to the company and is enforced, typically, by a liquidator after collapse. The duty is engaged not merely by insolvency in fact but by the directors' knowledge, actual or constructive, that insolvency is probable. Directors who continue to incur debts after that point, with no reasonable prospect of avoiding insolvent liquidation, may face personal liability for wrongful trading. The board of Holloway Industries continued to draw down a credit facility for four months after its auditors flagged a material uncertainty regarding the company's ability to continue as a going concern. The company entered liquidation shortly afterwards, and the liquidator is now examining the conduct of the directors during that final period.","passageId":"p3","type":"tfc","topic":"Corporate insolvency / directors' duties","statement":"The directors of Holloway Industries are personally liable for wrongful trading.","options":["True","False","Cannot Say"],"answerIndex":2,"reasoning":"CANNOT SAY. The passage sets two requirements for wrongful-trading liability: continuing to incur debts after the point of knowledge (actual or constructive) that insolvency is probable, AND doing so 'with no reasonable prospect of avoiding insolvent liquidation' — and even then directors only 'may face personal liability.' On Holloway, the passage reports only that the board drew down a facility for four months after auditors 'flagged a material uncertainty regarding the company's ability to continue as a going concern,' and that the liquidator 'is now examining' their conduct. A material-uncertainty flag is not stated to equate to knowledge that insolvent liquidation was probable; the 'no reasonable prospect' element is not established; the examination is unresolved; and 'may face' liability is not 'is liable.' Not True: liability does not necessarily follow. Not False: nothing rules it out. This is the intended False-vs-Cannot-Say discrimination: the facts are suggestive but fall short of the stated conditions."},{"passage":"When a company approaches insolvency, the duties of its directors undergo a recognised shift. In ordinary solvent trading, directors owe their duties to the company, understood principally as the interests of its shareholders. Once a company is insolvent, or in the zone where insolvency is probable, the prevailing view in many common-law jurisdictions is that directors must have regard to the interests of creditors, whose capital is now effectively at risk. This is sometimes called the creditor duty. It does not transfer to creditors any direct right to sue the directors; the duty remains owed to the company and is enforced, typically, by a liquidator after collapse. The duty is engaged not merely by insolvency in fact but by the directors' knowledge, actual or constructive, that insolvency is probable. Directors who continue to incur debts after that point, with no reasonable prospect of avoiding insolvent liquidation, may face personal liability for wrongful trading. The board of Holloway Industries continued to draw down a credit facility for four months after its auditors flagged a material uncertainty regarding the company's ability to continue as a going concern. The company entered liquidation shortly afterwards, and the liquidator is now examining the conduct of the directors during that final period.","passageId":"p3","type":"mcq","topic":"Corporate insolvency / principle application","statement":"Applying the passage's account, the creditor duty is engaged at which of the following points?","options":["When the directors know, or ought reasonably to know, that insolvency is probable.","When the company's auditors flag a material uncertainty about its status as a going concern.","Only once the company has in fact become insolvent.","Only once a liquidator has been appointed to enforce the duty.","As soon as the company incurs any debt in the course of trading."],"answerIndex":0,"reasoning":"The passage states the duty 'is engaged not merely by insolvency in fact but by the directors' knowledge, actual or constructive, that insolvency is probable.' The trigger is therefore the directors' actual or constructive knowledge of probable insolvency, which is exactly (A) ('know, or ought reasonably to know' = actual or constructive knowledge). (B) is the salient trap: an auditor's material-uncertainty flag appears only in the Holloway facts and is never equated by the passage with the knowledge threshold that engages the duty. (C) is contradicted by 'not merely by insolvency in fact,' which extends engagement to the zone where insolvency is merely probable. (D) confuses engagement with enforcement; the passage says enforcement is 'typically, by a liquidator after collapse,' which is downstream of when the duty arises. (E) is far too early: the duty attaches near insolvency, not at the first incurring of ordinary trading debt."},{"passageId":"p1","type":"tfc","topic":"Public health policy / antimicrobial stewardship","passage":"An evaluation of the national Antimicrobial Stewardship Programme reported that, across the 64 hospitals that had enrolled in the scheme, the rate of inappropriate broad-spectrum antibiotic prescribing fell by 27 percent over two years, as measured against each hospital's own pre-enrolment baseline. The evaluation noted that hospitals self-selected into the programme and that enrolled institutions were, on average, larger and better resourced than those that did not participate; it did not collect prescribing data from non-participating hospitals. The authors cautioned that, while reduced prescribing is widely expected to slow the emergence of resistant organisms, the evaluation period was too short to detect any change in local resistance rates, and they made no claim that resistance had in fact declined. They recommended extending the scheme but observed that the additional pharmacist staffing it requires may be difficult to sustain in smaller hospitals. The evaluation did not examine prescribing in primary-care or community settings, where the majority of antibiotics are dispensed.","statement":"Among the hospitals enrolled in the Antimicrobial Stewardship Programme, the rate of inappropriate broad-spectrum antibiotic prescribing declined over the two-year period.","options":["True","False","Cannot Say"],"answerIndex":0,"reasoning":"The first sentence reports that across the 64 enrolled hospitals the rate of inappropriate broad-spectrum prescribing 'fell by 27 percent over two years.' A fall of 27 percent is a decline, and the statement is scoped to exactly the population the passage measured (the enrolled hospitals), so it is directly supported — TRUE (index 0). Not Cannot Say: the figure is given explicitly for precisely this group, so no inference beyond the text is needed. Not False: nothing contradicts a decline. The companion item (Q2) sets the trap by widening this scope to the whole hospital system."},{"passageId":"p1","type":"tfc","topic":"Public health policy / antimicrobial stewardship","passage":"An evaluation of the national Antimicrobial Stewardship Programme reported that, across the 64 hospitals that had enrolled in the scheme, the rate of inappropriate broad-spectrum antibiotic prescribing fell by 27 percent over two years, as measured against each hospital's own pre-enrolment baseline. The evaluation noted that hospitals self-selected into the programme and that enrolled institutions were, on average, larger and better resourced than those that did not participate; it did not collect prescribing data from non-participating hospitals. The authors cautioned that, while reduced prescribing is widely expected to slow the emergence of resistant organisms, the evaluation period was too short to detect any change in local resistance rates, and they made no claim that resistance had in fact declined. They recommended extending the scheme but observed that the additional pharmacist staffing it requires may be difficult to sustain in smaller hospitals. The evaluation did not examine prescribing in primary-care or community settings, where the majority of antibiotics are dispensed.","statement":"Inappropriate broad-spectrum antibiotic prescribing fell across the country's hospital system as a whole over the two-year period.","options":["True","False","Cannot Say"],"answerIndex":2,"reasoning":"The 27 percent fall is reported only for the 64 self-selected, larger, better-resourced enrolled hospitals, and the passage states the evaluation 'did not collect prescribing data from non-participating hospitals.' With the non-enrolled hospitals entirely unmeasured, the trend across the system as a whole is undetermined — CANNOT SAY (index 2). Not True: a decline in a non-representative subset cannot be generalised to the whole system, and the stated self-selection bias makes generalisation especially unsafe. Not False: the passage does not assert that system-wide prescribing failed to fall; it is silent on the unmeasured hospitals. This is the True-of-a-subset, Cannot-Say-for-the-population discrimination."},{"passageId":"p1","type":"tfc","topic":"Public health policy / antimicrobial stewardship","passage":"An evaluation of the national Antimicrobial Stewardship Programme reported that, across the 64 hospitals that had enrolled in the scheme, the rate of inappropriate broad-spectrum antibiotic prescribing fell by 27 percent over two years, as measured against each hospital's own pre-enrolment baseline. The evaluation noted that hospitals self-selected into the programme and that enrolled institutions were, on average, larger and better resourced than those that did not participate; it did not collect prescribing data from non-participating hospitals. The authors cautioned that, while reduced prescribing is widely expected to slow the emergence of resistant organisms, the evaluation period was too short to detect any change in local resistance rates, and they made no claim that resistance had in fact declined. They recommended extending the scheme but observed that the additional pharmacist staffing it requires may be difficult to sustain in smaller hospitals. The evaluation did not examine prescribing in primary-care or community settings, where the majority of antibiotics are dispensed.","statement":"The evaluation established that local rates of antibiotic-resistant organisms fell as a result of the programme.","options":["True","False","Cannot Say"],"answerIndex":1,"reasoning":"The passage states the authors 'cautioned that ... the evaluation period was too short to detect any change in local resistance rates, and they made no claim that resistance had in fact declined.' A statement that the evaluation ESTABLISHED a resistance decline caused by the programme contradicts this explicit disavowal of any such finding — FALSE (index 1). Not Cannot Say: the passage is not merely silent on resistance; it affirmatively denies having shown a change, which is a contradiction rather than a gap. The clause 'reduced prescribing is widely expected to slow ... resistant organisms' is a general expectation, not a measured result for this programme, so it cannot rescue the claim."},{"passageId":"p1","type":"mcq","topic":"Critical reasoning — flaw in the argument","passage":"An evaluation of the national Antimicrobial Stewardship Programme reported that, across the 64 hospitals that had enrolled in the scheme, the rate of inappropriate broad-spectrum antibiotic prescribing fell by 27 percent over two years, as measured against each hospital's own pre-enrolment baseline. The evaluation noted that hospitals self-selected into the programme and that enrolled institutions were, on average, larger and better resourced than those that did not participate; it did not collect prescribing data from non-participating hospitals. The authors cautioned that, while reduced prescribing is widely expected to slow the emergence of resistant organisms, the evaluation period was too short to detect any change in local resistance rates, and they made no claim that resistance had in fact declined. They recommended extending the scheme but observed that the additional pharmacist staffing it requires may be difficult to sustain in smaller hospitals. The evaluation did not examine prescribing in primary-care or community settings, where the majority of antibiotics are dispensed.","statement":"A health minister argues: 'This evaluation proves the stewardship scheme is the most cost-effective way to reduce the nation's total antibiotic consumption, so we should fund it in preference to interventions aimed at family doctors.' Which of the following identifies the most serious flaw in the minister's reasoning?","options":["It treats a 27 percent relative reduction as though it were a 27 percentage-point reduction.","It draws a conclusion about the most cost-effective way to cut the nation's total antibiotic use from an evaluation confined to hospitals, even though the passage states most antibiotics are dispensed in primary-care and community settings the evaluation did not examine.","It assumes that reduced prescribing slows the emergence of resistant organisms, which the passage describes only as a widely held expectation.","It overlooks the authors' warning that pharmacist staffing may be hard to sustain in smaller hospitals.","It generalises from 64 hospitals to the entire hospital system despite the noted self-selection of participants."],"answerIndex":1,"reasoning":"The minister's conclusion is about the most cost-effective way to cut the NATION'S TOTAL antibiotic consumption, and it explicitly deprioritises interventions for family doctors. The evaluation measured only hospital prescribing, and the passage states the majority of antibiotics are dispensed in primary-care and community settings 'the evaluation did not examine' — so the evidence cannot support a claim about total national use, still less a ranking that favours hospitals over primary-care interventions. Option 2 names exactly this scope mismatch and is the most serious flaw. Option 1 is a real reading hazard, but the argument turns on the existence and locus of the reduction, not its magnitude. Option 3 attacks a resistance link the minister never invokes (he speaks of consumption). Option 4 is a genuine caveat about sustainability, not about cost-effectiveness for total consumption. Option 5 is a legitimate weakness, but even granting full hospital-wide generalisation, the conclusion about national total use and primary care would still not follow — the omitted majority of prescribing is the deeper, decisive gap."},{"passageId":"p2","type":"tfc","topic":"Technology policy / post-quantum cryptography","passage":"A government directive requires that all eighteen central agencies migrate their externally facing systems to post-quantum cryptographic (PQC) standards by 2030. The accompanying review observed that large-scale quantum computers capable of breaking current public-key encryption do not yet exist and may not for many years, but argued that migration must begin now because adversaries can intercept and store encrypted traffic today in order to decrypt it once such machines become available, a tactic the review termed 'harvest now, decrypt later.' A progress audit found that, at the time of writing, fewer than half of the eighteen agencies had completed migration of any externally facing system, with several citing a shortage of staff trained in the new standards. The review distinguished PQC, which runs on conventional hardware using new mathematical problems, from quantum key distribution (QKD), which relies on specialised physical links; it endorsed PQC for general government use and recommended QKD only for a small number of point-to-point links with exceptional secrecy requirements. It set no interim milestones before the 2030 deadline.","statement":"At the time of the progress audit, fewer than half of the eighteen central agencies had completed migration of any externally facing system to PQC standards.","options":["True","False","Cannot Say"],"answerIndex":0,"reasoning":"The passage states the progress audit 'found that, at the time of writing, fewer than half of the eighteen agencies had completed migration of any externally facing system.' The statement reproduces this finding, including the 'any system' scope and the eighteen-agency denominator — TRUE (index 0). Not Cannot Say: the audit reports exactly this proportion. Not False: nothing contradicts it. The statement says 'fewer than half' without overreaching to a specific count, so it stays within what the text supports."},{"passageId":"p2","type":"tfc","topic":"Technology policy / post-quantum cryptography","passage":"A government directive requires that all eighteen central agencies migrate their externally facing systems to post-quantum cryptographic (PQC) standards by 2030. The accompanying review observed that large-scale quantum computers capable of breaking current public-key encryption do not yet exist and may not for many years, but argued that migration must begin now because adversaries can intercept and store encrypted traffic today in order to decrypt it once such machines become available, a tactic the review termed 'harvest now, decrypt later.' A progress audit found that, at the time of writing, fewer than half of the eighteen agencies had completed migration of any externally facing system, with several citing a shortage of staff trained in the new standards. The review distinguished PQC, which runs on conventional hardware using new mathematical problems, from quantum key distribution (QKD), which relies on specialised physical links; it endorsed PQC for general government use and recommended QKD only for a small number of point-to-point links with exceptional secrecy requirements. It set no interim milestones before the 2030 deadline.","statement":"The review recommended quantum key distribution as the standard approach for general use across the central agencies.","options":["True","False","Cannot Say"],"answerIndex":1,"reasoning":"The passage states the review 'endorsed PQC for general government use and recommended QKD only for a small number of point-to-point links with exceptional secrecy requirements.' The statement reverses this allocation by casting QKD as the general-use standard, which contradicts the text — FALSE (index 1). Not Cannot Say: the review's recommendation on this exact point is stated, and it assigns the general-use role to PQC, not QKD. The word 'only' confines QKD to exceptional point-to-point links; the trap is for readers who note both acronyms appear and blur which technology fills which role."},{"passageId":"p2","type":"mcq","topic":"Critical reasoning — resolve the paradox","passage":"A government directive requires that all eighteen central agencies migrate their externally facing systems to post-quantum cryptographic (PQC) standards by 2030. The accompanying review observed that large-scale quantum computers capable of breaking current public-key encryption do not yet exist and may not for many years, but argued that migration must begin now because adversaries can intercept and store encrypted traffic today in order to decrypt it once such machines become available, a tactic the review termed 'harvest now, decrypt later.' A progress audit found that, at the time of writing, fewer than half of the eighteen agencies had completed migration of any externally facing system, with several citing a shortage of staff trained in the new standards. The review distinguished PQC, which runs on conventional hardware using new mathematical problems, from quantum key distribution (QKD), which relies on specialised physical links; it endorsed PQC for general government use and recommended QKD only for a small number of point-to-point links with exceptional secrecy requirements. It set no interim milestones before the 2030 deadline.","statement":"A sceptic objects that it is irrational to spend heavily now defending against quantum computers that do not exist and may never be built. Which of the following, drawn from or consistent with the passage, best resolves the apparent tension between the sceptic's point and the directive's insistence on migrating immediately?","options":["Fewer than half of the agencies have so far completed any migration, so the programme is already behind schedule.","Because intercepted traffic can be stored today and decrypted later if such machines do arrive, data that must stay secret for years is at risk now even though the machines do not yet exist.","PQC runs on conventional hardware, so migrating to it is cheaper than building quantum key distribution links.","The directive sets no interim milestones, leaving agencies free to schedule the work over the remaining years.","Quantum computers will certainly be built before 2030, so the threat is imminent rather than hypothetical."],"answerIndex":1,"reasoning":"The tension is: why act now against a machine that does not yet exist? The passage dissolves it with the 'harvest now, decrypt later' rationale — adversaries 'can intercept and store encrypted traffic today in order to decrypt it once such machines become available.' So information whose confidentiality must outlast the uncertain arrival of quantum computers is exposed the moment it is sent under today's encryption; waiting for the machine to appear is already too late. Option 2 states exactly this and reconciles both sides without denying that the machines are currently absent. Option 1 is about schedule slippage, not the rationality of acting at all. Option 3 explains the choice of PQC over QKD, a different question. Option 4 addresses pacing, not the in-principle objection. Option 5 'resolves' the paradox only by contradicting the passage ('do not yet exist and may not for many years') — it denies the sceptic's premise and asserts a certainty the passage explicitly withholds, so it does not reconcile the two positions."},{"passageId":"p3","type":"tfc","topic":"Critical-minerals policy / direct lithium extraction","passage":"A feasibility study commissioned by an industrial-strategy unit assessed direct lithium extraction (DLE) as an alternative to conventional evaporation ponds for producing battery-grade lithium from continental brines. At the company's single pilot plant, DLE recovered 86 percent of the lithium present in the brine, compared with recovery rates the study described as typically below 50 percent for evaporation ponds in the same basin, and it returned the spent brine underground within hours rather than over the months ponds require. The study cautioned that these results were obtained at pilot scale and that recovery and cost at full commercial throughput had not yet been demonstrated; it also noted that the pilot's favourable water balance depended on a site-specific ability to reinject brine, which may not be available at every prospective location. While DLE reduces the surface land area required, the study observed that its energy demand per tonne of product is higher than that of evaporation, so its overall environmental advantage depends on the carbon intensity of the electricity used. It made no estimate of national lithium demand and did not compare DLE with extraction from hard-rock ore.","statement":"At the company's pilot plant, direct lithium extraction achieved a higher lithium recovery rate than the rates the study described as typical for evaporation ponds in the same basin.","options":["True","False","Cannot Say"],"answerIndex":0,"reasoning":"The passage states DLE 'recovered 86 percent of the lithium present in the brine, compared with recovery rates the study described as typically below 50 percent for evaporation ponds in the same basin.' Since 86 percent exceeds any value below 50 percent, the pilot rate is necessarily higher than the typical pond rate as the study characterises it — TRUE (index 0). Not Cannot Say: both figures are supplied and the comparison is forced by the inequality (86 > anything < 50). Not False: nothing contradicts it. The claim is scoped to the study's own description of pond rates 'in the same basin,' so no external benchmark is required."},{"passageId":"p3","type":"tfc","topic":"Critical-minerals policy / direct lithium extraction","passage":"A feasibility study commissioned by an industrial-strategy unit assessed direct lithium extraction (DLE) as an alternative to conventional evaporation ponds for producing battery-grade lithium from continental brines. At the company's single pilot plant, DLE recovered 86 percent of the lithium present in the brine, compared with recovery rates the study described as typically below 50 percent for evaporation ponds in the same basin, and it returned the spent brine underground within hours rather than over the months ponds require. The study cautioned that these results were obtained at pilot scale and that recovery and cost at full commercial throughput had not yet been demonstrated; it also noted that the pilot's favourable water balance depended on a site-specific ability to reinject brine, which may not be available at every prospective location. While DLE reduces the surface land area required, the study observed that its energy demand per tonne of product is higher than that of evap
